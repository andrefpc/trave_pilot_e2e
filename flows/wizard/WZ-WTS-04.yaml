appId: ${APP_ID}
name: WZ-WTS-04
tags: [wizard, p2, ios-only]
---
# >>> dashboard-meta
# WZ-WTS-04 — Each Where to Stay hotel card shows a star rating that matches its rating value
# Section: Plan Creation Wizard
# Priority: P2
# Repro:
# 1. On Where to Stay, inspect a hotel card.
# 2. Verify the rendered stars (out of 5) match the numeric rating (e.g. 4.5 = 4½ stars).
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ./_walk_to_wts.yaml
- assertVisible: { id: "wizard.where-to-stay.title" }
- assertVisible: { id: "wizard.where-to-stay.city-section.0.hotel-card.0" }
- assertVisible: { id: "wizard.where-to-stay.city-section.0.hotel-card.0.rating" }
- assertVisible: { id: "wizard.where-to-stay.city-section.0.hotel-card.0.stars" }
