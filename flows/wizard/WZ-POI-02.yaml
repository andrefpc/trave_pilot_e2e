appId: ${APP_ID}
name: WZ-POI-02
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-POI-02 — Tapping Next on Places of Interest with no selections is blocked or shows "select at least one place"
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. On Places of Interest with nothing selected, tap Next.
# 2. Verify either Next is disabled, or an error like "Please select at least one place to continue" appears.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ./_walk_to_poi.yaml
- assertVisible: { id: "wizard.places-of-interest.title" }
- scrollUntilVisible:
    element: { id: "wizard.places-of-interest.next-button" }
    direction: DOWN
# On Android the Next button is `enabled = state.isNextEnabled`, which
# is false until at least one place is selected. The disabled-state
# button never fires its onClick (so no error is ever set) — verify
# the gate via the `.next-button.disabled-marker` MaestroMarker that
# renders only while Next is disabled. (Dashboard meta accepts either
# disabled-button or inline-error.)
- assertVisible: { id: "wizard.places-of-interest.next-button" }
- assertVisible: { id: "wizard.places-of-interest.next-button.disabled-marker" }
- assertVisible: { id: "wizard.places-of-interest.title" }
