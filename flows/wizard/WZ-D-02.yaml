appId: ${APP_ID}
name: WZ-D-02
tags: [wizard, p2]
---
# >>> dashboard-meta
# WZ-D-02 — Typing only 1 character into Origin does not fire any city-search request
# Section: Plan Creation Wizard
# Priority: P2
# Repro:
# 1. From Welcome → Create Plan → Destination → tap Origin.
# 2. Type a single letter (e.g. "P").
# 3. Verify no dropdown appears and no network request to /cities is made (check Network Profiler).
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- assertVisible: { id: "wizard.destination.title" }
- tapOn: { id: "wizard.destination.origin-field" }
- inputText: "P"
- waitForAnimationToEnd:
    timeout: 2000
- assertNotVisible: { id: "wizard.destination.origin-suggestion.0" }
