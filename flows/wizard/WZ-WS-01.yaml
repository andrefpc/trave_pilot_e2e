appId: ${APP_ID}
name: WZ-WS-01
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-WS-01 — Walking Style shows four cards: All day, Moderate walking, Only the necessary, No walking
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. From Welcome → Create Plan → walk through Destination to reach Walking Style.
# 2. Verify a 2x2 grid of cards labelled "All day", "Moderate walking", "Only the necessary", "No walking", each with a banner image.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ../common/_wizard_fill_destination.yaml
- assertVisible: { id: "wizard.walking-style.title" }
- assertVisible: { id: "wizard.walking-style.option.all-day" }
- assertVisible: { id: "wizard.walking-style.option.moderate" }
- assertVisible: { id: "wizard.walking-style.option.necessary" }
- assertVisible: { id: "wizard.walking-style.option.none" }
