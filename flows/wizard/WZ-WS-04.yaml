appId: ${APP_ID}
name: WZ-WS-04
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-WS-04 — Selecting a Walking Style, going Next then Back, leaves the same option selected
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. On Walking Style, tap "Moderate walking" → Next.
# 2. Tap the back arrow on Companions to return to Walking Style.
# 3. Verify "Moderate walking" is still highlighted.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ../common/_wizard_fill_destination.yaml
- assertVisible: { id: "wizard.walking-style.title" }
- tapOn: { id: "wizard.walking-style.option.moderate" }
- tapOn: { id: "wizard.walking-style.next-button" }
- assertVisible: { id: "wizard.companions.title" }
# Use system back to return to Walking Style (toolbar back arrow has no
# maestro id yet on either platform; system back hits the same
# `NavigateBack` side-effect path).
# `back` on iOS doesn't pop the NavigationStack because the wizard
# screens use `.navigationBarHidden(true)` (so the system bar's back
# arrow + swipe-from-edge gesture are both unavailable). Tap the
# custom toolbar's back arrow instead — TravelPilotToolbar defaults
# its back button's accessibilityIdentifier to
# `common.toolbar.back-button` so every wizard screen has it.
- runFlow:
    when:
      platform: Android
    commands:
      - back
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn: { id: "common.toolbar.back-button" }
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: { id: "wizard.walking-style.title" }
- assertVisible: { id: "wizard.walking-style.option.moderate" }
