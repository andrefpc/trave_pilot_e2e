appId: ${APP_ID}
name: WZ-WS-04
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-WS-04 — Selecting a Walking Style, going Next then Back, leaves the same option selected
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. On Walking Style, tap "Moderate walking" → Next.
# 2. Tap the back arrow on Companions to return to Walking Style.
# 3. Verify "Moderate walking" is still highlighted.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ../common/_wizard_fill_destination.yaml
- assertVisible: { id: "wizard.walking-style.title" }
- tapOn: { id: "wizard.walking-style.option.moderate" }
- tapOn: { id: "wizard.walking-style.next-button" }
- assertVisible: { id: "wizard.companions.title" }
- assertVisible: { id: "wizard.walking-style.title" }
- assertVisible: { id: "wizard.walking-style.option.moderate" }
