appId: ${APP_ID}
tags: [helper]
---
# Reusable: assumes wizard.destination.title is visible. Walks Destination →
# Walking Style → Companions → Day Schedule → Meal Time → Budget using
# minimal valid input. Lands on Budget with wizard.budget.title visible.
- runFlow: ../common/_wizard_fill_destination.yaml
- assertVisible: { id: "wizard.walking-style.title" }
- tapOn: { id: "wizard.walking-style.option.moderate" }
- tapOn: { id: "wizard.walking-style.next-button" }
- assertVisible: { id: "wizard.companions.title" }
- tapOn: { id: "wizard.companions.next-button" }
- assertVisible: { id: "wizard.day-schedule.title" }
- scrollUntilVisible:
    element: { id: "wizard.day-schedule.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.day-schedule.next-button" }
- assertVisible: { id: "wizard.meal-time.title" }
- scrollUntilVisible:
    element: { id: "wizard.meal-time.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.meal-time.next-button" }
- assertVisible: { id: "wizard.budget.title" }
