appId: ${APP_ID}
name: WZ-CO-04
tags: [wizard, p0]
---
# >>> dashboard-meta
# WZ-CO-04 — On Complete Onboarding, tapping Login then signing in returns to Plan Generation for the draft
# Section: Plan Creation Wizard
# Priority: P0
# Repro:
# 1. From Complete Onboarding, tap "Login".
# 2. Sign in with valid credentials.
# 3. Verify the app navigates to Plan Generation for the draft you were building (not Home).
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: _walk_to_complete_onboarding.yaml
- assertVisible: { id: "wizard.complete-onboarding.title" }
# Tap Generate Plan to open the SignUpBottomSheet, then tap Login from
# inside the sheet.
- tapOn: { id: "wizard.complete-onboarding.generate-plan-button" }
- extendedWaitUntil:
    visible: { id: "wizard.complete-onboarding.login-button" }
    timeout: 5000
- tapOn: { id: "wizard.complete-onboarding.login-button" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.email-field" }
- inputText: ${TEST_PREMIUM_EMAIL}
- tapOn: { id: "login.password-field" }
- inputText: ${TEST_PREMIUM_PASSWORD}
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "login.submit-button" }
- assertVisible: { id: "plan-generation.progress" }
- assertNotVisible: { id: "home.tab-bar" }
