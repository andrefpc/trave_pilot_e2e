appId: ${APP_ID}
name: WZ-CO-02
tags: [wizard, p0]
---
# >>> dashboard-meta
# WZ-CO-02 — A signed-out user reaching Complete Onboarding sees Create Account, Login and Sign up with Google buttons
# Section: Plan Creation Wizard
# Priority: P0
# Repro:
# 1. Cold-launch app while signed out, walk Create Plan all the way through Travel Times.
# 2. On Complete Onboarding, verify three buttons: "Create Account", "Login", "Sign up with Google".
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: _walk_to_complete_onboarding.yaml
- assertVisible: { id: "wizard.complete-onboarding.title" }
# Android (and iOS post-redesign) shows a single "Generate Plan" CTA
# here. Tapping it raises the SignUpBottomSheet which hosts the three
# auth options (Create Account / Login / Google) — those buttons keep
# their `wizard.complete-onboarding.*` ids so the test still asserts on
# the same labels, just after one extra tap.
- assertVisible: { id: "wizard.complete-onboarding.generate-plan-button" }
- tapOn: { id: "wizard.complete-onboarding.generate-plan-button" }
- extendedWaitUntil:
    visible: { id: "wizard.complete-onboarding.create-account-button" }
    timeout: 5000
- assertVisible: { id: "wizard.complete-onboarding.login-button" }
- assertVisible: { id: "wizard.complete-onboarding.google-button" }
