appId: ${APP_ID}
name: WZ-CO-02
tags: [wizard, p0]
---
# >>> dashboard-meta
# WZ-CO-02 — A signed-out user reaching Complete Onboarding sees Create Account, Login and Sign up with Google buttons
# Section: Plan Creation Wizard
# Priority: P0
# Repro:
# 1. Cold-launch app while signed out, walk Create Plan all the way through Travel Times.
# 2. On Complete Onboarding, verify three buttons: "Create Account", "Login", "Sign up with Google".
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- assertVisible: { id: "wizard.destination.title" }
- tapOn: { id: "wizard.destination.next-button" }
- tapOn: { id: "wizard.walking-style.next-button" }
- tapOn: { id: "wizard.companions.next-button" }
- tapOn: { id: "wizard.day-schedule.next-button" }
- tapOn: { id: "wizard.meal-time.next-button" }
- tapOn: { id: "wizard.budget.next-button" }
- tapOn: { id: "wizard.places-of-interest.next-button" }
- tapOn: { id: "wizard.restaurants.next-button" }
- tapOn: { id: "wizard.where-to-stay.next-button" }
- tapOn: { id: "wizard.travel-times.next-button" }
- assertVisible: { id: "wizard.complete-onboarding.title" }
- assertVisible: { id: "wizard.complete-onboarding.create-account-button" }
- assertVisible: { id: "wizard.complete-onboarding.login-button" }
- assertVisible: { id: "wizard.complete-onboarding.google-button" }
