appId: ${APP_ID}
name: WZ-WTS-03
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-WTS-03 — Tapping "Add custom hotel" on Where to Stay opens a form for name + address
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. On Where to Stay → tap "Add custom hotel" (or equivalent label).
# 2. Verify a form opens with Name and Address fields.
# 3. Fill them and confirm — verify a custom hotel chip appears in the city section.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ./_walk_to_wts.yaml
- assertVisible: { id: "wizard.where-to-stay.title" }
- tapOn: { id: "wizard.where-to-stay.city-section.0.add-custom-button" }
- assertVisible: { id: "wizard.where-to-stay.custom-form" }
- assertVisible: { id: "wizard.where-to-stay.custom-form.name-field" }
- assertVisible: { id: "wizard.where-to-stay.custom-form.address-field" }
- tapOn: { id: "wizard.where-to-stay.custom-form.name-field" }
- inputText: "My Boutique Hotel"
- tapOn: { id: "wizard.where-to-stay.custom-form.address-field" }
- inputText: "123 Via Roma"
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "wizard.where-to-stay.custom-form.confirm-button" }
- assertVisible: { id: "wizard.where-to-stay.city-section.0.custom-chip.0" }
