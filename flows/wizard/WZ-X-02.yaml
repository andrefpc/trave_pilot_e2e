appId: ${APP_ID}
name: WZ-X-02
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-X-02 — Force-killing the app at any wizard step then relaunching reopens that step with the saved data
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. Walk the wizard to Budget; pick non-default levels for several categories.
# 2. Force-stop the app via Settings → Apps.
# 3. Relaunch — verify Budget reopens with the same levels selected (saved on the draft).
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ./_walk_to_budget.yaml
- assertVisible: { id: "wizard.budget.title" }
# Budget was trimmed to Attractions + Transportation on both platforms.
# Pick non-default levels on both, force-stop the app, and verify the
# draft restored both selections after relaunch.
- tapOn: { id: "wizard.budget.card.attractions.high" }
- tapOn: { id: "wizard.budget.card.transportation.low" }
- launchApp:
    stopApp: true
# A fresh launch on Android lands on Welcome (it doesn't auto-restore
# into a wizard step yet — that would need to run on app start, which
# is a separate product call). Resume happens through the explicit
# Create Plan tap: WelcomeViewModel reads the wizardStepProvider
# marker for the latest draft and routes the user back to BUDGET
# with the picked levels rehydrated from the autosaved draft.
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- extendedWaitUntil:
    visible: { id: "wizard.budget.title" }
    timeout: 8000
- assertVisible: { id: "wizard.budget.card.attractions.high" }
- assertVisible: { id: "wizard.budget.card.transportation.low" }
