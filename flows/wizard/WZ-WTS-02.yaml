appId: ${APP_ID}
name: WZ-WTS-02
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-WTS-02 — Tapping the search icon on Where to Stay opens the Place Search bottom sheet
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. On Where to Stay → tap the hotel search field/icon.
# 2. Verify the Place Search bottom sheet slides up with a query box.
# 3. Type a hotel name; verify results appear and one can be tapped to select.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ./_walk_to_wts.yaml
- assertVisible: { id: "wizard.where-to-stay.title" }
- tapOn: { id: "wizard.where-to-stay.city-section.0.search-button" }
- assertVisible: { id: "wizard.where-to-stay.search-sheet" }
- assertVisible: { id: "wizard.where-to-stay.search-sheet.query-field" }
- tapOn: { id: "wizard.where-to-stay.search-sheet.query-field" }
- inputText: "Hilton"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "wizard.where-to-stay.search-sheet.result.0" }
- tapOn: { id: "wizard.where-to-stay.search-sheet.result.0" }
- assertVisible: { id: "wizard.where-to-stay.city-section.0.custom-chip.0" }
