appId: ${APP_ID}
name: WZ-B-03
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-B-03 — Tapping Low/Medium/High on a Budget card switches the selection without affecting other cards
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. On Budget, on the Accommodation card tap Low.
# 2. Verify Low is highlighted and Medium is no longer selected on Accommodation; other cards keep their previous selection.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: _walk_to_budget.yaml
# Android Budget renders Attractions + Transportation. Tap Low on the
# first card (Attractions) and verify the selection moves to Low without
# affecting the second card.
- assertVisible: { id: "wizard.budget.card.attractions" }
- tapOn: { id: "wizard.budget.card.attractions.medium" }
- tapOn: { id: "wizard.budget.card.transportation.medium" }
- tapOn: { id: "wizard.budget.card.attractions.low" }
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: { id: "wizard.budget.card.attractions.low" }
- assertVisible: { id: "wizard.budget.card.transportation.medium" }
