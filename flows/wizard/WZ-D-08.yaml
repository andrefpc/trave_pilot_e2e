appId: ${APP_ID}
name: WZ-D-08
tags: [wizard, p0]
---
# >>> dashboard-meta
# WZ-D-08 — Each destination card has Flight/Train/Car/Bus/Ferry chips with single-select behaviour
# Section: Plan Creation Wizard
# Priority: P0
# Repro:
# 1. From Welcome → Create Plan → Destination, add a destination.
# 2. Verify the card shows chips: Flight, Train, Car, Bus, Ferry.
# 3. Tap Train — verify only Train is highlighted; Flight is no longer selected.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- assertVisible: { id: "wizard.destination.title" }
- scrollUntilVisible:
    element: { id: "wizard.destination.add-destination-button" }
    direction: DOWN
- tapOn: { id: "wizard.destination.add-destination-button" }
- assertVisible: { id: "wizard.destination.card.1.transport.flight" }
- assertVisible: { id: "wizard.destination.card.1.transport.train" }
- assertVisible: { id: "wizard.destination.card.1.transport.car" }
- assertVisible: { id: "wizard.destination.card.1.transport.bus" }
- assertVisible: { id: "wizard.destination.card.1.transport.ferry" }
- tapOn: { id: "wizard.destination.card.1.transport.train" }
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: { id: "wizard.destination.card.1.transport.train" }
