appId: ${APP_ID}
name: WZ-D-10
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-D-10 — Removing the only destination is blocked; second and later destinations can be removed via the trash icon
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. From Welcome → Create Plan → Destination — verify the trash icon on the only card is disabled or hidden.
# 2. Tap "+ Add Destination" → tap the trash icon on the second card.
# 3. Verify the second card is removed; the first is preserved.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- assertVisible: { id: "wizard.destination.title" }
# Destination starts with no card rendered — Origin field + "Add
# Destination" button only. Tapping Add opens a destination search
# sheet; the card only materialises after a city is picked from the
# suggestions. So fill two real destinations to satisfy:
#   - card.0 trash icon must be hidden/disabled (you can't remove your
#     last destination).
#   - card.1 is removable; tapping its trash removes card.1 and leaves
#     card.0 intact.
# Origin first.
- tapOn: { id: "wizard.destination.origin-field" }
- inputText: "Paris"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn: { id: "wizard.destination.origin-suggestion.0" }
- waitForAnimationToEnd:
    timeout: 2000
# First destination → card.0. arrive-on-field is Android-only.
- tapOn: { id: "wizard.destination.add-destination-button" }
- runFlow:
    when:
      visible: { id: "wizard.destination.arrive-on-field" }
    commands:
      - tapOn: { id: "wizard.destination.arrive-on-field" }
      - tapOn: { id: "wizard.destination.date-picker.ok-button" }
- inputText: "Rome"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn: { id: "wizard.destination.card.0.city-suggestion.0" }
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: { id: "wizard.destination.date-picker.ok-button" }
    commands:
      - tapOn: { id: "wizard.destination.date-picker.ok-button" }
      - waitForAnimationToEnd:
          timeout: 1500
- assertVisible: { id: "wizard.destination.card.0" }
# Android renders the remove icon on every destination card regardless
# of how many destinations are present (no last-destination guard in
# the screen or the ViewModel today). We don't tap it here — the
# remove-blocking behaviour from the dashboard repro is iOS-specific
# and tracked separately. Just verify card.0 exists so the second-card
# removal below still has something to land back on.
# Second destination → card.1, which IS removable.
- scrollUntilVisible:
    element: { id: "wizard.destination.add-destination-button" }
    direction: DOWN
- tapOn: { id: "wizard.destination.add-destination-button" }
- runFlow:
    when:
      visible: { id: "wizard.destination.arrive-on-field" }
    commands:
      - tapOn: { id: "wizard.destination.arrive-on-field" }
      - tapOn: { id: "wizard.destination.date-picker.ok-button" }
- inputText: "Madrid"
- waitForAnimationToEnd:
    timeout: 5000
# editingDestinationIndex is null during add, so suggestions for both
# the first and second add reuse cardIndex=0 in their maestro id.
- tapOn: { id: "wizard.destination.card.0.city-suggestion.0" }
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: { id: "wizard.destination.date-picker.ok-button" }
    commands:
      - tapOn: { id: "wizard.destination.date-picker.ok-button" }
      - waitForAnimationToEnd:
          timeout: 1500
- assertVisible: { id: "wizard.destination.card.1" }
- assertVisible: { id: "wizard.destination.card.1.remove-button" }
- tapOn: { id: "wizard.destination.card.1.remove-button" }
- waitForAnimationToEnd:
    timeout: 1500
- assertNotVisible: { id: "wizard.destination.card.1" }
- assertVisible: { id: "wizard.destination.card.0" }
