appId: ${APP_ID}
name: WZ-MT-03
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-MT-03 — Toggling the "Skip" check on a meal card fades its time fields and marks the meal as skipped
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. On Meal Time → Coffee Break card, tap the Skip check box.
# 2. Verify the check fills and the Start/End fields fade to ~50% opacity.
# 3. Untoggle Skip — fields return to full opacity.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ../common/_wizard_fill_destination.yaml
- assertVisible: { id: "wizard.walking-style.title" }
- tapOn: { id: "wizard.walking-style.option.moderate" }
- tapOn: { id: "wizard.walking-style.next-button" }
- assertVisible: { id: "wizard.companions.title" }
- tapOn: { id: "wizard.companions.next-button" }
- assertVisible: { id: "wizard.day-schedule.title" }
- scrollUntilVisible:
    element: { id: "wizard.day-schedule.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.day-schedule.next-button" }
- assertVisible: { id: "wizard.meal-time.title" }
- scrollUntilVisible:
    element: { id: "wizard.meal-time.card.coffee-break.skip" }
    direction: DOWN
- tapOn: { id: "wizard.meal-time.card.coffee-break.skip" }
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: { id: "wizard.meal-time.card.coffee-break.skip" }
- tapOn: { id: "wizard.meal-time.card.coffee-break.skip" }
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: { id: "wizard.meal-time.card.coffee-break.start-field" }
