appId: ${APP_ID}
name: WZ-C-06
tags: [wizard, p2]
---
# >>> dashboard-meta
# WZ-C-06 — On Companions, tapping minus on Children or Infants at 0 does not decrement below 0
# Section: Plan Creation Wizard
# Priority: P2
# Repro:
# 1. On Companions with Children=0, tap minus on Children — value stays 0.
# 2. Same for Infants — minus at 0 is a no-op.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ../common/_wizard_fill_destination.yaml
- assertVisible: { id: "wizard.walking-style.title" }
- tapOn: { id: "wizard.walking-style.option.moderate" }
- tapOn: { id: "wizard.walking-style.next-button" }
- assertVisible: { id: "wizard.companions.title" }
- assertVisible:
    id: "wizard.companions.children.value"
    text: "0"
- tapOn: { id: "wizard.companions.children.minus" }
- assertVisible:
    id: "wizard.companions.children.value"
    text: "0"
- assertVisible:
    id: "wizard.companions.infants.value"
    text: "0"
- tapOn: { id: "wizard.companions.infants.minus" }
- assertVisible:
    id: "wizard.companions.infants.value"
    text: "0"
