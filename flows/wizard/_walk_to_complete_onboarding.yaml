appId: ${APP_ID}
tags: [helper]
---
# Reusable: assumes wizard.destination.title is visible (i.e. caller is
# already on the Destination step). Walks every wizard step end-to-end
# with minimal valid input and lands with `wizard.complete-onboarding.title`
# visible (when signed-out) or `plan-generation.progress` visible (when
# signed-in). Used by WZ-CO-01..04 + WZ-X-05 to exercise the full wizard
# flow without re-asserting every intermediate screen.
- runFlow: ../common/_wizard_fill_destination.yaml
- assertVisible: { id: "wizard.walking-style.title" }
- tapOn: { id: "wizard.walking-style.option.moderate" }
- tapOn: { id: "wizard.walking-style.next-button" }
- assertVisible: { id: "wizard.companions.title" }
- tapOn: { id: "wizard.companions.next-button" }
- assertVisible: { id: "wizard.day-schedule.title" }
- scrollUntilVisible:
    element: { id: "wizard.day-schedule.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.day-schedule.next-button" }
- assertVisible: { id: "wizard.meal-time.title" }
- scrollUntilVisible:
    element: { id: "wizard.meal-time.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.meal-time.next-button" }
- assertVisible: { id: "wizard.budget.title" }
# Budget.next is gated on every category being selected. Android renders
# Attractions + Transportation; iOS renders the full 6 (Accommodation,
# Food, Transportation, Attractions, Shopping, Night Life). Optional taps
# so unrendered categories are no-ops.
- tapOn:
    id: "wizard.budget.card.accommodation.medium"
    optional: true
- tapOn:
    id: "wizard.budget.card.food.medium"
    optional: true
- tapOn:
    id: "wizard.budget.card.transportation.medium"
    optional: true
- tapOn:
    id: "wizard.budget.card.attractions.medium"
    optional: true
- tapOn:
    id: "wizard.budget.card.shopping.medium"
    optional: true
- tapOn:
    id: "wizard.budget.card.nightlife.medium"
    optional: true
- scrollUntilVisible:
    element: { id: "wizard.budget.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.budget.next-button" }
- assertVisible: { id: "wizard.places-of-interest.title" }
# POI.next is gated on at least one place being selected.
- tapOn:
    id: "wizard.places-of-interest.recommended.0.check"
    optional: true
- scrollUntilVisible:
    element: { id: "wizard.places-of-interest.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.places-of-interest.next-button" }
- assertVisible: { id: "wizard.restaurants.title" }
- scrollUntilVisible:
    element: { id: "wizard.restaurants.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.restaurants.next-button" }
- assertVisible: { id: "wizard.where-to-stay.title" }
# Where-to-Stay auto-selects the recommended hotel as soon as the draft
# loads (WhereToStayViewModel sets selectedPlaceId = recommended?.placeId).
# Next is enabled by default — no need to open the detail sheet. Just
# wait for the recommendations to render and tap Next. Loop once to
# cover the 2-city case; single-city falls through to Travel Times.
- extendedWaitUntil:
    visible: { id: "wizard.where-to-stay.recommended-place-card" }
    timeout: 20000
- extendedWaitUntil:
    notVisible: { id: "common.loading-overlay" }
    timeout: 10000
- tapOn: { id: "wizard.where-to-stay.next-button" }
- runFlow:
    when:
      visible: { id: "wizard.where-to-stay.title" }
    commands:
      - extendedWaitUntil:
          visible: { id: "wizard.where-to-stay.recommended-place-card" }
          timeout: 20000
      - extendedWaitUntil:
          notVisible: { id: "common.loading-overlay" }
          timeout: 10000
      - tapOn: { id: "wizard.where-to-stay.next-button" }
- assertVisible: { id: "wizard.travel-times.title" }
- scrollUntilVisible:
    element: { id: "wizard.travel-times.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.travel-times.next-button" }
