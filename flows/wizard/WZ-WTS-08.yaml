appId: ${APP_ID}
name: WZ-WTS-08
tags: [wizard, p2, ios-only]
---
# >>> dashboard-meta
# WZ-WTS-08 — When the photo proxy is unreachable, hotel cards show a placeholder image with no crash
# Section: Plan Creation Wizard
# Priority: P2
# Repro:
# 1. Configure a proxy (e.g. mitmproxy) to block /proxy/google-photo.
# 2. Walk to Where to Stay.
# 3. Verify hotel cards show a generic placeholder image and the screen stays interactive.
# <<< dashboard-meta

# The dev build exposes a fault-injection hook (`hotelPhotoProxy=blocked`)
# that makes /proxy/google-photo return 503 for the next session, mirroring an
# unreachable proxy without an external mitmproxy.
- runFlow: ../common/_reset_data.yaml
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
    arguments:
      hotelPhotoProxy: "blocked"
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ./_walk_to_wts.yaml
- assertVisible: { id: "wizard.where-to-stay.title" }
- assertVisible: { id: "wizard.where-to-stay.city-section.0.hotel-card.0" }
- assertVisible: { id: "wizard.where-to-stay.city-section.0.hotel-card.0.photo.placeholder-marker" }
- tapOn: { id: "wizard.where-to-stay.city-section.0.hotel-card.0" }
- assertVisible: { id: "wizard.where-to-stay.title" }
