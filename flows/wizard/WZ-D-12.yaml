appId: ${APP_ID}
name: WZ-D-12
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-D-12 — Killing the app mid-Destination then relaunching restores the same Destination data
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. From Welcome → Create Plan → Destination, fill Origin (Paris), Departure Jan 15, Return Jan 20.
# 2. Force-stop the app from Recents.
# 3. Relaunch — verify the wizard resumes on Destination with the same Origin and dates filled in.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- assertVisible: { id: "wizard.destination.title" }
- tapOn: { id: "wizard.destination.origin-field" }
- inputText: "Paris"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn: { id: "wizard.destination.origin-suggestion.0" }
- tapOn: { id: "wizard.destination.departure-field" }
- tapOn: { id: "wizard.destination.date-picker.ok-button" }
- tapOn: { id: "wizard.destination.return-field" }
- tapOn: { id: "wizard.destination.date-picker.ok-button" }
- launchApp:
    stopApp: true
- assertVisible: { id: "wizard.destination.title" }
- assertVisible: { id: "wizard.destination.origin-field" }
- assertVisible: { id: "wizard.destination.departure-field" }
- assertVisible: { id: "wizard.destination.return-field" }
