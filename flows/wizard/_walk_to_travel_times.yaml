appId: ${APP_ID}
tags: [helper, ios-only]
---
# Reusable: assumes wizard.destination.title is visible. Walks all the way
# to Travel Times via two destination cities so a leg row exists. Lands with
# wizard.travel-times.title visible.
- runFlow: ../common/_wizard_fill_destination_two_cities.yaml
- assertVisible: { id: "wizard.walking-style.title" }
- tapOn: { id: "wizard.walking-style.option.moderate" }
- tapOn: { id: "wizard.walking-style.next-button" }
- assertVisible: { id: "wizard.companions.title" }
- tapOn: { id: "wizard.companions.next-button" }
- assertVisible: { id: "wizard.day-schedule.title" }
- scrollUntilVisible:
    element: { id: "wizard.day-schedule.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.day-schedule.next-button" }
- assertVisible: { id: "wizard.meal-time.title" }
- scrollUntilVisible:
    element: { id: "wizard.meal-time.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.meal-time.next-button" }
- assertVisible: { id: "wizard.budget.title" }
- scrollUntilVisible:
    element: { id: "wizard.budget.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.budget.next-button" }
- assertVisible: { id: "wizard.places-of-interest.title" }
# `.check` toggles selection on Android (the card body opens the
# detail sheet). Same pattern as SMK-02/04/05.
- tapOn:
    id: "wizard.places-of-interest.recommended.0.check"
    optional: true
- scrollUntilVisible:
    element: { id: "wizard.places-of-interest.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.places-of-interest.next-button" }
- assertVisible: { id: "wizard.restaurants.title" }
- scrollUntilVisible:
    element: { id: "wizard.restaurants.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.restaurants.next-button" }
- assertVisible: { id: "wizard.where-to-stay.title" }
# New Where to Stay design shows one city at a time; tap recommended place,
# then Next advances to the next city until both are selected.
- assertVisible: { id: "wizard.where-to-stay.city-chip" }
- tapOn: { id: "wizard.where-to-stay.recommended-place-card" }
- scrollUntilVisible:
    element: { id: "wizard.where-to-stay.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.where-to-stay.next-button" }
- assertVisible: { id: "wizard.where-to-stay.city-chip" }
- tapOn: { id: "wizard.where-to-stay.recommended-place-card" }
- scrollUntilVisible:
    element: { id: "wizard.where-to-stay.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.where-to-stay.next-button" }
- assertVisible: { id: "wizard.travel-times.title" }
