appId: ${APP_ID}
name: WZ-WTS-07
tags: [wizard, p2]
---
# >>> dashboard-meta
# WZ-WTS-07 — Where to Stay hotel images load through /proxy/google-photo (not direct Google URLs)
# Section: Plan Creation Wizard
# Priority: P2
# Repro:
# 1. With Network Profiler running, scroll the Where to Stay screen so hotel cards render.
# 2. Inspect image requests — verify they go to /proxy/google-photo on the API host (no direct googleusercontent.com).
# <<< dashboard-meta

# Maestro can't read the network profiler. The dev build tags every hotel
# photo node with one of two markers identifying the host the image was loaded
# from (`proxy` vs `direct`) so we can assert the proxy was used end-to-end
# without needing a packet capture.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ./_walk_to_wts.yaml
- assertVisible: { id: "wizard.where-to-stay.title" }
- assertVisible: { id: "wizard.where-to-stay.city-section.0.hotel-card.0.photo" }
- assertVisible: { id: "wizard.where-to-stay.city-section.0.hotel-card.0.photo.proxy-marker" }
- assertNotVisible: { id: "wizard.where-to-stay.city-section.0.hotel-card.0.photo.direct-marker" }
