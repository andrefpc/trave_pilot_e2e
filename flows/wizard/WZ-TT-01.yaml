appId: ${APP_ID}
name: WZ-TT-01
tags: [wizard, p1, ios-only]
---
# >>> dashboard-meta
# WZ-TT-01 — Travel Times shows one row per inter-city leg of the trip
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. Walk the wizard with 2 cities (Paris → Rome) to Travel Times.
# 2. Verify a row "Departure from Paris to Rome" appears.
# 3. With 3 cities, verify there is one row per consecutive pair.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ./_walk_to_travel_times.yaml
- assertVisible: { id: "wizard.travel-times.title" }
- assertVisible: { id: "wizard.travel-times.leg.0" }
- assertVisible: { id: "wizard.travel-times.leg.1" }
