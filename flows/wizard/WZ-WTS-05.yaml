appId: ${APP_ID}
name: WZ-WTS-05
tags: [wizard, p1, ios-only]
---
# >>> dashboard-meta
# WZ-WTS-05 — Tapping "View details" on a Where to Stay hotel card opens its website in a Custom Tab
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. On Where to Stay, on a hotel card tap "View details" or the external-link icon.
# 2. Verify a Chrome Custom Tab opens to the hotel's website URL.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ./_walk_to_wts.yaml
- assertVisible: { id: "wizard.where-to-stay.title" }
- tapOn: { id: "wizard.where-to-stay.city-section.0.hotel-card.0.view-details-button" }
- assertVisible: { id: "external-browser.url-bar" }
