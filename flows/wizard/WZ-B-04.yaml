appId: ${APP_ID}
name: WZ-B-04
tags: [wizard, p2]
---
# >>> dashboard-meta
# WZ-B-04 — Selecting a level on a Budget card auto-scrolls to the next category card
# Section: Plan Creation Wizard
# Priority: P2
# Repro:
# 1. On Budget, on Accommodation tap any level (e.g. Low).
# 2. Verify the screen smoothly scrolls so the next card (Food) is now visible.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: _walk_to_budget.yaml
- assertVisible: { id: "wizard.budget.card.accommodation" }
- tapOn: { id: "wizard.budget.card.accommodation.low" }
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: { id: "wizard.budget.card.food" }
