appId: ${APP_ID}
name: WZ-R-01
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-R-01 — On Restaurants, picking restaurants and tapping Next sends a PATCH and opens Where to Stay
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. Walk the wizard to Restaurants.
# 2. Search and select one or more restaurants; optionally tag with meal types.
# 3. Tap Next — verify a PATCH fires saving the selection and Where to Stay opens.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ./_walk_to_restaurants.yaml
- assertVisible: { id: "wizard.restaurants.title" }
- tapOn: { id: "wizard.restaurants.search-field" }
- inputText: "Trattoria"
- waitForAnimationToEnd:
    timeout: 5000
- runFlow: ../common/_hide_keyboard.yaml
# Tapping the card body is a no-op on Android — the `.add-button` icon
# is the actual selection control. `onRestaurantSelected` flips
# isSearchSheetVisible=false so the sheet auto-dismisses (no system
# back needed; that would pop the wizard nav stack back to POI).
- tapOn: { id: "wizard.restaurants.search-result.0.add-button" }
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    notVisible: { id: "common.loading-overlay" }
    timeout: 12000
- scrollUntilVisible:
    element: { id: "wizard.restaurants.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.restaurants.next-button" }
- assertVisible: { id: "wizard.where-to-stay.title" }
