appId: ${APP_ID}
name: WZ-MT-02
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-MT-02 — On Meal Time, the Start and End fields on each meal card open the time picker and save the picked time
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. On Meal Time → Breakfast card, tap Start → pick 07:00 → OK.
# 2. Tap End → pick 08:00 → OK.
# 3. Verify both fields display the picked times. Repeat for Lunch / Coffee Break / Dinner as needed.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ../common/_wizard_fill_destination.yaml
- assertVisible: { id: "wizard.walking-style.title" }
- tapOn: { id: "wizard.walking-style.option.moderate" }
- tapOn: { id: "wizard.walking-style.next-button" }
- assertVisible: { id: "wizard.companions.title" }
- tapOn: { id: "wizard.companions.next-button" }
- assertVisible: { id: "wizard.day-schedule.title" }
- scrollUntilVisible:
    element: { id: "wizard.day-schedule.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.day-schedule.next-button" }
- assertVisible: { id: "wizard.meal-time.title" }
- tapOn: { id: "wizard.meal-time.card.breakfast.start-field" }
- assertVisible: { id: "wizard.meal-time.time-picker" }
- tapOn: { id: "wizard.meal-time.time-picker.ok-button" }
- assertNotVisible: { id: "wizard.meal-time.time-picker" }
- tapOn: { id: "wizard.meal-time.card.breakfast.end-field" }
- assertVisible: { id: "wizard.meal-time.time-picker" }
- tapOn: { id: "wizard.meal-time.time-picker.ok-button" }
- assertNotVisible: { id: "wizard.meal-time.time-picker" }
- assertVisible: { id: "wizard.meal-time.card.breakfast.start-field" }
- assertVisible: { id: "wizard.meal-time.card.breakfast.end-field" }
