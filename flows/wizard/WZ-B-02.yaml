appId: ${APP_ID}
name: WZ-B-02
tags: [wizard, p2]
---
# >>> dashboard-meta
# WZ-B-02 — Each Budget category defaults to Medium pre-selected on first visit
# Section: Plan Creation Wizard
# Priority: P2
# Repro:
# 1. Walk the wizard to Budget for the first time on a fresh draft.
# 2. Verify each card shows Medium highlighted and Low/High not selected.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: _walk_to_budget.yaml
- assertVisible: { id: "wizard.budget.card.accommodation.medium" }
- assertVisible: { id: "wizard.budget.card.food.medium" }
- scrollUntilVisible:
    element: { id: "wizard.budget.card.transportation.medium" }
    direction: DOWN
- assertVisible: { id: "wizard.budget.card.transportation.medium" }
- scrollUntilVisible:
    element: { id: "wizard.budget.card.attractions.medium" }
    direction: DOWN
- assertVisible: { id: "wizard.budget.card.attractions.medium" }
- scrollUntilVisible:
    element: { id: "wizard.budget.card.shopping.medium" }
    direction: DOWN
- assertVisible: { id: "wizard.budget.card.shopping.medium" }
- scrollUntilVisible:
    element: { id: "wizard.budget.card.nightlife.medium" }
    direction: DOWN
- assertVisible: { id: "wizard.budget.card.nightlife.medium" }
