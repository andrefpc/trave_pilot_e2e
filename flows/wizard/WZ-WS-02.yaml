appId: ${APP_ID}
name: WZ-WS-02
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-WS-02 — Tapping a Walking Style option deselects any previously selected one (single-select)
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. On Walking Style, tap "All day" — it becomes highlighted.
# 2. Tap "Moderate walking" — verify "All day" is no longer highlighted and only "Moderate walking" is selected.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ../common/_wizard_fill_destination.yaml
- assertVisible: { id: "wizard.walking-style.title" }
- tapOn: { id: "wizard.walking-style.option.all-day" }
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: { id: "wizard.walking-style.option.moderate" }
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: { id: "wizard.walking-style.next-button" }
- assertVisible: { id: "wizard.companions.title" }
