appId: ${APP_ID}
name: WZ-C-04
tags: [wizard, p2]
---
# >>> dashboard-meta
# WZ-C-04 — On Companions, tapping plus on Children stops at 20
# Section: Plan Creation Wizard
# Priority: P2
# Repro:
# 1. On Companions, tap the plus button on Children repeatedly until the value reaches 20.
# 2. Verify the counter stops at 20.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ../common/_wizard_fill_destination.yaml
- assertVisible: { id: "wizard.walking-style.title" }
- tapOn: { id: "wizard.walking-style.option.moderate" }
- tapOn: { id: "wizard.walking-style.next-button" }
- assertVisible: { id: "wizard.companions.title" }
- repeat:
    times: 25
    commands:
      - tapOn: { id: "wizard.companions.children.plus" }
- assertVisible:
    id: "wizard.companions.children.value"
    text: "20"
