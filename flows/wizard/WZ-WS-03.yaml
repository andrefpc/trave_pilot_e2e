appId: ${APP_ID}
name: WZ-WS-03
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-WS-03 — The "Next" button on Walking Style is disabled until an option is selected
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. On Walking Style with no selection, the Next button is greyed out.
# 2. Tap any option (e.g. Moderate walking) — verify Next becomes enabled.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ../common/_wizard_fill_destination.yaml
- assertVisible: { id: "wizard.walking-style.title" }
- tapOn: { id: "wizard.walking-style.next-button" }
- assertVisible: { id: "wizard.walking-style.title" }
- tapOn: { id: "wizard.walking-style.option.moderate" }
- tapOn: { id: "wizard.walking-style.next-button" }
- assertNotVisible: { id: "wizard.walking-style.title" }
