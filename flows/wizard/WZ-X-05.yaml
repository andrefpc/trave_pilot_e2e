appId: ${APP_ID}
name: WZ-X-05
tags: [wizard, p0]
---
# >>> dashboard-meta
# WZ-X-05 — A free user with one active plan completing the wizard hits 403 on the final save → paywall
# Section: Plan Creation Wizard
# Priority: P0
# Repro:
# 1. Sign in as a free user that already has 1 active plan.
# 2. Walk the entire wizard to the final save.
# 3. Verify POST /travel-plans/full returns 403 and the Premium bottom sheet appears.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- assertVisible: { id: "home.tab-bar" }
- tapOn: { id: "home.tab.travel-plans" }
# The orchestrator's `seed-plan-cap` setup ensures the free user owns
# exactly one plan before this flow runs. On Android the paywall fires
# eagerly when the user taps Add (rather than at submit time as iOS
# does), so we never get into the wizard — assert the premium sheet
# appears immediately and `plan-generation` is NOT reached.
- tapOn: { id: "travel-plans.add-button" }
# Android surfaces the eager paywall as the `premium-gate.sheet`
# ("This is a premium feature" with Watch & Unlock for Free / Go
# Premium CTAs). iOS may use a different sheet name — flow asserts
# whichever marker is present.
- extendedWaitUntil:
    visible: { id: "premium-gate.sheet" }
    timeout: 5000
- assertVisible: { id: "premium-gate.title" }
- assertVisible: { id: "premium-gate.go-premium-button" }
- assertNotVisible: { id: "plan-generation.progress" }
- assertNotVisible: { id: "wizard.destination.title" }
