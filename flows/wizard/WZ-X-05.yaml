appId: ${APP_ID}
name: WZ-X-05
tags: [wizard, p0]
---
# >>> dashboard-meta
# WZ-X-05 — A free user with one active plan completing the wizard hits 403 on the final save → paywall
# Section: Plan Creation Wizard
# Priority: P0
# Repro:
# 1. Sign in as a free user that already has 1 active plan.
# 2. Walk the entire wizard to the final save.
# 3. Verify POST /travel-plans/full returns 403 and the Premium bottom sheet appears.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- assertVisible: { id: "home.tab-bar" }
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "travel-plans.add-button" }
- assertVisible: { id: "wizard.destination.title" }
- tapOn: { id: "wizard.destination.next-button" }
- tapOn: { id: "wizard.walking-style.next-button" }
- tapOn: { id: "wizard.companions.next-button" }
- tapOn: { id: "wizard.day-schedule.next-button" }
- tapOn: { id: "wizard.meal-time.next-button" }
- tapOn: { id: "wizard.budget.next-button" }
- tapOn: { id: "wizard.places-of-interest.next-button" }
- tapOn: { id: "wizard.restaurants.next-button" }
- tapOn: { id: "wizard.where-to-stay.next-button" }
- tapOn: { id: "wizard.travel-times.next-button" }
- assertVisible: { id: "premium.bottom-sheet.title" }
- assertVisible: { id: "premium.bottom-sheet.cta" }
- assertNotVisible: { id: "plan-generation.progress" }
