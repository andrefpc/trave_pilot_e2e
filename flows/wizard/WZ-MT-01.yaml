appId: ${APP_ID}
name: WZ-MT-01
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-MT-01 — Meal Time shows four cards: Breakfast, Lunch, Coffee Break, Dinner
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. Walk the wizard to Meal Time.
# 2. Verify cards labelled "Breakfast", "Lunch", "Coffee Break" and "Dinner" are visible in that order.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ../common/_wizard_fill_destination.yaml
- assertVisible: { id: "wizard.walking-style.title" }
- tapOn: { id: "wizard.walking-style.option.moderate" }
- tapOn: { id: "wizard.walking-style.next-button" }
- assertVisible: { id: "wizard.companions.title" }
- tapOn: { id: "wizard.companions.next-button" }
- assertVisible: { id: "wizard.day-schedule.title" }
- scrollUntilVisible:
    element: { id: "wizard.day-schedule.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.day-schedule.next-button" }
- assertVisible: { id: "wizard.meal-time.title" }
- assertVisible: { id: "wizard.meal-time.card.breakfast" }
- assertVisible: { id: "wizard.meal-time.card.lunch" }
- assertVisible: { id: "wizard.meal-time.card.coffee-break" }
- scrollUntilVisible:
    element: { id: "wizard.meal-time.card.dinner" }
    direction: DOWN
- assertVisible: { id: "wizard.meal-time.card.dinner" }
