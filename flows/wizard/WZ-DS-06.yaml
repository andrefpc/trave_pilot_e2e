appId: ${APP_ID}
name: WZ-DS-06
tags: [wizard, p2]
---
# >>> dashboard-meta
# WZ-DS-06 — If the "Apply same times to all days" option exists, using it copies start/end to every day card
# Section: Plan Creation Wizard
# Priority: P2
# Repro:
# 1. On Day Schedule with 3+ days, fill Start/End on Day 1.
# 2. Tap "Apply same times to all days" (if present).
# 3. Verify the same Start/End appear on every other day card.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ../common/_wizard_fill_destination_two_cities.yaml
- assertVisible: { id: "wizard.walking-style.title" }
- tapOn: { id: "wizard.walking-style.option.moderate" }
- tapOn: { id: "wizard.walking-style.next-button" }
- assertVisible: { id: "wizard.companions.title" }
- tapOn: { id: "wizard.companions.next-button" }
- assertVisible: { id: "wizard.day-schedule.title" }
- tapOn: { id: "wizard.day-schedule.day-card.0.start-field" }
- tapOn: { id: "wizard.day-schedule.time-picker.ok-button" }
- tapOn: { id: "wizard.day-schedule.day-card.0.end-field" }
- tapOn: { id: "wizard.day-schedule.time-picker.ok-button" }
- runFlow:
    when:
      visible:
        id: "wizard.day-schedule.apply-to-all-button"
    commands:
      - tapOn: { id: "wizard.day-schedule.apply-to-all-button" }
      - assertVisible: { id: "wizard.day-schedule.day-card.1.start-field" }
      - assertVisible: { id: "wizard.day-schedule.day-card.1.end-field" }
