appId: ${APP_ID}
name: WZ-C-07
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-C-07 — Tapping Next on Companions saves the values and opens Day Schedule
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. On Companions, set Adults=1, Children=1, Infants=0.
# 2. Tap Next.
# 3. Verify a PUT to /travel-plans/:id/companions fires and Day Schedule opens.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ../common/_wizard_fill_destination.yaml
- assertVisible: { id: "wizard.walking-style.title" }
- tapOn: { id: "wizard.walking-style.option.moderate" }
- tapOn: { id: "wizard.walking-style.next-button" }
- assertVisible: { id: "wizard.companions.title" }
- scrollUntilVisible:
    element: { id: "wizard.companions.children.plus" }
    direction: DOWN
- tapOn: { id: "wizard.companions.children.plus" }
- assertVisible:
    id: "wizard.companions.children.value"
    text: "1"
- tapOn: { id: "wizard.companions.next-button" }
- assertVisible: { id: "wizard.day-schedule.title" }
