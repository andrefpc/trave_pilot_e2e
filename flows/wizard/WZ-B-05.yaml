appId: ${APP_ID}
name: WZ-B-05
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-B-05 — Tapping Next on Budget sends PUT /travel-plans/:id/budget and opens Places of Interest
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. On Budget with all six categories selected, tap Next.
# 2. Verify a PUT to /travel-plans/:id/budget fires with the array of {category, level} and Places of Interest opens.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: _walk_to_budget.yaml
# Budget.next is gated on a level being selected for every rendered
# category. Android renders Attractions + Transportation; iOS renders the
# full 6 (Accommodation, Food, Transportation, Attractions, Shopping,
# Night Life). Optional taps so unrendered categories are no-ops.
- tapOn:
    id: "wizard.budget.card.accommodation.medium"
    optional: true
- tapOn:
    id: "wizard.budget.card.food.medium"
    optional: true
- tapOn:
    id: "wizard.budget.card.transportation.medium"
    optional: true
- tapOn:
    id: "wizard.budget.card.attractions.medium"
    optional: true
- tapOn:
    id: "wizard.budget.card.shopping.medium"
    optional: true
- tapOn:
    id: "wizard.budget.card.nightlife.medium"
    optional: true
- scrollUntilVisible:
    element: { id: "wizard.budget.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.budget.next-button" }
- assertVisible: { id: "wizard.places-of-interest.title" }
