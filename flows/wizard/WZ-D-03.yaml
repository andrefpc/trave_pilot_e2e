appId: ${APP_ID}
name: WZ-D-03
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-D-03 — Typing gibberish into Origin and confirming shows a "City not found" error
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. From Welcome → Create Plan → Destination → Origin field.
# 2. Type "ZZZQQQ" and try to confirm.
# 3. Verify an inline error like "City not found" appears.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- assertVisible: { id: "wizard.destination.title" }
- tapOn: { id: "wizard.destination.origin-field" }
- inputText: "ZZZQQQ"
- waitForAnimationToEnd:
    timeout: 5000
- hideKeyboard
- assertVisible: { id: "wizard.destination.origin-error" }
