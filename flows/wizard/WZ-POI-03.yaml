appId: ${APP_ID}
name: WZ-POI-03
tags: [wizard, p2, ios-only]
---
# >>> dashboard-meta
# WZ-POI-03 — Tapping a selected place on Places of Interest deselects it
# Section: Plan Creation Wizard
# Priority: P2
# Repro:
# 1. On Places of Interest, tap a place to select it (highlighted).
# 2. Tap the same place again.
# 3. Verify it becomes deselected (no longer highlighted).
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ./_walk_to_poi.yaml
- assertVisible: { id: "wizard.places-of-interest.title" }
- tapOn: { id: "wizard.places-of-interest.place.0" }
- assertVisible: { id: "wizard.places-of-interest.place.0.selected-marker" }
- tapOn: { id: "wizard.places-of-interest.place.0" }
- assertNotVisible: { id: "wizard.places-of-interest.place.0.selected-marker" }
