appId: ${APP_ID}
tags: [helper]
---
# Reusable: assumes wizard.destination.title is visible. Walks to Restaurants
# (POI → tap one POI → Next). Lands with wizard.restaurants.title visible.
- runFlow: _walk_to_poi.yaml
- assertVisible: { id: "wizard.places-of-interest.title" }
# Tap the recommendation's `.check` icon to select it (tapping the card
# body opens the place-detail sheet on Android). After selection, the
# recommendation moves to the "selected places" list and the next
# recommendation slides into `recommended.0`, satisfying POI.next's
# "at least one selected" gate. Same pattern as SMK-02/04/05.
- tapOn:
    id: "wizard.places-of-interest.recommended.0.check"
    optional: true
- scrollUntilVisible:
    element: { id: "wizard.places-of-interest.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.places-of-interest.next-button" }
- assertVisible: { id: "wizard.restaurants.title" }
