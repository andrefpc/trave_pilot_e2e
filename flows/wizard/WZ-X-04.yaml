appId: ${APP_ID}
name: WZ-X-04
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-X-04 — Walking forward through wizard steps and back again preserves the data on every step
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. Fill Destination, Walking Style, Companions, Day Schedule (each step has data).
# 2. Walk back step-by-step using the back arrow.
# 3. Verify each previous step still shows the values you entered.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ../common/_wizard_fill_destination.yaml
- assertVisible: { id: "wizard.walking-style.title" }
- tapOn: { id: "wizard.walking-style.option.moderate" }
- tapOn: { id: "wizard.walking-style.next-button" }
- assertVisible: { id: "wizard.companions.title" }
- tapOn: { id: "wizard.companions.adults.plus" }
- tapOn: { id: "wizard.companions.next-button" }
- assertVisible: { id: "wizard.day-schedule.title" }
# Step back through each prior wizard step and confirm the data we
# entered is still there. Toolbar back arrow has no maestro id yet on
# either platform; system back fires the same NavigateBack effect.
- back
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: { id: "wizard.companions.title" }
- assertVisible:
    id: "wizard.companions.adults.value"
    text: "2"
- back
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: { id: "wizard.walking-style.title" }
- assertVisible: { id: "wizard.walking-style.option.moderate" }
- back
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: { id: "wizard.destination.title" }
- assertVisible: { id: "wizard.destination.origin-field" }
- assertVisible: { id: "wizard.destination.card.0.city-field" }
