appId: ${APP_ID}
name: WZ-MT-05
tags: [wizard, p2]
---
# >>> dashboard-meta
# WZ-MT-05 — Skipping all four meals on Meal Time is allowed by the client; the server enforces the minimum
# Section: Plan Creation Wizard
# Priority: P2
# Repro:
# 1. On Meal Time, toggle Skip on Breakfast, Lunch, Coffee Break and Dinner.
# 2. Verify Next remains enabled and tapping it goes to Budget — the server may reject if its policy requires ≥1 meal.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ../common/_wizard_fill_destination.yaml
- assertVisible: { id: "wizard.walking-style.title" }
- tapOn: { id: "wizard.walking-style.option.moderate" }
- tapOn: { id: "wizard.walking-style.next-button" }
- assertVisible: { id: "wizard.companions.title" }
- tapOn: { id: "wizard.companions.next-button" }
- assertVisible: { id: "wizard.day-schedule.title" }
- scrollUntilVisible:
    element: { id: "wizard.day-schedule.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.day-schedule.next-button" }
- assertVisible: { id: "wizard.meal-time.title" }
- tapOn: { id: "wizard.meal-time.card.breakfast.skip" }
- tapOn: { id: "wizard.meal-time.card.lunch.skip" }
- scrollUntilVisible:
    element: { id: "wizard.meal-time.card.coffee-break.skip" }
    direction: DOWN
- tapOn: { id: "wizard.meal-time.card.coffee-break.skip" }
- scrollUntilVisible:
    element: { id: "wizard.meal-time.card.dinner.skip" }
    direction: DOWN
- tapOn: { id: "wizard.meal-time.card.dinner.skip" }
- scrollUntilVisible:
    element: { id: "wizard.meal-time.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.meal-time.next-button" }
# iOS gates "all four skipped" client-side with a "At least one meal
# must be active" dialog; Android lets the request through and relies
# on the server to enforce. Accept either outcome: if the gate shows,
# dismiss + unskip Breakfast and retry; otherwise we're already on
# Budget.
- runFlow:
    when:
      visible:
        text: "At least one meal must be active"
    commands:
      - tapOn:
          text: "Dismiss"
      - scrollUntilVisible:
          element: { id: "wizard.meal-time.card.breakfast.skip" }
          direction: UP
      - tapOn: { id: "wizard.meal-time.card.breakfast.skip" }
      - scrollUntilVisible:
          element: { id: "wizard.meal-time.next-button" }
          direction: DOWN
      - tapOn: { id: "wizard.meal-time.next-button" }
- assertVisible: { id: "wizard.budget.title" }
