appId: ${APP_ID}
name: WZ-X-03
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-X-03 — A network error during a wizard PATCH shows an error dialog with Retry; Retry succeeds when reconnected
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. On any wizard step, fill data and tap Next.
# 2. Mid-request, toggle airplane mode on so the PATCH fails.
# 3. Verify a Retry dialog appears.
# 4. Disable airplane mode and tap Retry — the request succeeds and the next step opens.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ../common/_wizard_fill_destination.yaml
- assertVisible: { id: "wizard.walking-style.title" }
- tapOn: { id: "wizard.walking-style.option.moderate" }
- toggleAirplaneMode
- tapOn: { id: "wizard.walking-style.next-button" }
- assertVisible: { id: "wizard.error-dialog.title" }
- assertVisible: { id: "wizard.error-dialog.retry-button" }
- toggleAirplaneMode
- tapOn: { id: "wizard.error-dialog.retry-button" }
- assertVisible: { id: "wizard.companions.title" }
