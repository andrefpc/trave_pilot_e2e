appId: ${APP_ID}
name: WZ-DS-04
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-DS-04 — On Day Schedule, setting end time before start time shows an inline error
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. On a Day Schedule card, set Start of the day to 08:00.
# 2. Set End of the day to 06:00.
# 3. Verify an inline error like "End time must be after start time" appears.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ../common/_wizard_fill_destination.yaml
- assertVisible: { id: "wizard.walking-style.title" }
- tapOn: { id: "wizard.walking-style.option.moderate" }
- tapOn: { id: "wizard.walking-style.next-button" }
- assertVisible: { id: "wizard.companions.title" }
- tapOn: { id: "wizard.companions.next-button" }
- assertVisible: { id: "wizard.day-schedule.title" }
- tapOn: { id: "wizard.day-schedule.day-card.0.start-field" }
- tapOn: { id: "wizard.day-schedule.time-picker.ok-button" }
- tapOn: { id: "wizard.day-schedule.day-card.0.end-field" }
- tapOn: { id: "wizard.day-schedule.time-picker.ok-button" }
- assertVisible: { id: "wizard.day-schedule.day-card.0.error" }
