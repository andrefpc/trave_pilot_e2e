appId: ${APP_ID}
name: WZ-B-01
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-B-01 — Budget shows six category cards: Accommodation, Food, Transportation, Attractions, Shopping, Night Life
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. Walk the wizard to Budget.
# 2. Verify six cards in this order with banner images: Accommodation, Food, Transportation, Attractions, Shopping, Night Life.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: _walk_to_budget.yaml
# Budget intentionally trimmed to two user-facing categories on Android
# (Attractions + Transportation) — the historical four (Accommodation /
# Food / Shopping / Night Life) were removed to reduce wizard friction.
- assertVisible: { id: "wizard.budget.card.attractions" }
- scrollUntilVisible:
    element: { id: "wizard.budget.card.transportation" }
    direction: DOWN
- assertVisible: { id: "wizard.budget.card.transportation" }
