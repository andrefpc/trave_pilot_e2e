appId: ${APP_ID}
name: THM-07
tags: [a11y, p2]
---
# >>> dashboard-meta
# THM-07 — Spacing in code uses TravelPilotTheme.spacing tokens, not magic dp numbers
# Section: Localization, Accessibility, Theming
# Priority: P2
# Repro:
# 1. From the Android repo root run `grep -rE 'padding\(|Modifier\.size\(|Modifier\.padding\(' app/src/main/java`.
# 2. For each match, verify the dp value comes from TravelPilotTheme.spacing.* (or Material3 spacing tokens), not a literal Modifier.padding(8.dp).
# <<< dashboard-meta

# Maestro can't grep the Android source tree. The closest runtime proxy
# is to flip the in-app Theme between Light and Dark and walk the major
# screens — if magic dp numbers were used in place of theme-spacing
# tokens, layouts would shift between themes and the per-screen
# accessibility ids could move off-screen or fail to render.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.settings-button" }
- tapOn: { id: "settings.theme-row" }
- tapOn: { id: "settings.theme.option.light" }
- launchApp:
    stopApp: true
- tapOn: { id: "home.tab.home" }
- assertVisible: { id: "home.theme.light-marker" }
- tapOn: { id: "home.day-card.0" }
- assertVisible: { id: "itinerary-day.theme.light-marker" }
- assertVisible: { id: "itinerary-day.stop.0" }
- pressKey: "back"
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.settings-button" }
- tapOn: { id: "settings.theme-row" }
- tapOn: { id: "settings.theme.option.dark" }
- launchApp:
    stopApp: true
- tapOn: { id: "home.tab.home" }
- assertVisible: { id: "home.theme.dark-marker" }
- tapOn: { id: "home.day-card.0" }
- assertVisible: { id: "itinerary-day.theme.dark-marker" }
- assertVisible: { id: "itinerary-day.stop.0" }
