appId: ${APP_ID}
name: ITE-18
tags: [edit, p1]
---
# >>> dashboard-meta
# ITE-18 — Adding a place that already exists in the itinerary shows a Force-Replace confirmation dialog
# Section: Itinerary Editing & Rearrange
# Priority: P1
# Repro:
# 1. As premium, on Rearrange Day tap "+ Add Stop" and try to add a place already in the itinerary.
# 2. Verify a "Force Replace" confirmation sheet appears with Confirm/Cancel.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- tapOn: { id: "itinerary.toolbar.rearrange-button" }
- assertVisible: { id: "itinerary-edit.screen" }
- tapOn: { id: "itinerary-edit.add-stop-button" }
- assertVisible: { id: "place-search.sheet" }
- tapOn: { id: "place-search.input" }
- inputText: ${TEST_DUPLICATE_PLACE_NAME}
- waitForAnimationToEnd:
    timeout: 3000
- tapOn: { id: "place-search.result.0" }
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: { id: "itinerary-edit.force-replace-sheet" }
- assertVisible: { id: "itinerary-edit.force-replace-sheet.confirm-button" }
- assertVisible: { id: "itinerary-edit.force-replace-sheet.cancel-button" }
