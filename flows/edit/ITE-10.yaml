appId: ${APP_ID}
name: ITE-10
tags: [edit, p0]
---
# >>> dashboard-meta
# ITE-10 — On Edit Stop, "Remove Stop" → Confirm deletes the stop and the day no longer shows it
# Section: Itinerary Editing & Rearrange
# Priority: P0
# Repro:
# 1. On Edit Stop, tap "Remove Stop".
# 2. Confirm in the dialog.
# 3. Verify a DELETE fires, a snackbar like "Stop removed" appears, and the stop is gone from the day.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- tapOn: { id: "itinerary.toolbar.rearrange-button" }
- assertVisible: { id: "itinerary-edit.screen" }
- tapOn: { id: "itinerary-edit.stop.0.edit-button" }
- assertVisible: { id: "itinerary-edit.edit-stop-sheet" }
- tapOn: { id: "itinerary-edit.edit-stop-sheet.remove-button" }
- assertVisible: { id: "itinerary-edit.delete-stop-dialog.title" }
- tapOn: { id: "itinerary-edit.delete-stop-dialog.confirm-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "itinerary-edit.snackbar.removed" }
- assertNotVisible: { id: "itinerary-edit.edit-stop-sheet" }
