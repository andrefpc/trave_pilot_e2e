appId: ${APP_ID}
name: ITE-04
tags: [edit, p0]
---
# >>> dashboard-meta
# ITE-04 — Tapping Save Changes on Rearrange sends PUT /itinerary/:day_id/reorder with the new order_indexes
# Section: Itinerary Editing & Rearrange
# Priority: P0
# Repro:
# 1. As premium, drag stops to a new order on Rearrange Day.
# 2. Tap "Save Changes".
# 3. Verify a PUT to /itinerary/:day_id/reorder fires with the new order array, and a success snackbar appears.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- tapOn: { id: "itinerary.toolbar.rearrange-button" }
- assertVisible: { id: "itinerary-edit.screen" }
- swipe:
    from: { id: "itinerary-edit.stop.0.drag-handle" }
    direction: DOWN
    duration: 1500
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: { id: "itinerary-edit.save-button" }
- tapOn: { id: "itinerary-edit.save-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "itinerary-edit.snackbar.saved" }
- assertVisible: { id: "itinerary.screen" }
