appId: ${APP_ID}
name: ITE-09
tags: [edit, p1]
---
# >>> dashboard-meta
# ITE-09 — On Edit Stop, setting arrival later than departure shows a server-side validation error
# Section: Itinerary Editing & Rearrange
# Priority: P1
# Repro:
# 1. On Edit Stop, set Arrival = 14:00 and Departure = 13:00.
# 2. Tap Save Changes.
# 3. Verify a backend error like "Time change conflicts with another stop" appears (request rejected).
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- tapOn: { id: "itinerary.toolbar.rearrange-button" }
- assertVisible: { id: "itinerary-edit.screen" }
- tapOn: { id: "itinerary-edit.stop.0.edit-button" }
- assertVisible: { id: "itinerary-edit.edit-stop-sheet" }
# Material3 wheel pickers / SwiftUI DatePicker virtualise rows — only the
# hours/minutes near the current value are mounted at any one time. Use
# scrollUntilVisible to materialise the target cell, then tap the catalog
# id (`itinerary-edit.time-picker.hour.{:02d}` etc.). Set arrival 14:00,
# departure 13:00.
- tapOn: { id: "itinerary-edit.edit-stop-sheet.arrival-time-field" }
- scrollUntilVisible:
    element: { id: "itinerary-edit.time-picker.hour.14" }
    direction: DOWN
- tapOn: { id: "itinerary-edit.time-picker.hour.14" }
- scrollUntilVisible:
    element: { id: "itinerary-edit.time-picker.minute.00" }
    direction: UP
- tapOn: { id: "itinerary-edit.time-picker.minute.00" }
- tapOn: { id: "itinerary-edit.time-picker.ok-button" }
- tapOn: { id: "itinerary-edit.edit-stop-sheet.departure-time-field" }
- scrollUntilVisible:
    element: { id: "itinerary-edit.time-picker.hour.13" }
    direction: DOWN
- tapOn: { id: "itinerary-edit.time-picker.hour.13" }
- scrollUntilVisible:
    element: { id: "itinerary-edit.time-picker.minute.00" }
    direction: UP
- tapOn: { id: "itinerary-edit.time-picker.minute.00" }
- tapOn: { id: "itinerary-edit.time-picker.ok-button" }
- tapOn: { id: "itinerary-edit.edit-stop-sheet.save-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "itinerary-edit.edit-stop-sheet.error-banner" }
- assertVisible: { id: "itinerary-edit.edit-stop-sheet" }
