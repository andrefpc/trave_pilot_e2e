appId: ${APP_ID}
name: ITE-02
tags: [edit, p0]
---
# >>> dashboard-meta
# ITE-02 — A premium user tapping the Rearrange icon opens the Rearrange screen with a draggable list of stops
# Section: Itinerary Editing & Rearrange
# Priority: P0
# Repro:
# 1. Sign in as a premium user, open a day.
# 2. Tap the dashboard-edit icon in the toolbar.
# 3. Verify Rearrange Day opens with the day's stops in cards, each with a drag handle.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- assertVisible: { id: "itinerary.screen" }
- tapOn: { id: "itinerary.toolbar.rearrange-button" }
- assertVisible: { id: "itinerary-edit.screen" }
- assertVisible: { id: "itinerary-edit.stop.0" }
- assertVisible: { id: "itinerary-edit.stop.0.drag-handle" }
- assertVisible: { id: "itinerary-edit.stop.1.drag-handle" }
