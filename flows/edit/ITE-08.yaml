appId: ${APP_ID}
name: ITE-08
tags: [edit, p0]
---
# >>> dashboard-meta
# ITE-08 — Tapping the edit icon on a stop opens an Edit sheet for title, subtitle, arrival and departure times
# Section: Itinerary Editing & Rearrange
# Priority: P0
# Repro:
# 1. As premium, on Rearrange Day tap the edit icon on a stop.
# 2. Verify a sheet opens with editable Title, Subtitle, Arrival Time, Departure Time fields.
# 3. Change a value and tap Save Changes — verify a PUT update-stop fires and the stop reflects the change.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- tapOn: { id: "itinerary.toolbar.rearrange-button" }
- tapOn: { id: "itinerary-edit.stop.0.edit-button" }
- assertVisible: { id: "itinerary-edit.edit-stop-sheet" }
- assertVisible: { id: "itinerary-edit.edit-stop-sheet.title-field" }
- assertVisible: { id: "itinerary-edit.edit-stop-sheet.subtitle-field" }
- assertVisible: { id: "itinerary-edit.edit-stop-sheet.arrival-time-field" }
- assertVisible: { id: "itinerary-edit.edit-stop-sheet.departure-time-field" }
- tapOn: { id: "itinerary-edit.edit-stop-sheet.title-field" }
- eraseText
- inputText: "New stop title"
- tapOn: { id: "itinerary-edit.edit-stop-sheet.save-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "itinerary-edit.snackbar.saved" }
- assertVisible: { id: "itinerary-edit.stop.0.title-label" }
