appId: ${APP_ID}
name: RD-02
tags: [reorder, p0]
---
# >>> dashboard-meta
# RD-02 — A premium user tapping Reorder Days opens the screen and dragging reorders days; saving sends PUT /reorder-days
# Section: Reorder Days
# Priority: P0
# Repro:
# 1. As premium, open a plan with 2+ days.
# 2. Tap the reorder-days icon → Reorder Days opens.
# 3. Drag a day card to a new position → tap "Save Order".
# 4. Verify a PUT /reorder-days fires with the new day_ids array and a success snackbar appears.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- tapOn: { id: "itinerary.toolbar.reorder-days-button" }
- assertVisible: { id: "reorder-days.screen" }
- assertVisible: { id: "reorder-days.day-card.0" }
- assertVisible: { id: "reorder-days.day-card.1" }
- swipe:
    from: { id: "reorder-days.day-handle.0" }
    direction: DOWN
    duration: 1500
- waitForAnimationToEnd:
    timeout: 3000
- tapOn: { id: "reorder-days.confirm-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "reorder-days.snackbar.saved" }
- assertVisible: { id: "itinerary.screen" }
