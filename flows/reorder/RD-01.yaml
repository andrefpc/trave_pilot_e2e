appId: ${APP_ID}
name: RD-01
tags: [reorder, p0]
---
# >>> dashboard-meta
# RD-01 — A free user tapping Reorder Days opens the Premium bottom sheet (Reorder screen does not open)
# Section: Reorder Days
# Priority: P0
# Repro:
# 1. Sign in as a free user, open a plan.
# 2. Tap the swap/reorder-days icon in the toolbar.
# 3. Verify the Premium bottom sheet opens; the Reorder Days screen does not.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- assertVisible: { id: "itinerary.screen" }
- tapOn: { id: "itinerary.toolbar.reorder-days-button" }
- assertVisible: { id: "premium.bottom-sheet" }
- assertVisible: { id: "premium.bottom-sheet.cta" }
- assertNotVisible: { id: "reorder-days.screen" }
