appId: ${APP_ID}
name: RD-03
tags: [reorder, p0]
---
# >>> dashboard-meta
# RD-03 — Reordering days and saving persists across navigation: reopening the plan shows the new order
# Section: Reorder Days
# Priority: P0
# Repro:
# 1. As premium, reorder days and tap Save Order.
# 2. Navigate back to Travel Plans, then reopen the same plan.
# 3. Verify the day tabs reflect the new order.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- tapOn: { id: "itinerary.toolbar.reorder-days-button" }
- assertVisible: { id: "reorder-days.screen" }
- assertVisible: { id: "reorder-days.day-card.0.label" }
- swipe:
    from: { id: "reorder-days.day-handle.0" }
    direction: DOWN
    duration: 1500
- waitForAnimationToEnd:
    timeout: 3000
- tapOn: { id: "reorder-days.confirm-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "itinerary.screen" }
- pressKey: "back"
- assertVisible: { id: "travel-plans.title" }
- tapOn: { id: "plans.plan-card.0" }
- assertVisible: { id: "itinerary.screen" }
- tapOn: { id: "itinerary.toolbar.reorder-days-button" }
- assertVisible: { id: "reorder-days.screen" }
- assertVisible: { id: "reorder-days.day-card.0.label" }
