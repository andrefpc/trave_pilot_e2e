appId: ${APP_ID}
name: RD-05
tags: [reorder, p2]
---
# >>> dashboard-meta
# RD-05 — For a single-day plan, Reorder Days is disabled or hidden because there is nothing to reorder
# Section: Reorder Days
# Priority: P2
# Repro:
# 1. Open a plan that has only one day.
# 2. Look at the toolbar.
# 3. Verify the reorder-days icon is greyed out, hidden, or shows an info message when tapped.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.single-day" }
- assertVisible: { id: "itinerary.screen" }
- assertVisible: { id: "itinerary.toolbar.reorder-days-button.disabled-marker" }
- assertNotVisible: { id: "reorder-days.screen" }
