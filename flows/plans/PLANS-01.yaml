appId: ${APP_ID}
name: PLANS-01
tags: [plans, p0, ios-only, needs-implementation]
---
# >>> dashboard-meta
# PLANS-01 — Travel Plans loads the first ~20 plans; scrolling to the bottom triggers pagination
# Section: Travel Plans List & Plan Management
# Priority: P0
# Repro:
# 1. Sign in as a user with 25+ plans.
# 2. Tap Travel Plans.
# 3. Verify the first ~20 plans load immediately, then scroll to the bottom — verify the next batch loads automatically.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- assertVisible: { id: "plans.list" }
- assertVisible: { id: "plans.plan-card.0" }
# Needs implementation: validating pagination requires a seeded user with
# 25+ plans. Once a bulk-seed test endpoint exists, restore the scroll-
# to-bottom assertions on plans.plan-card.19 → plans.plan-card.20.
- scrollUntilVisible:
    element: { id: "plans.plan-card.19" }
    direction: DOWN
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "plans.plan-card.20" }
