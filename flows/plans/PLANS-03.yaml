appId: ${APP_ID}
name: PLANS-03
tags: [plans, p0]
---
# >>> dashboard-meta
# PLANS-03 — Tapping a plan card opens that plan's itinerary
# Section: Travel Plans List & Plan Management
# Priority: P0
# Repro:
# 1. On Travel Plans, tap any plan card.
# 2. Verify the Itinerary screen opens with all that plan's days/stops visible.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- assertVisible: { id: "plans.plan-card.0" }
- tapOn: { id: "plans.plan-card.0" }
# Tapping a plan card switches the active plan and routes back to
# Home with the selected plan's preview. The shared helper bridges
# Home → Itinerary with the tap-settle-retry-tutorial sequence so
# the assertions below land on a stable itinerary screen.
- runFlow: ../common/_open_plan_itinerary.yaml
- assertVisible: { id: "itinerary.screen" }
- assertVisible: { id: "itinerary.day-tab.0" }
- assertVisible: { id: "itinerary.stop-card.0" }
