appId: ${APP_ID}
name: PLANS-13
tags: [plans, p1]
---
# >>> dashboard-meta
# PLANS-13 — A free user with no plans on Travel Plans sees the empty state and a "Create a new Plan" CTA
# Section: Travel Plans List & Plan Management
# Priority: P1
# Repro:
# 1. Sign in as a free user with no plans.
# 2. Tap Travel Plans.
# 3. Verify "No travel plans yet" + a "Create a new Plan" button are visible.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      # The platform free-user (TEST_FREE_EMAIL) gets a plan seeded
      # via run-e2e.ts for WZ-X-05 / ITV-10. Use the un-seeded
      # `e2e+freeuser@` so Travel Plans renders the no-plan empty state.
      TEST_EMAIL: "e2e+freeuser@travelpilotapp.com"
      TEST_PASSWORD: "E2eFreeUser!1"
- tapOn: { id: "home.tab.travel-plans" }
- assertVisible: { id: "plans.empty-state" }
- assertVisible: { id: "plans.empty-state.title" }
- assertVisible: { id: "plans.empty-state.create-plan-button" }
