appId: ${APP_ID}
name: PLANS-13
tags: [plans, p1]
---
# >>> dashboard-meta
# PLANS-13 — A free user with no plans on Travel Plans sees the empty state and a "Create a new Plan" CTA
# Section: Travel Plans List & Plan Management
# Priority: P1
# Repro:
# 1. Sign in as a free user with no plans.
# 2. Tap Travel Plans.
# 3. Verify "No travel plans yet" + a "Create a new Plan" button are visible.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- assertVisible: { id: "plans.empty-state" }
- assertVisible: { id: "plans.empty-state.title" }
- assertVisible: { id: "plans.empty-state.create-plan-button" }
