appId: ${APP_ID}
name: PLANS-04
tags: [plans, p1, ios-only]
---
# >>> dashboard-meta
# PLANS-04 — Long-pressing a plan card on Travel Plans opens a context menu with Delete, Duplicate, Export to Calendar
# Section: Travel Plans List & Plan Management
# Priority: P1
# Repro:
# 1. On Travel Plans, long-press a plan card.
# 2. Verify a bottom sheet / menu opens with options "Delete", "Duplicate", "Export to Calendar".
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- assertVisible: { id: "plans.plan-card.0" }
- longPressOn: { id: "plans.plan-card.0" }
- assertVisible: { id: "plans.context-menu" }
- assertVisible: { id: "plans.context-menu.delete" }
- assertVisible: { id: "plans.context-menu.duplicate" }
- assertVisible: { id: "plans.context-menu.export-calendar" }
