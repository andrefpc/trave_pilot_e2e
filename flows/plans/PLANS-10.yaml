appId: ${APP_ID}
name: PLANS-10
tags: [plans, p1, ios-only]
---
# >>> dashboard-meta
# PLANS-10 — Granting Calendar permission then exporting writes events for each day or stop into the chosen calendar
# Section: Travel Plans List & Plan Management
# Priority: P1
# Repro:
# 1. Long-press a plan → Export to Calendar.
# 2. Grant Calendar permission, pick a calendar, tap Export.
# 3. Open the system Calendar app and verify events were created for each day (or each stop) of the trip.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- assertVisible: { id: "plans.plan-card.0" }
- longPressOn: { id: "plans.plan-card.0" }
- tapOn: { id: "plans.context-menu.export-calendar" }
- tapOn:
    id: "com.android.permissioncontroller:id/permission_allow_button"
- assertVisible: { id: "plans.export-calendar-sheet" }
- tapOn: { id: "plans.export-calendar-sheet.calendar-picker.0" }
- tapOn: { id: "plans.export-calendar-sheet.export-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "plans.snackbar.export-success" }
