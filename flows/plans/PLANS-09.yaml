appId: ${APP_ID}
name: PLANS-09
tags: [plans, p0, ios-only]
---
# >>> dashboard-meta
# PLANS-09 — Long-press → Export to Calendar prompts for READ_CALENDAR/WRITE_CALENDAR permission if not granted
# Section: Travel Plans List & Plan Management
# Priority: P0
# Repro:
# 1. On a device where Calendar permission is not granted, long-press a plan → Export to Calendar.
# 2. Verify the system permission dialog appears asking for Calendar access.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- assertVisible: { id: "plans.plan-card.0" }
- longPressOn: { id: "plans.plan-card.0" }
- tapOn: { id: "plans.context-menu.export-calendar" }
- assertVisible:
    id: "com.android.permissioncontroller:id/permission_message"
- assertVisible:
    id: "com.android.permissioncontroller:id/permission_allow_button"
