appId: ${APP_ID}
name: HOME-05
tags: [home, p1]
---
# >>> dashboard-meta
# HOME-05 — Each Home day card shows a weather icon and temperature for that day
# Section: Home Dashboard
# Priority: P1
# Repro:
# 1. On Home with an active plan, locate the day preview card.
# 2. On the right side of the day, verify a weather icon (sun/cloud/rain) and a temperature (e.g. "22°C") are shown.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.home" }
- assertVisible: { id: "home.day-card.0" }
- assertVisible: { id: "home.day-card.0.weather-icon" }
- assertVisible: { id: "home.day-card.0.temperature-label" }
