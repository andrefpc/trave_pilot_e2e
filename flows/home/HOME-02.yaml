appId: ${APP_ID}
name: HOME-02
tags: [home, p1]
---
# >>> dashboard-meta
# HOME-02 — A free user with no plans on Home sees an empty state with a "Create a new Plan" CTA
# Section: Home Dashboard
# Priority: P1
# Repro:
# 1. Sign in as a free user with no existing plans.
# 2. Tap Home.
# 3. Verify the screen shows the empty state with a "Create a new Plan" button below.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      # The platform free-user (TEST_FREE_EMAIL) gets a plan seeded
      # via run-e2e.ts for WZ-X-05 / ITV-10. Use the un-seeded
      # `e2e+freeuser@` instead so Home renders the no-plan empty state.
      TEST_EMAIL: "e2e+freeuser@travelpilotapp.com"
      TEST_PASSWORD: "E2eFreeUser!1"
- tapOn: { id: "home.tab.home" }
- assertVisible: { id: "home.empty-state" }
- assertVisible: { id: "home.empty-state.title" }
- assertVisible: { id: "home.empty-state.create-plan-button" }
