appId: ${APP_ID}
name: HOME-01
tags: [home, p0]
---
# >>> dashboard-meta
# HOME-01 — Home shows the current plan header with the next day label, dates and destination
# Section: Home Dashboard
# Priority: P0
# Repro:
# 1. Sign in as a user with an active plan.
# 2. Tap Home.
# 3. Verify the top section shows "Day 1 · {date}" (or similar) and the destination name.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.home" }
- assertVisible: { id: "home.tab-bar" }
- assertVisible: { id: "home.plan-header" }
- assertVisible: { id: "home.plan-header.day-label" }
- assertVisible: { id: "home.plan-header.date-label" }
- assertVisible: { id: "home.plan-header.destination-label" }
