appId: ${APP_ID}
name: HOME-06
tags: [home, p0]
---
# >>> dashboard-meta
# HOME-06 — Tapping a Home day card opens that Itinerary Day with all stops and times
# Section: Home Dashboard
# Priority: P0
# Repro:
# 1. On Home, tap the day preview card (or "Open full itinerary").
# 2. Verify the Itinerary Day screen opens with all stops in time order for that day.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.home" }
- assertVisible: { id: "home.day-card.0" }
# The day card itself has no onClick on either platform — the
# explicit "Open full itinerary" button below the preview is the
# documented entry point into the itinerary day. Use the shared
# helper so the tap → settle → defensive-retry → tutorial-dismiss
# sequence stays consistent with every other itinerary entry.
- runFlow: ../common/_open_plan_itinerary.yaml
- assertVisible: { id: "itinerary.screen" }
- assertVisible: { id: "itinerary.day-tab.0" }
- assertVisible: { id: "itinerary.stop-card.0" }
