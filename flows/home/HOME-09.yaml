appId: ${APP_ID}
name: HOME-09
tags: [home, p1, ios-only]
---
# >>> dashboard-meta
# HOME-09 — Home's "+ Create Plan" FAB or button navigates to the Destination wizard step
# Section: Home Dashboard
# Priority: P1
# Repro:
# 1. On Home, locate the + create-plan button (FAB or bottom button).
# 2. Tap it.
# 3. Verify the wizard opens at the Destination step.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      # Use the un-seeded free user so Home renders the no-plan
      # empty state with the "Create a new Plan" CTA. Premium gets
      # a seeded plan and the FAB does not surface there.
      TEST_EMAIL: "e2e+freeuser@travelpilotapp.com"
      TEST_PASSWORD: "E2eFreeUser!1"
- tapOn: { id: "home.tab.home" }
- assertVisible: { id: "home.empty-state" }
- tapOn: { id: "home.empty-state.create-plan-button" }
- assertVisible: { id: "wizard.destination.title" }
