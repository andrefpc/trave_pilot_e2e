appId: ${APP_ID}
name: HOME-04
tags: [home, p2, ios-only]
---
# >>> dashboard-meta
# HOME-04 — Tapping a city marker on the Home map opens the Travel Map screen
# Section: Home Dashboard
# Priority: P2
# Repro:
# 1. On Home, scroll to the world map.
# 2. Tap a city pin.
# 3. Verify the Travel Map screen opens with that city focused.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.home" }
- scrollUntilVisible:
    element: { id: "home.world-map" }
    direction: DOWN
- tapOn: { id: "home.world-map.marker.0" }
- assertVisible: { id: "travel-map.screen" }
- assertVisible: { id: "travel-map.focused-city-label" }
