appId: ${APP_ID}
name: HOME-07
tags: [home, p2, needs-implementation]
---
# >>> dashboard-meta
# HOME-07 — After photos are added, Home shows a milestone gallery thumbnail strip; tapping opens City Gallery
# Section: Home Dashboard
# Priority: P2
# Repro:
# 1. Add at least one milestone photo via Gallery.
# 2. Return to Home and scroll past the world map.
# 3. Verify a Gallery card with thumbnails per city appears.
# 4. Tap a city stack — City Gallery opens for that city.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.home" }
- scrollUntilVisible:
    element: { id: "home.gallery-card" }
    direction: DOWN
- assertVisible: { id: "home.gallery-card" }
- assertVisible: { id: "home.gallery-card.city-stack.0" }
- tapOn: { id: "home.gallery-card.city-stack.0" }
- assertVisible: { id: "city-gallery.screen" }
- assertVisible: { id: "city-gallery.title" }
