appId: ${APP_ID}
name: HOME-03
tags: [home, p1]
---
# >>> dashboard-meta
# HOME-03 — Home shows a world map with markers at each destination on the user's plan
# Section: Home Dashboard
# Priority: P1
# Repro:
# 1. Sign in as a user with a multi-city plan.
# 2. Tap Home and scroll past the day card.
# 3. Verify the world map renders with pins on each destination city.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.home" }
- scrollUntilVisible:
    element: { id: "home.world-map" }
    direction: DOWN
- assertVisible: { id: "home.world-map" }
