appId: ${APP_ID}
name: HOME-10
tags: [home, p1, ios-only]
---
# >>> dashboard-meta
# HOME-10 — In dark mode, the weather icon on Home renders with proper contrast (no white box)
# Section: Home Dashboard
# Priority: P1
# Repro:
# 1. Enable system dark theme.
# 2. Open Home with an active plan.
# 3. Verify the weather icon and temperature on each day card are clearly visible (no white-on-white squares).
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.theme-row" }
- tapOn: { id: "profile.theme.dark-option" }
- tapOn: { id: "home.tab.home" }
- assertVisible: { id: "home.theme.dark-marker" }
- assertVisible: { id: "home.day-card.0.weather-icon" }
- assertVisible: { id: "home.day-card.0.weather-icon.themed" }
- assertVisible: { id: "home.day-card.0.temperature-label" }
