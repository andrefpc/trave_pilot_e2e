appId: ${APP_ID}
name: HOME-08
tags: [home, p1, needs-implementation]
---
# >>> dashboard-meta
# HOME-08 — Pulling down on Home triggers a refresh that re-fetches plan, weather and milestones
# Section: Home Dashboard
# Priority: P1
# Repro:
# 1. On Home, scroll to the very top.
# 2. Drag down to trigger pull-to-refresh.
# 3. Verify a loading spinner appears and the plan/weather/milestones data is refreshed.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.home" }
- assertVisible: { id: "home.scroll-view" }
- swipe:
    from: { id: "home.scroll-view" }
    direction: DOWN
- assertVisible: { id: "home.refresh-indicator" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "home.plan-header" }
