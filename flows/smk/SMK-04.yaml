appId: ${APP_ID}
name: SMK-04
tags: [smk, p0]
---
# >>> dashboard-meta
# SMK-04 — A logged-in user can complete the trip wizard end-to-end and reach Plan Generation
# Section: Smoke Suite
# Priority: P0
# Repro:
# 1. Sign in, then tap "Create Plan" (Welcome) or the + on Travel Plans.
# 2. Walk all 11 steps in order: Destination, Walking Style, Companions, Day Schedule, Meal Time, Budget, Places of Interest, Restaurants, Where to Stay, Travel Times, Complete Onboarding.
# 3. Tap "Generate Plan" on the final step.
# 4. Verify the app navigates to Plan Generation.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- runFlow: ../common/_dismiss_interrupts.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      # Plan creation is gated behind premium — sign in as the premium user
      # so tapping "+ Add" opens the wizard instead of the upgrade sheet.
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- assertVisible: { id: "travel-plans.title" }
- tapOn: { id: "travel-plans.add-button" }
- assertVisible: { id: "wizard.destination.title" }
# Wizard destination step starts empty — fill it in: pick origin, add a
# destination city, pick an arrival date, then proceed.
- tapOn: { id: "wizard.destination.origin-field" }
- inputText: "New York"
- waitForAnimationToEnd:
    timeout: 3000
- tapOn: { id: "wizard.destination.search-result.0" }
- waitForAnimationToEnd:
    timeout: 1500
- tapOn: { id: "wizard.destination.add-destination-button" }
- inputText: "Orlando"
- waitForAnimationToEnd:
    timeout: 3000
- tapOn: { id: "wizard.destination.search-result.0" }
- waitForAnimationToEnd:
    timeout: 2500
# Android pops a Material3 DatePicker dialog after the destination is
# selected (forces the user to pick + confirm an arrival date). iOS
# auto-assigns a default and closes the sheet. If the dialog is up, pick a
# day in the future then OK; no-op otherwise.
- runFlow:
    when:
      visible: "OK"
    commands:
      # The picker now opens with a pre-selected default date, so OK alone
      # commits and dismisses the dialog.
      - tapOn: "OK"
- waitForAnimationToEnd:
    timeout: 1500
- tapOn: { id: "wizard.destination.next-button" }
- assertVisible: { id: "wizard.walking-style.title" }
# Walking-style next-button is disabled until an option is picked. "All Day"
# is the first card and works on both platforms.
- tapOn: "All Day"
- tapOn: { id: "wizard.walking-style.next-button" }
- assertVisible: { id: "wizard.companions.title" }
- tapOn: { id: "wizard.companions.next-button" }
- assertVisible: { id: "wizard.day-schedule.title" }
- tapOn: { id: "wizard.day-schedule.next-button" }
- assertVisible: { id: "wizard.meal-time.title" }
- tapOn: { id: "wizard.meal-time.next-button" }
- assertVisible: { id: "wizard.budget.title" }
# Budget next-button is disabled until a level is picked per category.
# Defaults shown are Attractions + Transportation.
- tapOn: { id: "wizard.budget.card.attractions.medium" }
- tapOn: { id: "wizard.budget.card.transportation.medium" }
- tapOn: { id: "wizard.budget.next-button" }
- assertVisible: { id: "wizard.places-of-interest.title" }
# Need at least one recommended place picked before next-button enables.
# The card itself opens a place-detail sheet on iOS — tap the .check sub-id
# to flip the selection without navigating away. Wait for recommendations
# to load first (Google Places call).
- waitForAnimationToEnd:
    timeout: 8000
- tapOn: { id: "wizard.places-of-interest.recommended.0.check" }
- tapOn: { id: "wizard.places-of-interest.next-button" }
- assertVisible: { id: "wizard.restaurants.title" }
- tapOn: { id: "wizard.restaurants.next-button" }
- assertVisible: { id: "wizard.where-to-stay.title" }
# Where-to-stay needs a recommended hotel to load before next enables.
- waitForAnimationToEnd:
    timeout: 8000
- tapOn: { id: "wizard.where-to-stay.next-button" }
- assertVisible: { id: "wizard.travel-times.title" }
- tapOn: { id: "wizard.travel-times.next-button" }
- assertVisible: { id: "wizard.complete-onboarding.title" }
- tapOn: { id: "wizard.complete-onboarding.generate-plan-button" }
- assertVisible: { id: "plan-generation.progress" }
