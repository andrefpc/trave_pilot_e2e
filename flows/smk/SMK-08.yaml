appId: ${APP_ID}
name: SMK-08
tags: [smk, p0, ios-only]
---
# >>> dashboard-meta
# SMK-08 — A free-tier user tapping a premium-only feature opens the Premium bottom sheet
# Section: Smoke Suite
# Priority: P0
# Repro:
# 1. Sign in as a free user, then open any plan.
# 2. Tap a premium-gated control such as Rearrange (edit icon) or Reorder Days.
# 3. Verify the Premium bottom sheet slides up showing the latest plan and a Subscribe button.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- runFlow: ../common/_dismiss_interrupts.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_EMAIL}
      TEST_PASSWORD: ${TEST_PASSWORD}
- assertVisible: { id: "home.tab.home" }
# Tap the button inside the preview card by text — see SMK-06 for context.
- tapOn: "Open full itinerary"
- runFlow: ../common/_dismiss_tutorial.yaml
# iOS now auto-scrolls Itinerary Day to current time on open, which can push
# the day header (and `itinerary-day.title`) above the visible viewport.
# Scroll up until the header re-enters view before asserting.
- scrollUntilVisible:
    element:
      id: "itinerary-day.title"
    direction: UP
- assertVisible: { id: "itinerary-day.title" }
- tapOn: { id: "itinerary.toolbar.rearrange-button" }
# Tapping a premium-gated control opens PremiumGateBottomSheet first (the
# watch-ad / go-premium chooser). The actual subscribe upsell is one tap
# behind premium-gate.go-premium-button.
- assertVisible: { id: "premium-gate.title" }
- tapOn: { id: "premium-gate.go-premium-button" }
- assertVisible: { id: "premium.bottom-sheet.title" }
# The bottom sheet shows two plan cards (monthly + annual). The CTA button on
# each card has the id premium.bottom-sheet.cta — assert at least one is
# visible to prove the subscribe path is reachable.
- assertVisible: { id: "premium.bottom-sheet.cta" }
