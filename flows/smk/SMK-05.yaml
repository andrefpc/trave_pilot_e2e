appId: ${APP_ID}
name: SMK-05
tags: [smk, p0, ios-only]
---
# >>> dashboard-meta
# SMK-05 — AI plan generation reaches 100% and auto-navigates to Home with the itinerary
# Section: Smoke Suite
# Priority: P0
# Repro:
# 1. Sign in and complete the wizard so Plan Generation starts.
# 2. Wait without backgrounding the app — the compass + progress bar animates for several minutes.
# 3. When the bar reaches 100%, the compass briefly bounces.
# 4. Tap "Let's Go!" and verify Home appears with day cards, weather, and the world map.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- runFlow: ../common/_dismiss_interrupts.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      # Plan creation is gated behind premium — sign in as the premium user
      # so tapping "+ Add" opens the wizard instead of the upgrade sheet.
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "travel-plans.add-button" }
- assertVisible: { id: "wizard.destination.title" }
# Wizard destination step starts empty — fill: pick origin, add a city, pick date.
- tapOn: { id: "wizard.destination.origin-field" }
- inputText: "New York"
- waitForAnimationToEnd:
    timeout: 3000
- tapOn: { id: "wizard.destination.search-result.0" }
- waitForAnimationToEnd:
    timeout: 1500
- tapOn: { id: "wizard.destination.add-destination-button" }
- inputText: "Orlando"
- waitForAnimationToEnd:
    timeout: 3000
- tapOn: { id: "wizard.destination.search-result.0" }
- waitForAnimationToEnd:
    timeout: 2500
# Android pops a Material3 DatePicker dialog after the destination is
# selected (forces the user to pick + confirm an arrival date). iOS
# auto-assigns a default and closes the sheet. If the dialog is up, pick a
# day in the future then OK; no-op otherwise.
- runFlow:
    when:
      visible: "OK"
    commands:
      # The picker now opens with a pre-selected default date, so OK alone
      # commits and dismisses the dialog.
      - tapOn: "OK"
- waitForAnimationToEnd:
    timeout: 1500
- tapOn: { id: "wizard.destination.next-button" }
# Walking-style next-button is disabled until an option is picked.
- tapOn: "All Day"
- tapOn: { id: "wizard.walking-style.next-button" }
- tapOn: { id: "wizard.companions.next-button" }
- tapOn: { id: "wizard.day-schedule.next-button" }
- tapOn: { id: "wizard.meal-time.next-button" }
# Budget next-button is disabled until a level is picked per category.
- tapOn: { id: "wizard.budget.card.attractions.medium" }
- tapOn: { id: "wizard.budget.card.transportation.medium" }
- tapOn: { id: "wizard.budget.next-button" }
# Need at least one recommended place picked before next-button enables.
- waitForAnimationToEnd:
    timeout: 8000
- tapOn: { id: "wizard.places-of-interest.recommended.0.check" }
- tapOn: { id: "wizard.places-of-interest.next-button" }
- tapOn: { id: "wizard.restaurants.next-button" }
# Where-to-stay needs a recommended hotel to load before next enables.
- waitForAnimationToEnd:
    timeout: 8000
- tapOn: { id: "wizard.where-to-stay.next-button" }
- tapOn: { id: "wizard.travel-times.next-button" }
- assertVisible: { id: "wizard.complete-onboarding.title" }
- tapOn: { id: "wizard.complete-onboarding.generate-plan-button" }
- assertVisible: { id: "plan-generation.progress" }
# Both apps stay on Plan Generation until the user taps the Done button
# (state.isDone). Wait for that button to appear (allow up to 10 min for
# the Gemini round-trip on a cold cache), tap it, then assert Home is
# reachable.
- extendedWaitUntil:
    visible: { id: "plan-generation.lets-go-button" }
    timeout: 600000
- tapOn: { id: "plan-generation.lets-go-button" }
- assertVisible: { id: "home.tab.home" }
- assertVisible: { id: "home.day-card.0" }
