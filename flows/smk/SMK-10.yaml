appId: ${APP_ID}
name: SMK-10
tags: [smk, p0]
---
# >>> dashboard-meta
# SMK-10 — Rotating the device on Home, Itinerary and a wizard step preserves state without crashing
# Section: Smoke Suite
# Priority: P0
# Repro:
# 1. Sign in and open Home → rotate the phone 90°. Plan/header should remain visible.
# 2. Open an Itinerary Day → rotate. Stops should still be in order.
# 3. Start the wizard, fill Companions to Adults=2, rotate. The values should still be 2.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_EMAIL}
      TEST_PASSWORD: ${TEST_PASSWORD}
- assertVisible: { id: "home.tab-bar" }
- assertVisible: { id: "home.plan-header" }
- setOrientation: LANDSCAPE_LEFT
- assertVisible: { id: "home.tab-bar" }
- assertVisible: { id: "home.plan-header" }
- setOrientation: PORTRAIT
- tapOn: { id: "home.day-card.0" }
- assertVisible: { id: "itinerary-day.title" }
- assertVisible: { id: "itinerary-day.stop.0" }
- setOrientation: LANDSCAPE_LEFT
- assertVisible: { id: "itinerary-day.stop.0" }
- setOrientation: PORTRAIT
- pressKey: "back"
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "travel-plans.add-button" }
- assertVisible: { id: "wizard.destination.title" }
- tapOn: { id: "wizard.destination.next-button" }
- assertVisible: { id: "wizard.walking-style.title" }
- tapOn: { id: "wizard.walking-style.next-button" }
- assertVisible: { id: "wizard.companions.title" }
- tapOn: { id: "wizard.companions.adults.plus" }
- assertVisible:
    id: "wizard.companions.adults.value"
    text: "2"
- setOrientation: LANDSCAPE_LEFT
- assertVisible:
    id: "wizard.companions.adults.value"
    text: "2"
- setOrientation: PORTRAIT
