appId: ${APP_ID}
name: SMK-03
tags: [smk, p0]
---
# >>> dashboard-meta
# SMK-03 — A registered user can sign in with email and password and lands on Home
# Section: Smoke Suite
# Priority: P0
# Repro:
# 1. Cold-launch the app — Welcome appears.
# 2. Tap "Have an account, Login" → tap "Sign in with password".
# 3. Enter a registered email and the correct password, tap Login.
# 4. Verify a loading overlay flashes, then Home appears with the user's plan if they have one.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- runFlow: ../common/_dismiss_interrupts.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- assertVisible: { id: "auth-sheet.title" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.email-field" }
- inputText: ${TEST_EMAIL}
- tapOn: { id: "login.password-field" }
- inputText: ${TEST_PASSWORD}
# Tapping the title dismisses the keyboard on both platforms; hideKeyboard
# is unreliable on iOS with custom inputs.
- tapOn: { id: "login.title" }
- tapOn: { id: "login.submit-button" }
- runFlow: ../common/_dismiss_tutorial.yaml
- assertVisible: { id: "home.tab.home" }
