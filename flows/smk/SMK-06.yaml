appId: ${APP_ID}
name: SMK-06
tags: [smk, p0]
---
# >>> dashboard-meta
# SMK-06 — Opening a generated plan shows every day with stops, times and weather
# Section: Smoke Suite
# Priority: P0
# Repro:
# 1. Sign in as a user with a completed plan and tap Home.
# 2. Tap a day card to open Itinerary Day.
# 3. Verify wake-up at the top, attractions/meals/hotel stops in time order, sleep at the bottom.
# 4. Verify the day shows a weather icon and temperature, and stop icons differ by type.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- runFlow: ../common/_dismiss_interrupts.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_EMAIL}
      TEST_PASSWORD: ${TEST_PASSWORD}
- assertVisible: { id: "home.tab.home" }
- assertVisible: { id: "home.day-card.0" }
# home.day-card.0 wraps the PreviewCard layout but isn't itself clickable —
# tapping it doesn't navigate. The "Open full itinerary" button inside the
# card has no maestroId yet, so tap by visible text. Same English string on
# both platforms.
- tapOn: "Open full itinerary"
# Itinerary tutorial overlay can fire on first visit — dismiss if shown.
- runFlow: ../common/_dismiss_tutorial.yaml
- assertVisible: { id: "itinerary-day.title" }
# wakeup-stop / sleep-stop are not distinct ids in either app — the first
# stop (hotel_leave) and last stop (hotel_return) both render as
# itinerary-day.stop.<index>. Asserting stop.0 alone is enough to prove the
# day rendered with stops.
- assertVisible: { id: "itinerary-day.stop.0" }
- assertVisible: { id: "itinerary-day.weather-icon" }
- assertVisible: { id: "itinerary-day.weather-temp" }
