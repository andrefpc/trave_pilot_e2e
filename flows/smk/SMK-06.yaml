appId: ${APP_ID}
name: SMK-06
tags: [smk, p0]
---
# >>> dashboard-meta
# SMK-06 — Opening a generated plan shows every day with stops, times and weather
# Section: Smoke Suite
# Priority: P0
# Repro:
# 1. Sign in as a user with a completed plan and tap Home.
# 2. Tap a day card to open Itinerary Day.
# 3. Verify wake-up at the top, attractions/meals/hotel stops in time order, sleep at the bottom.
# 4. Verify the day shows a weather icon and temperature, and stop icons differ by type.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_EMAIL}
      TEST_PASSWORD: ${TEST_PASSWORD}
- assertVisible: { id: "home.tab-bar" }
- assertVisible: { id: "home.day-card.0" }
- tapOn: { id: "home.day-card.0" }
- assertVisible: { id: "itinerary-day.title" }
- assertVisible: { id: "itinerary-day.wakeup-stop" }
- assertVisible: { id: "itinerary-day.stop.0" }
- assertVisible: { id: "itinerary-day.sleep-stop" }
- assertVisible: { id: "itinerary-day.weather-icon" }
- assertVisible: { id: "itinerary-day.weather-temp" }
