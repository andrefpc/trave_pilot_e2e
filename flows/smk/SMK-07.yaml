appId: ${APP_ID}
name: SMK-07
tags: [smk, p0]
---
# >>> dashboard-meta
# SMK-07 — Profile → Logout signs the user out and returns to the Welcome screen
# Section: Smoke Suite
# Priority: P0
# Repro:
# 1. Sign in, then tap the Profile tab.
# 2. Scroll down and tap "Logout".
# 3. In the confirmation sheet, tap "Log Out".
# 4. Verify Welcome appears and that Home is no longer reachable until you sign in again.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- runFlow: ../common/_dismiss_interrupts.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_EMAIL}
      TEST_PASSWORD: ${TEST_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- assertVisible: { id: "profile.title" }
- tapOn: { id: "profile.settings-button" }
- assertVisible: { id: "settings.logout-button" }
- tapOn: { id: "settings.logout-button" }
- assertVisible: { id: "settings.logout-sheet.title" }
- tapOn: { id: "settings.logout-sheet.confirm-button" }
- assertVisible: { id: "welcome.title" }
- assertNotVisible: { id: "home.tab.home" }
