appId: ${APP_ID}
name: ITV-02
tags: [itinerary, p0, ios-only]
---
# >>> dashboard-meta
# ITV-02 — Within a day, stops are ordered earliest-arrival first, with hotel check-in on top and check-out at the bottom
# Section: Itinerary Viewing
# Priority: P0
# Repro:
# 1. Open a plan and switch to a day that includes a hotel stay.
# 2. Verify the first stop is hotel check-in or wake-up; later stops follow in time order; hotel check-out is last.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- runFlow: ../common/_open_plan_itinerary.yaml
- tapOn: { id: "itinerary.day-tab.0" }
- assertVisible: { id: "itinerary.stop-card.0" }
- assertVisible: { id: "itinerary.stop.0.type.hotel-checkin" }
# The seeded rich plan spans 3 days with the hotel check-in on day 1
# and the matching check-out on day 3 — iOS doesn't auto-insert
# wake-up / sleep markers for intermediate days, so the same-day
# checkout assertion only holds on the last day of the stay. Switch
# to it before asserting the last-stop marker.
- scrollUntilVisible:
    element: { id: "itinerary.day-tab.last" }
    direction: RIGHT
- tapOn: { id: "itinerary.day-tab.last" }
- scrollUntilVisible:
    element: { id: "itinerary.stop.last" }
    direction: DOWN
- assertVisible: { id: "itinerary.stop.last.type.hotel-checkout" }
