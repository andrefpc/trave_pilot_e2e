appId: ${APP_ID}
name: ITV-12
tags: [itinerary, p2, ios-only]
---
# >>> dashboard-meta
# ITV-12 — A day with no stops shows an empty state like "No activities planned"
# Section: Itinerary Viewing
# Priority: P2
# Repro:
# 1. Open a plan with a day that has no stops yet.
# 2. Verify the day shows an empty illustration/text, not a blank/broken layout.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.empty-day" }
- assertVisible: { id: "itinerary.screen" }
- assertVisible: { id: "itinerary.day-empty-state" }
- assertVisible: { id: "itinerary.day-empty-state.title" }
- assertVisible: { id: "itinerary.day-empty-state.illustration" }
