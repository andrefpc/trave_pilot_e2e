appId: ${APP_ID}
name: ITV-12
tags: [itinerary, p2]
---
# >>> dashboard-meta
# ITV-12 — A day with no stops shows an empty state like "No activities planned"
# Section: Itinerary Viewing
# Priority: P2
# Repro:
# 1. Open a plan with a day that has no stops yet.
# 2. Verify the day shows an empty illustration/text, not a blank/broken layout.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
# The premium user has two seeded active plans: a rich plan at index 0
# (current/active, has full itinerary) and the empty-day plan at index 1
# whose day 1 has zero stops. Tap the second card so the screen opens
# directly on an empty day and the empty-state UI is visible.
- tapOn: { id: "plans.plan-card.1" }
- runFlow: ../common/_open_plan_itinerary.yaml
# Asserting the screen container directly is flaky on iOS — the parent
# VStack uses `accessibilityElement(children: .contain)` which sometimes
# trips XCUITest's "visible" check. The day-empty-state markers below
# only render inside the itinerary screen body, so their visibility is
# proof enough that the screen is open.
- assertVisible: { id: "itinerary.day-empty-state" }
- assertVisible: { id: "itinerary.day-empty-state.title" }
