appId: ${APP_ID}
name: ITV-11
tags: [itinerary, p1, ios-only]
---
# >>> dashboard-meta
# ITV-11 — Hotel check-in and check-out stops are auto-inserted on the appropriate days
# Section: Itinerary Viewing
# Priority: P1
# Repro:
# 1. Open a plan that has a hotel stay across multiple days.
# 2. Switch to the first day of the stay → verify "Check in at hotel" appears at start.
# 3. Switch to the last day → verify "Check out of hotel" appears at the end.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- assertVisible: { id: "itinerary.day-tab.0" }
- tapOn: { id: "itinerary.day-tab.0" }
- assertVisible: { id: "itinerary.stop.0.type.hotel-checkin" }
- scrollUntilVisible:
    element: { id: "itinerary.day-tab.last" }
    direction: RIGHT
- tapOn: { id: "itinerary.day-tab.last" }
- scrollUntilVisible:
    element: { id: "itinerary.stop.last" }
    direction: DOWN
- assertVisible: { id: "itinerary.stop.last.type.hotel-checkout" }
