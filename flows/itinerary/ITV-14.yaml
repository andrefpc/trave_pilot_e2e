appId: ${APP_ID}
name: ITV-14
tags: [itinerary, p2]
---
# >>> dashboard-meta
# ITV-14 — A long place description in the detail sheet scrolls smoothly inside the sheet
# Section: Itinerary Viewing
# Priority: P2
# Repro:
# 1. Tap a stop with a long description.
# 2. Inside the sheet, scroll the description vertically.
# 3. Verify all text is reachable, no truncation, no overflow into other sections.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- runFlow: ../common/_open_plan_itinerary.yaml
# stop-card.0 of the seeded rich plan is a hotel check-in (no place id,
# non-tappable). stop-card.1 is an attraction with a long description —
# the surface this scroll-inside-sheet test actually needs.
- tapOn: { id: "itinerary.stop-card.1" }
- assertVisible: { id: "place-detail.sheet" }
- assertVisible: { id: "place-detail.description" }
- scrollUntilVisible:
    element: { id: "place-detail.description.end-marker" }
    direction: DOWN
- assertVisible: { id: "place-detail.description.end-marker" }
