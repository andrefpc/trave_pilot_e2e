appId: ${APP_ID}
name: ITV-08
tags: [itinerary, p1, ios-only]
---
# >>> dashboard-meta
# ITV-08 — Pulling down on the Itinerary refetches the itinerary and weather
# Section: Itinerary Viewing
# Priority: P1
# Repro:
# 1. Open a day on Itinerary.
# 2. Drag down to trigger pull-to-refresh.
# 3. Verify a loading indicator appears and the data reloads.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- assertVisible: { id: "itinerary.scroll-view" }
- swipe:
    from: { id: "itinerary.scroll-view" }
    direction: DOWN
- assertVisible: { id: "itinerary.refresh-indicator" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "itinerary.stop.0" }
- assertVisible: { id: "itinerary.weather-pill" }
