appId: ${APP_ID}
name: ITV-09
tags: [itinerary, p1]
---
# >>> dashboard-meta
# ITV-09 — A free time slot displays its time range and an "Add Stop" button
# Section: Itinerary Viewing
# Priority: P1
# Repro:
# 1. Open a day that contains a free-time slot.
# 2. Verify the card reads "Free time" with a time range like "14:00–15:00" and shows an "Add Stop" button.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- assertVisible: { id: "itinerary.screen" }
- scrollUntilVisible:
    element: { id: "itinerary.stop.free-time.0" }
    direction: DOWN
- assertVisible: { id: "itinerary.stop.free-time.0" }
- assertVisible: { id: "itinerary.stop.free-time.0.time-range" }
- assertVisible: { id: "itinerary.stop.free-time.0.add-stop-button" }
