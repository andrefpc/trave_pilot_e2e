appId: ${APP_ID}
name: ITV-05
tags: [itinerary, p0, ios-only]
---
# >>> dashboard-meta
# ITV-05 — Tapping a stop with a place id opens the Place Detail bottom sheet with photos, description and hours
# Section: Itinerary Viewing
# Priority: P0
# Repro:
# 1. Open a day and tap an attraction or restaurant stop.
# 2. Verify a bottom sheet slides up with the place name, photo carousel, description text and opening hours.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- assertVisible: { id: "itinerary.stop-card.0" }
- tapOn: { id: "itinerary.stop-card.0" }
- assertVisible: { id: "place-detail.sheet" }
- assertVisible: { id: "place-detail.title" }
- assertVisible: { id: "place-detail.description" }
- assertVisible: { id: "place-detail.hours" }
