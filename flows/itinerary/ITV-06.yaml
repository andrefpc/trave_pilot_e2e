appId: ${APP_ID}
name: ITV-06
tags: [itinerary, p1, ios-only]
---
# >>> dashboard-meta
# ITV-06 — Place photos in the detail sheet load through /proxy/google-photo (not direct Google URLs)
# Section: Itinerary Viewing
# Priority: P1
# Repro:
# 1. With Network Profiler open, tap a stop to open Place Detail.
# 2. Inspect image requests — verify they go to /proxy/google-photo (no direct googleusercontent.com).
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- tapOn: { id: "itinerary.stop.0" }
- assertVisible: { id: "place-detail.sheet" }
- assertVisible: { id: "place-detail.photo-carousel" }
- assertVisible: { id: "place-detail.photo.0" }
- assertVisible: { id: "place-detail.photo.0.proxy-loaded" }
