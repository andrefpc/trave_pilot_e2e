appId: ${APP_ID}
name: ITV-10
tags: [itinerary, p0, ios-only]
---
# >>> dashboard-meta
# ITV-10 — A free user can replace a free-time slot with a place via "Add Stop" without seeing the paywall
# Section: Itinerary Viewing
# Priority: P0
# Repro:
# 1. Sign in as a free user, open a day with a free-time slot.
# 2. Tap the slot's "Add Stop" button.
# 3. Verify Place Search opens (not the Premium bottom sheet).
# 4. Pick a place — verify it replaces the free-time slot.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- runFlow: ../common/_open_plan_itinerary.yaml
- scrollUntilVisible:
    element: { id: "itinerary.stop.free-time.0" }
    direction: DOWN
# The visible button hosting the addStopClicked action uses the
# top-level `itinerary-edit.add-stop-button` id; the per-slot id
# below it is just a marker so flows can `scrollUntilVisible` to a
# specific slot. Tap the real button to fire the action.
- tapOn: { id: "itinerary-edit.add-stop-button" }
- assertNotVisible: { id: "premium.bottom-sheet.title" }
- assertVisible: { id: "place-search.sheet" }
- tapOn: { id: "place-search.input" }
- inputText: "park"
- waitForAnimationToEnd:
    timeout: 3000
# The whole row carries `place-search.result.<i>` for visibility, but
# only the "+" button (`place-search.result.<i>.add-button`) actually
# fires the place-selected event — tap the button to commit.
- tapOn: { id: "place-search.result.0.add-button" }
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: { id: "itinerary.stop-card.0" }
- assertNotVisible: { id: "itinerary.stop.free-time.0" }
