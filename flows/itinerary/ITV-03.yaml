appId: ${APP_ID}
name: ITV-03
tags: [itinerary, p1, ios-only]
---
# >>> dashboard-meta
# ITV-03 — Each stop type has a distinct icon (attraction, restaurant, hotel, transport, free time)
# Section: Itinerary Viewing
# Priority: P1
# Repro:
# 1. Open a day with mixed stop types.
# 2. Visually scan each stop card.
# 3. Verify attractions show a landmark icon, restaurants a fork/knife, hotels a bed, transport a vehicle, and free time a clock.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- assertVisible: { id: "itinerary.screen" }
- assertVisible: { id: "itinerary.stop.icon.attraction" }
- assertVisible: { id: "itinerary.stop.icon.restaurant" }
- assertVisible: { id: "itinerary.stop.icon.hotel" }
- scrollUntilVisible:
    element: { id: "itinerary.stop.icon.transport" }
    direction: DOWN
- assertVisible: { id: "itinerary.stop.icon.transport" }
- scrollUntilVisible:
    element: { id: "itinerary.stop.icon.free-time" }
    direction: DOWN
- assertVisible: { id: "itinerary.stop.icon.free-time" }
