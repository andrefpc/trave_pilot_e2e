appId: ${APP_ID}
name: ITV-01
tags: [itinerary, p0, ios-only]
---
# >>> dashboard-meta
# ITV-01 — Opening a plan loads every day with all stops and times in chronological order
# Section: Itinerary Viewing
# Priority: P0
# Repro:
# 1. Sign in as a user with a generated plan.
# 2. Tap Travel Plans → tap any plan.
# 3. Verify the Itinerary screen shows day tabs at the top and all stops in time order on the active day.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- runFlow: ../common/_open_plan_itinerary.yaml
- assertVisible: { id: "itinerary.screen" }
- assertVisible: { id: "itinerary.day-tab.0" }
- assertVisible: { id: "itinerary.day-tab.1" }
- assertVisible: { id: "itinerary.stop-card.0" }
- assertVisible: { id: "itinerary.stop.0.time-label" }
- assertVisible: { id: "itinerary.stop-card.1" }
- assertVisible: { id: "itinerary.stop.1.time-label" }
