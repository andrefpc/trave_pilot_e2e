appId: ${APP_ID}
name: ITV-07
tags: [itinerary, p1]
---
# >>> dashboard-meta
# ITV-07 — On a stop card, the edit/ticket/restaurant action buttons let the user manage the stop
# Section: Itinerary Viewing
# Priority: P1
# Repro:
# 1. Tap a stop to open Place Detail.
# 2. Verify the sheet exposes actions: Edit (pencil), Add ticket, Find a good Restaurant (for meals).
# 3. Each button reacts to tap (does not silently fail).
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- runFlow: ../common/_open_plan_itinerary.yaml
# Verify the meal-specific action first (find-restaurant + edit live
# on a lunch stop). Then close the sheet, tap an attraction to check
# the attraction-specific action (add-ticket). Asserting all three on
# the same stop would only ever pass if iOS rendered every action
# regardless of stop type, which contradicts the actual UX.
- tapOn: { id: "itinerary.stop.meal.0" }
- assertVisible: { id: "place-detail.sheet" }
# `place-detail.edit-icon` is the always-present pencil. The
# `place-detail.action.edit` marker is only emitted when EDIT is the
# primary action variant (which it isn't on a meal stop — that slot
# is FIND_RESTAURANT on both platforms).
- assertVisible: { id: "place-detail.edit-icon" }
# The find-restaurant action button + marker live below the opening
# hours section, which on a small screen is below the fold. Scroll
# the sheet's scroll-view down so the marker enters the viewport.
- scrollUntilVisible:
    element: { id: "place-detail.action.find-restaurant" }
    direction: DOWN
# `place-detail.action.find-restaurant` is a visibility-only marker
# (Color.clear sibling, rendered below the primary button). The
# actual tap target is the primary action button — fire that to open
# place-search.
- tapOn: { id: "place-detail.action.primary" }
# Find-restaurant opens the dedicated restaurant search sheet
# (`itinerary-edit.restaurant-search-sheet`), not the generic
# place-search sheet — they live in different stacks because the
# restaurant flow filters by cuisine + price level.
- assertVisible: { id: "itinerary-edit.restaurant-search-sheet" }
