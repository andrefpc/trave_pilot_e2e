appId: ${APP_ID}
tags: [helper]
---
# Robust keyboard-dismiss helper.
#
# Maestro's built-in `hideKeyboard` is best-effort:
#   - On iOS it occasionally throws
#       "Couldn't hide the keyboard. This can happen if the app uses a custom
#        input or doesn't expose a standard dismiss action."
#     when the focused field is a custom TextField or the keyboard toolbar
#     lacks a recognized dismiss control.
#   - On Android (Compose) tapping in a non-clickable area does NOT clear
#     focus, so a top-of-screen tap leaves the soft keyboard up — and any
#     content below it (Register's lower password-rule rows, ResetPassword's
#     submit button, etc.) stays clipped, making subsequent `assertVisible`
#     / `tapOn` steps fail.
#
# Strategy: ask the platform to hide the keyboard first (works reliably on
# Android via the IME's hide API), then fall back to a top-of-screen tap
# that drops focus on iOS without triggering any visible button. 50%/6%
# lands in the status-bar / title area on every screen we test against
# today. `retryTapIfNoChange: false` keeps this from looping when the tap
# happens to land on a non-interactive element (the desired outcome).
# Android-only: hideKeyboard is reliable on Android (uses the IME hide API)
# but throws on iOS with custom TextFields. iOS gets the tap below.
- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard
- tapOn:
    point: 50%, 6%
    retryTapIfNoChange: false
