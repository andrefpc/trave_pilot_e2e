appId: ${APP_ID}
tags: [helper]
---
# Reusable: open the password sign-in sheet from Welcome and sign in as the
# default free-tier e2e user. Override TEST_EMAIL / TEST_PASSWORD via --env to
# log in as a different seeded user (e.g. premium).
# Dismiss any system / app modal that re-fires after a fresh launch
# (App Tracking Transparency, notification permission, location prompt, etc.).
- runFlow: _dismiss_interrupts.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- tapOn: { id: "login.email-field" }
- inputText: ${TEST_EMAIL}
- tapOn: { id: "login.password-field" }
- inputText: ${TEST_PASSWORD}
- tapOn: { id: "login.submit-button" }
# iOS pops a "Save Password" sheet right after a successful sign-in.
# Use the narrow helper (matches only "Not Now" / "Don't Save"); the full
# _dismiss_interrupts.yaml would also tap "Allow" / "Update" / "Dismiss"
# which can collide with Home-screen banner text and break the flow.
- runFlow: _dismiss_save_password.yaml
# After a fresh install (clearState wipes DataStore/UserDefaults), the Home
# tutorial fires ~600ms after Home loads. The spotlight overlay sits on top
# of every other element, so a direct assertVisible on home.tab.home would
# race the overlay and fail. Dismiss the tutorial first (no-op if absent),
# then assert we're on Home.
- runFlow: _dismiss_tutorial.yaml
# Re-run the interrupt dismiss helper: HomeViewModel.loadPreview kicks off
# asynchronously after the screen mounts, so a "Failed to load itinerary"
# dialog (or any other late-arriving modal) can land between login and the
# next assertion. The helper is a snapshot check — no-op when nothing is
# visible — so running it twice is cheap insurance.
- runFlow: _dismiss_interrupts.yaml
# Asserting the NavigationBar container's id (home.tab-bar) is flaky on
# Android — the Compose Material3 NavigationBar's testTag races with AdMob
# loading and sometimes never propagates as a resource-id. The individual
# tab items (home.tab.home etc.) are reliable, so we wait on one of those
# as the "logged-in & on Home" signal.
- assertVisible: { id: "home.tab.home" }
