appId: ${APP_ID}
tags: [helper]
---
# Dismiss any in-app tutorial overlay (Home tutorial, Itinerary tutorial, etc.).
# After clearState the DataStore/UserDefaults are wiped, so the tutorial fires
# on first visit to Home / first visit to Itinerary / etc., overlaying the UI
# and preventing assertions on underlying elements.
#
# Buttons render localized text (English seed: "Skip" / "Next" / "Got it").
# Each runFlow only fires when the matching text is visible — no-op otherwise.
# Tap Skip first (single tap clears the whole walkthrough); fall back to
# walking the steps with Next/Got it if Skip isn't shown (last step has no
# skip button — only "Got it").

# The tutorial fires ~600ms after the screen finishes loading, which on
# iOS includes: getCurrentTravelPlan → /travel-plans → autoSelectLatest
# → /travel-plans/:id (detail) → /itinerary → /itinerary/days/:id →
# weather. That chain can take 3–6s on a cold launch, so checking after
# a single waitForAnimationToEnd often loses the race with the tutorial
# mounting. Poll several times to give the overlay a chance to appear
# and be dismissed; each runFlow with `when` is a snapshot check, so we
# repeat to widen the visibility window without holding up flows where
# the tutorial never fires (free users with no plan).
- waitForAnimationToEnd:
    timeout: 3000

# First attempt — tutorial may already be visible.
- runFlow:
    when:
      visible: { id: "tutorial.skip-button" }
    commands:
      - tapOn: { id: "tutorial.skip-button" }

# Second attempt after a short delay — tutorial may have mounted while
# we were checking. waitForAnimationToEnd returns early when nothing is
# animating, so we use it as a "give the system a second" beat.
- waitForAnimationToEnd:
    timeout: 3000
- runFlow:
    when:
      visible: { id: "tutorial.skip-button" }
    commands:
      - tapOn: { id: "tutorial.skip-button" }

# Third attempt — last chance, longer wait. The home tutorial fires
# after the initial preview load completes; for premium users with a
# seeded plan that chain is the slowest path on a cold launch.
- waitForAnimationToEnd:
    timeout: 4000
- runFlow:
    when:
      visible: { id: "tutorial.skip-button" }
    commands:
      - tapOn: { id: "tutorial.skip-button" }

# Skip dismisses the entire walkthrough; next-button advances one step.
# If skip wasn't available (last tutorial step), walk to the end with
# Next/Got it.
- runFlow:
    when:
      visible: { id: "tutorial.next-button" }
    commands:
      - tapOn: { id: "tutorial.next-button" }
