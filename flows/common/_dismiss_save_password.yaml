appId: ${APP_ID}
tags: [helper]
---
# Dismiss iOS's Keychain "Save Password" sheet that fires right after a
# successful login or sign-up. Narrower than _dismiss_interrupts.yaml on
# purpose: this only matches the save-password sheet's button text so it
# can be safely chained right after submit-button without colliding with
# Home-screen UI that may contain words like "Allow", "Update", or
# "Dismiss". Use this helper post-login; use _dismiss_interrupts.yaml for
# system permission prompts that fire at app launch.
- runFlow:
    when:
      visible: "Not Now"
    commands:
      - tapOn: "Not Now"
- runFlow:
    when:
      visible: "Don't Save"
    commands:
      - tapOn: "Don't Save"
# iOS "Use Strong Password?" suggestion — fires when focusing a SecureField
# on Sign Up. If accepted, iOS injects its own generated password, derailing
# tests that need to type a specific value. "Choose My Own Password"
# dismisses the suggestion so subsequent inputText goes to the field.
- runFlow:
    when:
      visible: "Choose My Own Password"
    commands:
      - tapOn: "Choose My Own Password"
