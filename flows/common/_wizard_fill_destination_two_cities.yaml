appId: ${APP_ID}
tags: [helper]
---
# Reusable: assumes wizard.destination.title is visible. Fills a valid
# multi-city Destination (Origin Paris, two destination cities Rome + Madrid)
# and taps Next.
- assertVisible: { id: "wizard.destination.title" }
- tapOn: { id: "wizard.destination.origin-field" }
- inputText: "Paris"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn: { id: "wizard.destination.origin-suggestion.0" }
- tapOn: { id: "wizard.destination.departure-field" }
- tapOn: { id: "wizard.destination.date-picker.ok-button" }
- tapOn: { id: "wizard.destination.return-field" }
- tapOn: { id: "wizard.destination.date-picker.ok-button" }
- tapOn: { id: "wizard.destination.card.0.city-field" }
- inputText: "Rome"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn: { id: "wizard.destination.card.0.city-suggestion.0" }
- scrollUntilVisible:
    element: { id: "wizard.destination.add-destination-button" }
    direction: DOWN
- tapOn: { id: "wizard.destination.add-destination-button" }
- tapOn: { id: "wizard.destination.card.1.city-field" }
- inputText: "Madrid"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn: { id: "wizard.destination.card.1.city-suggestion.0" }
- tapOn: { id: "wizard.destination.next-button" }
