appId: ${APP_ID}
name: PRF-08
tags: [perf, p0]
---
# >>> dashboard-meta
# PRF-08 — Crash-free session rate stays above 99.5% across one week on the internal test track
# Section: Performance & Stability
# Priority: P0
# Repro:
# 1. Promote the build to internal testing and recruit testers.
# 2. Watch Firebase Crashlytics for 7 days.
# 3. Verify (sessions − crashes) / sessions ≥ 0.995.
# <<< dashboard-meta

# Maestro can't query Crashlytics. The closest viable proxy is a "no
# crash on cold-launch" smoke: cold-launch, sign in, walk the major
# tabs, hot-relaunch, and assert each screen still renders. If a
# reproducible startup or navigation crash existed it would tank the
# crash-free rate and surface here as a failed assertion.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- assertVisible: { id: "home.tab-bar" }
- tapOn: { id: "home.tab.home" }
- assertVisible: { id: "home.plan-header" }
- tapOn: { id: "home.tab.travel-plans" }
- assertVisible: { id: "travel-plans.title" }
- tapOn: { id: "home.tab.profile" }
- assertVisible: { id: "profile.title" }
- launchApp:
    stopApp: true
- assertVisible: { id: "home.tab-bar" }
- tapOn: { id: "home.tab.home" }
- assertVisible: { id: "home.plan-header" }
