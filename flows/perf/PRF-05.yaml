appId: ${APP_ID}
name: PRF-05
tags: [perf, p1]
---
# >>> dashboard-meta
# PRF-05 — Memory on Home stays under ~250 MB heap with no monotonic growth
# Section: Performance & Stability
# Priority: P1
# Repro:
# 1. Connect Android Studio Profiler → Memory.
# 2. Open Home, navigate Home → Itinerary → Home repeatedly.
# 3. Verify heap remains roughly steady around 180–240 MB; no monotonic upward growth across cycles.
# <<< dashboard-meta

# Maestro can't read heap size. The closest viable proxy is to repeat the
# Home → Itinerary → Home cycle several times and assert Home still
# renders its key ids — if a leak balloons the heap into OOM territory
# the app would crash mid-loop and the assertion would fail.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.home" }
- assertVisible: { id: "home.plan-header" }
- repeat:
    times: 8
    commands:
      - tapOn: { id: "home.day-card.0" }
      - assertVisible: { id: "itinerary-day.title" }
      - pressKey: "back"
      - assertVisible: { id: "home.plan-header" }
- assertVisible: { id: "home.tab-bar" }
- assertVisible: { id: "home.day-card.0" }
