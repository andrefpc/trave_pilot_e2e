appId: ${APP_ID}
name: NOT-09
tags: [notifications, p1]
---
# >>> dashboard-meta
# NOT-09 — In-app Notifications screen lists past notifications loaded from GET /notifications, paginated
# Section: Notifications & Reminders
# Priority: P1
# Repro:
# 1. Open the Notifications screen.
# 2. Verify a list of past notifications: reminders, weather tips, bookings, etc.
# 3. Scroll to the bottom — verify older notifications load via pagination.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.notifications" }
- assertVisible: { id: "notifications.list" }
- assertVisible: { id: "notifications.notification.0" }
- scrollUntilVisible:
    element: { id: "notifications.pagination-loader" }
    direction: DOWN
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "notifications.notification.10" }
