appId: ${APP_ID}
name: NOT-04
tags: [notifications, p1]
---
# >>> dashboard-meta
# NOT-04 — Tapping a stop-reminder notification deep-links to that stop's Itinerary day
# Section: Notifications & Reminders
# Priority: P1
# Repro:
# 1. Trigger a stop reminder (NOT-03).
# 2. Tap the notification in the tray.
# 3. Verify the app opens directly to the Itinerary day containing that stop.
# <<< dashboard-meta

# Maestro can schedule a reminder and assert the in-app reminder list reflects
# the scheduling, but it cannot interact with the system notification tray.
# We walk the deep-link destination via the in-app Notifications list so the
# target screen is exercised end-to-end.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.notifications" }
- assertVisible: { id: "notifications.list" }
- tapOn: { id: "notifications.notification.0" }
- assertVisible: { id: "itinerary.day-detail.title" }
- assertVisible: { id: "itinerary.stop-card.0" }
