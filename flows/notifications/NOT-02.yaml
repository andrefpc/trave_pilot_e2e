appId: ${APP_ID}
name: NOT-02
tags: [notifications, p0]
---
# >>> dashboard-meta
# NOT-02 — Denying POST_NOTIFICATIONS leaves the app fully functional (no crash, no notifications)
# Section: Notifications & Reminders
# Priority: P0
# Repro:
# 1. On Android 13+, when the permission dialog appears tap "Don't Allow".
# 2. Continue using the app: schedule a stop reminder.
# 3. Verify no notification fires and the app does not crash.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.itinerary" }
- tapOn: { id: "itinerary.day-card.0" }
- tapOn: { id: "itinerary.stop-card.0" }
- tapOn: { id: "itinerary.stop-detail.schedule-reminder-button" }
- runFlow:
    when:
      visible:
        id: "notifications.permission-prompt"
    commands:
      - tapOn: { id: "notifications.permission-prompt.deny-button" }
- assertVisible: { id: "notifications.permission-denied-banner" }
- tapOn: { id: "itinerary.stop-detail.back-button" }
- assertVisible: { id: "home.tab-bar" }
