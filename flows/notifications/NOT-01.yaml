appId: ${APP_ID}
name: NOT-01
tags: [notifications, p0]
---
# >>> dashboard-meta
# NOT-01 — On Android 13+, the first launch shows the system POST_NOTIFICATIONS permission dialog at the right moment
# Section: Notifications & Reminders
# Priority: P0
# Repro:
# 1. On a Pixel 6 or Pixel 8 Pro running Android 13+, fresh-install the app.
# 2. Sign in and reach the screen that uses notifications (e.g. when scheduling a reminder).
# 3. Verify the system permission dialog "Allow notifications?" appears.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.itinerary" }
- assertVisible: { id: "itinerary.day-card.0" }
- tapOn: { id: "itinerary.day-card.0" }
- assertVisible: { id: "itinerary.stop-card.0" }
- tapOn: { id: "itinerary.stop-card.0" }
- tapOn: { id: "itinerary.stop-detail.schedule-reminder-button" }
- assertVisible: { id: "notifications.permission-prompt" }
- assertVisible: { id: "notifications.permission-prompt.allow-button" }
- assertVisible: { id: "notifications.permission-prompt.deny-button" }
