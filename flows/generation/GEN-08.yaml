appId: ${APP_ID}
name: GEN-08
tags: [generation, p1, ios-only]
---
# >>> dashboard-meta
# GEN-08 — Tapping Retry after a Plan Generation failure restarts the generation flow
# Section: Plan Generation
# Priority: P1
# Repro:
# 1. From the failure screen (GEN-07), tap Retry.
# 2. Verify the error clears and a fresh compass animation + progress bar appear, with polling resuming.
# <<< dashboard-meta

# `generationFault=fail-once` makes the very next generation resolve to
# status=failed but lets the subsequent (Retry-triggered) generation succeed,
# letting us cover both the failure UI and the recovery on Retry.
- runFlow: ../common/_reset_data.yaml
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
    arguments:
      generationFault: "fail-once"
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "travel-plans.add-button" }
- assertVisible: { id: "wizard.destination.title" }
- tapOn: { id: "wizard.destination.next-button" }
- tapOn: { id: "wizard.walking-style.next-button" }
- tapOn: { id: "wizard.companions.next-button" }
- tapOn: { id: "wizard.day-schedule.next-button" }
- tapOn: { id: "wizard.meal-time.next-button" }
- tapOn: { id: "wizard.budget.next-button" }
- tapOn: { id: "wizard.places-of-interest.next-button" }
- tapOn: { id: "wizard.restaurants.next-button" }
- tapOn: { id: "wizard.where-to-stay.next-button" }
- tapOn: { id: "wizard.travel-times.next-button" }
- extendedWaitUntil:
    visible: { id: "plan-generation.retry-button" }
    timeout: 30000
- tapOn: { id: "plan-generation.retry-button" }
- assertNotVisible: { id: "plan-generation.error-message" }
- assertVisible: { id: "plan-generation.progress" }
- assertVisible: { id: "plan-generation.compass" }
