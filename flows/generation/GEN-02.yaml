appId: ${APP_ID}
name: GEN-02
tags: [generation, p2, android-only]
---
# >>> dashboard-meta
# GEN-02 — On Plan Generation, the destination-fact card cross-fades to a new fact every 8 seconds
# Section: Plan Generation
# Priority: P2
# Repro:
# 1. On Plan Generation, find the "Did you know?" / fact card.
# 2. Note the current fact text and start a stopwatch.
# 3. After ~8 s, verify the fact crossfades (fade out + fade in over ~400 ms) to a new fact.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "travel-plans.add-button" }
- runFlow: ../wizard/_walk_to_complete_onboarding.yaml
- tapOn: { id: "wizard.complete-onboarding.generate-plan-button" }
# Wait for the fact card to appear — city facts load async after
# plan creation + detail fetch, which can take 30-60s on the
# iOS Simulator.
- extendedWaitUntil:
    visible: { id: "plan-generation.fact-card" }
    timeout: 60000
- assertVisible: { id: "plan-generation.fact-card.text" }
- assertVisible: { id: "plan-generation.fact-card.index.0" }
- extendedWaitUntil:
    visible: { id: "plan-generation.fact-card.index.1" }
    timeout: 15000
- assertVisible: { id: "plan-generation.fact-card.index.1" }
