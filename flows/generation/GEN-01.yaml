appId: ${APP_ID}
name: GEN-01
tags: [generation, p1, android-only]
---
# >>> dashboard-meta
# GEN-01 — Plan Generation shows a compass that breathes (scales 0.95–1.05) and a progress bar that grows
# Section: Plan Generation
# Priority: P1
# Repro:
# 1. Trigger plan generation by completing the wizard.
# 2. On the "Creating Your Adventure" screen, watch the compass at the centre.
# 3. Verify it pulses smoothly (~2 s cycle) and the progress bar below grows over time.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "travel-plans.add-button" }
- runFlow: ../wizard/_walk_to_complete_onboarding.yaml
- tapOn: { id: "wizard.complete-onboarding.generate-plan-button" }
- assertVisible: { id: "plan-generation.title" }
- assertVisible: { id: "plan-generation.compass" }
- assertVisible: { id: "plan-generation.progress" }
# Confirm we're in the in-progress (breathing) phase, not done,
# by checking the percent label hasn't reached 100% yet.
- assertVisible:
    id: "plan-generation.percent-label"
- assertNotVisible:
    id: "plan-generation.percent-label"
    text: "100%"
