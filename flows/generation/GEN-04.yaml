appId: ${APP_ID}
name: GEN-04
tags: [generation, p0]
---
# >>> dashboard-meta
# GEN-04 — Plan Generation polls GET /travel-plans/:id/generation-status every ~2 seconds
# Section: Plan Generation
# Priority: P0
# Repro:
# 1. With Network Profiler open, trigger plan generation.
# 2. Watch the request timeline.
# 3. Verify GET /travel-plans/:id/generation-status fires roughly every 2 s with progressPercent / status updating in each response.
# <<< dashboard-meta

# Maestro can't read network traces. The dev build exposes a poll-counter
# marker on Plan Generation that increments once per status request, so
# observing it advance over a few seconds confirms the polling cadence and
# that responses are wired into the UI.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "travel-plans.add-button" }
- assertVisible: { id: "wizard.destination.title" }
- tapOn: { id: "wizard.destination.next-button" }
- tapOn: { id: "wizard.walking-style.next-button" }
- tapOn: { id: "wizard.companions.next-button" }
- tapOn: { id: "wizard.day-schedule.next-button" }
- tapOn: { id: "wizard.meal-time.next-button" }
- tapOn: { id: "wizard.budget.next-button" }
- tapOn: { id: "wizard.places-of-interest.next-button" }
- tapOn: { id: "wizard.restaurants.next-button" }
- tapOn: { id: "wizard.where-to-stay.next-button" }
- tapOn: { id: "wizard.travel-times.next-button" }
- assertVisible: { id: "plan-generation.progress" }
- assertVisible: { id: "plan-generation.poll-counter" }
- assertVisible:
    id: "plan-generation.poll-counter"
    text: "1"
- extendedWaitUntil:
    visible:
      id: "plan-generation.poll-counter"
      text: "3"
    timeout: 10000
