appId: ${APP_ID}
name: GEN-13
tags: [generation, p1]
---
# >>> dashboard-meta
# GEN-13 — Losing network during Plan Generation triggers retries; after recovery the screen continues normally
# Section: Plan Generation
# Priority: P1
# Repro:
# 1. On Plan Generation, toggle airplane mode on.
# 2. Wait 10 seconds — verify polling errors (and an inline error appears if it persists).
# 3. Toggle airplane off — polling resumes and progress continues.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "travel-plans.add-button" }
- runFlow: ../wizard/_walk_to_complete_onboarding.yaml
- tapOn: { id: "wizard.complete-onboarding.generate-plan-button" }
- assertVisible: { id: "plan-generation.progress" }
- toggleAirplaneMode
- waitForAnimationToEnd:
    timeout: 15000
- toggleAirplaneMode
- waitForAnimationToEnd:
    timeout: 15000
