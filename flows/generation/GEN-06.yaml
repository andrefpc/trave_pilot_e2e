appId: ${APP_ID}
name: GEN-06
tags: [generation, p1]
---
# >>> dashboard-meta
# GEN-06 — Pressing system back on Plan Generation while running is ignored and stays on the screen
# Section: Plan Generation
# Priority: P1
# Repro:
# 1. On Plan Generation while progress < 100%, press system back.
# 2. Verify the screen does not dismiss; generation continues.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "travel-plans.add-button" }
- runFlow: ../wizard/_walk_to_complete_onboarding.yaml
- tapOn: { id: "wizard.complete-onboarding.generate-plan-button" }
- assertVisible: { id: "plan-generation.progress" }
- pressKey: "back"
# Back press must keep us on plan-generation. We don't gate on
# whether the let's-go button is visible — on slower runners the
# generation may have completed by the time the back press fires,
# and the test is about back-press routing, not progress state.
- assertVisible: { id: "plan-generation.title" }
- assertNotVisible: { id: "wizard.travel-times.title" }
- assertNotVisible: { id: "home.tab-bar" }
