appId: ${APP_ID}
name: GEN-07
tags: [generation, p0]
---
# >>> dashboard-meta
# GEN-07 — When the server reports status=failed, an error message and a Retry button appear on Plan Generation
# Section: Plan Generation
# Priority: P0
# Repro:
# 1. Trigger plan generation and force a failure (e.g. proxy returns status=failed).
# 2. Verify the screen shows a "Generation failed" error message and a Retry button.
# <<< dashboard-meta

# Maestro can't intercept the status response. The dev build exposes a
# fault-injection hook (`generationFault=fail`) that makes the next generation
# the wizard kicks off resolve to status=failed without external proxying.
- runFlow: ../common/_reset_data.yaml
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
    arguments:
      generationFault: "fail"
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "travel-plans.add-button" }
- assertVisible: { id: "wizard.destination.title" }
- tapOn: { id: "wizard.destination.next-button" }
- tapOn: { id: "wizard.walking-style.next-button" }
- tapOn: { id: "wizard.companions.next-button" }
- tapOn: { id: "wizard.day-schedule.next-button" }
- tapOn: { id: "wizard.meal-time.next-button" }
- tapOn: { id: "wizard.budget.next-button" }
- tapOn: { id: "wizard.places-of-interest.next-button" }
- tapOn: { id: "wizard.restaurants.next-button" }
- tapOn: { id: "wizard.where-to-stay.next-button" }
- tapOn: { id: "wizard.travel-times.next-button" }
- assertVisible: { id: "plan-generation.progress" }
- extendedWaitUntil:
    visible: { id: "plan-generation.error-message" }
    timeout: 30000
- assertVisible: { id: "plan-generation.retry-button" }
