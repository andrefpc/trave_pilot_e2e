appId: ${APP_ID}
name: GEN-09
tags: [generation, p1]
---
# >>> dashboard-meta
# GEN-09 — A premium user triggering a 6th generation in one hour sees a rate-limit screen with a countdown to the next allowed run
# Section: Plan Generation
# Priority: P1
# Repro:
# 1. As a premium user, trigger plan generation 5 times in quick succession.
# 2. Trigger a 6th — verify a "Generation Limit Reached" screen with a countdown timer (e.g. 45:30 remaining) replaces the normal animation.
# <<< dashboard-meta

# `generationQuota=exhausted` seeds the premium account so the AI generation
# rate-limit window is already saturated for this hour, letting the very next
# generation hit the same 429 the production code path renders.
- runFlow: ../common/_reset_data.yaml
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
    arguments:
      generationQuota: "exhausted"
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "travel-plans.add-button" }
- assertVisible: { id: "wizard.destination.title" }
- tapOn: { id: "wizard.destination.next-button" }
- tapOn: { id: "wizard.walking-style.next-button" }
- tapOn: { id: "wizard.companions.next-button" }
- tapOn: { id: "wizard.day-schedule.next-button" }
- tapOn: { id: "wizard.meal-time.next-button" }
- tapOn: { id: "wizard.budget.next-button" }
- tapOn: { id: "wizard.places-of-interest.next-button" }
- tapOn: { id: "wizard.restaurants.next-button" }
- tapOn: { id: "wizard.where-to-stay.next-button" }
- tapOn: { id: "wizard.travel-times.next-button" }
- assertVisible: { id: "plan-generation.rate-limit.title" }
- assertVisible: { id: "plan-generation.rate-limit.countdown" }
- assertNotVisible: { id: "plan-generation.progress" }
