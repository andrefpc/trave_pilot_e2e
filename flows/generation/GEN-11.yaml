appId: ${APP_ID}
name: GEN-11
tags: [generation, p1, ios-only]
---
# >>> dashboard-meta
# GEN-11 — Plan Generation that runs longer than 10 minutes shows a timeout error and offers Retry
# Section: Plan Generation
# Priority: P1
# Repro:
# 1. On Plan Generation, simulate a backend that hangs (e.g. proxy delays the status endpoint).
# 2. Wait 10+ minutes.
# 3. Verify the screen shows a timeout error and a Retry option.
# <<< dashboard-meta

# `generationFault=hang` keeps the polled status pinned at "running" so the
# 10-minute client timeout can fire deterministically without waiting on a
# real backend stall. The dev build also collapses the timeout to ~30 s under
# this hook so the test stays under our standard runner budget.
- runFlow: ../common/_reset_data.yaml
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
    arguments:
      generationFault: "hang"
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "travel-plans.add-button" }
- assertVisible: { id: "wizard.destination.title" }
- tapOn: { id: "wizard.destination.next-button" }
- tapOn: { id: "wizard.walking-style.next-button" }
- tapOn: { id: "wizard.companions.next-button" }
- tapOn: { id: "wizard.day-schedule.next-button" }
- tapOn: { id: "wizard.meal-time.next-button" }
- tapOn: { id: "wizard.budget.next-button" }
- tapOn: { id: "wizard.places-of-interest.next-button" }
- tapOn: { id: "wizard.restaurants.next-button" }
- tapOn: { id: "wizard.where-to-stay.next-button" }
- tapOn: { id: "wizard.travel-times.next-button" }
- assertVisible: { id: "plan-generation.progress" }
    timeout: 60000
- assertVisible: { id: "plan-generation.retry-button" }
