appId: ${APP_ID}
name: PROF-13
tags: [profile, p1]
---
# >>> dashboard-meta
# PROF-13 — Logging out while in airplane mode still clears the local session and returns to Welcome
# Section: Profile & Account
# Priority: P1
# Repro:
# 1. Toggle airplane mode on, sign in already on the device.
# 2. Tap Profile → Logout → Confirm.
# 3. Verify Welcome appears even though no network call could be made.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- toggleAirplaneMode
- tapOn: { id: "profile.settings-button" }
- assertVisible: { id: "settings.logout-button" }
- tapOn: { id: "settings.logout-button" }
- assertVisible: { id: "settings.logout-sheet.title" }
- tapOn: { id: "settings.logout-sheet.confirm-button" }
- assertVisible: { id: "welcome.title" }
- toggleAirplaneMode
