appId: ${APP_ID}
name: PROF-17
tags: [profile, p2, ios-only]
---
# >>> dashboard-meta
# PROF-17 — Tapping the Help Center link on Profile opens the help URL externally
# Section: Profile & Account
# Priority: P2
# Repro:
# 1. On Profile, scroll to the Help Center link.
# 2. Tap it.
# 3. Verify a browser/Custom Tab opens at the help URL.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- scrollUntilVisible:
    element: { id: "profile.help-center-link" }
    direction: DOWN
- tapOn: { id: "profile.help-center-link" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "external-browser.url-bar" }
- pressKey: "back"
- assertVisible: { id: "profile.title" }
