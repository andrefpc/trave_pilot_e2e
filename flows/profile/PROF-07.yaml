appId: ${APP_ID}
name: PROF-07
tags: [profile, p0]
---
# >>> dashboard-meta
# PROF-07 — Changing password: old password + new password meeting the same six rules → success
# Section: Profile & Account
# Priority: P0
# Repro:
# 1. Open Profile / Settings → Change Password.
# 2. Enter old password and a new password meeting all six rules + confirmation.
# 3. Tap Save — verify a successful response and a "Password updated" message.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.settings-link" }
- tapOn: { id: "settings.change-password-row" }
- assertVisible: { id: "settings.change-password.title" }
- tapOn: { id: "settings.change-password.old-password-field" }
- inputText: ${TEST_FREE_PASSWORD}
- tapOn: { id: "settings.change-password.new-password-field" }
- inputText: "E2eRotated!2"
- tapOn: { id: "settings.change-password.confirm-password-field" }
- inputText: "E2eRotated!2"
- hideKeyboard
- tapOn: { id: "settings.change-password.submit-button" }
- waitForAnimationToEnd:
    timeout: 8000
- assertVisible: { id: "settings.change-password.success-snackbar" }
