appId: ${APP_ID}
name: PROF-04
tags: [profile, p1]
---
# >>> dashboard-meta
# PROF-04 — Editing the user's name on Profile (or Settings) sends PATCH /users/me and the name updates immediately
# Section: Profile & Account
# Priority: P1
# Repro:
# 1. Open Profile and the name-edit field (or Settings → name).
# 2. Change the name and tap Save.
# 3. Verify a PATCH /users/me fires and the new name shows on Profile.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.edit-button" }
- assertVisible: { id: "profile.edit.title" }
- tapOn: { id: "profile.edit.name-field" }
- eraseText
# Use a run-unique name so save() actually has a `hasChanges=true`
# (Save button is `enabled = hasChanges && !isSaving`). The previous
# fixed "Maestro QA" left the button disabled on subsequent runs
# once the user's stored name already matched.
- inputText: "Maestro ${TEST_RUN_ID}"
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "profile.edit.save-button" }
- waitForAnimationToEnd:
    timeout: 5000
# After save → popBackStack the Main NavHost may reset its tab nav
# to the start destination (Home). Explicitly re-enter the profile
# tab so the ProfileScreen re-mounts and `loadProfile()` runs
# against the freshly-saved name. Use a regex match because
# Maestro's `inputText` on a Compose TextField sometimes appends
# stray digits beyond the literal payload — we only care that the
# name actually changed to a value carrying our run-id prefix.
- tapOn: { id: "home.tab.profile" }
- extendedWaitUntil:
    visible:
      id: "profile.user-name"
      text: "Maestro ${TEST_RUN_ID}.*"
    timeout: 10000
