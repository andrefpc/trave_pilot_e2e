appId: ${APP_ID}
name: PROF-06
tags: [profile, p2, ios-only]
---
# >>> dashboard-meta
# PROF-06 — After changing the email, a verification email is sent (if implemented)
# Section: Profile & Account
# Priority: P2
# Repro:
# 1. Edit the email to a new valid address and Save.
# 2. Wait 1-2 minutes and check that inbox.
# 3. Verify a verification email arrived with a confirmation link.
# <<< dashboard-meta

# Maestro can't read an external inbox. The dev/QA build surfaces the most
# recently-issued verification email on Profile → Edit so we can assert it
# was generated for the new address.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.edit-button" }
- tapOn: { id: "profile.edit.email-field" }
- eraseText
- inputText: "e2e+changed@travelpilotapp.com"
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "profile.edit.save-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "profile.edit.verification-sent-banner" }
- assertVisible:
    id: "profile.edit.verification-sent-banner.recipient"
    text: "e2e+changed@travelpilotapp.com"
