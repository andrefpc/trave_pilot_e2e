appId: ${APP_ID}
name: PROF-19
tags: [profile, p0]
---
# >>> dashboard-meta
# PROF-19 — Tapping the Privacy Policy link on Profile opens the privacy page
# Section: Profile & Account
# Priority: P0
# Repro:
# 1. On Profile, tap Privacy Policy.
# 2. Verify the privacy URL opens in a browser/Custom Tab (or in-app screen).
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- scrollUntilVisible:
    element: { id: "profile.privacy-policy-link" }
    direction: DOWN
- tapOn: { id: "profile.privacy-policy-link" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "profile.privacy.title" }
- pressKey: "back"
- assertVisible: { id: "profile.title" }
