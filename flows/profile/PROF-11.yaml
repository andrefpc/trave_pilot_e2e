appId: ${APP_ID}
name: PROF-11
tags: [profile, p1]
---
# >>> dashboard-meta
# PROF-11 — A premium user on Profile sees a "You are Premium" badge instead of the upgrade card
# Section: Profile & Account
# Priority: P1
# Repro:
# 1. Sign in as a premium user.
# 2. Tap Profile.
# 3. Verify "You are Premium" badge is present and the Unlock Premium card is hidden.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- assertVisible: { id: "profile.title" }
- extendedWaitUntil:
    visible: { id: "profile.premium-badge" }
    timeout: 10000
- assertNotVisible: { id: "profile.unlock-premium-card" }
- assertNotVisible: { id: "profile.upgrade-to-premium-button" }
