appId: ${APP_ID}
name: PROF-10
tags: [profile, p1, ios-only]
---
# >>> dashboard-meta
# PROF-10 — A free user on Profile sees the "Unlock Premium" upgrade card
# Section: Profile & Account
# Priority: P1
# Repro:
# 1. Sign in as a free user.
# 2. Tap Profile.
# 3. Verify a Premium upgrade card with pricing and a "Subscribe" / "Upgrade" button is visible.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- assertVisible: { id: "profile.title" }
- assertVisible: { id: "profile.unlock-premium-card" }
- assertVisible: { id: "profile.unlock-premium-card.price" }
- assertVisible: { id: "profile.upgrade-to-premium-button" }
- assertNotVisible: { id: "profile.premium-badge" }
