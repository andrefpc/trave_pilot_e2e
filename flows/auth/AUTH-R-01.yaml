appId: ${APP_ID}
name: AUTH-R-01
tags: [auth, p0]
---
# >>> dashboard-meta
# AUTH-R-01 — Tapping Register with the name field empty shows "Name cannot be empty" under the name field
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. From Welcome → Create Plan → walk to Complete Onboarding → tap Sign Up. (Or open Register directly from a deep link.)
# 2. Leave Name empty, fill a valid email and a password meeting all six rules.
# 3. Tap "Create Account" and verify "Name cannot be empty" appears below Name; no request fires.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
# Cold-start the app via the deeplink so MainActivity.onCreate (not
# onNewIntent) processes the URL. Same pattern as the SMK-09 fix.
- stopApp: ${APP_ID}
- openLink: travelpilot://register
- assertVisible: { id: "register.title" }
- tapOn: { id: "register.email-field" }
- inputText: ${TEST_NEW_EMAIL}
- tapOn: { id: "register.password-field" }
- runFlow: ../common/_dismiss_save_password.yaml
- inputText: "Password1!"
- tapOn: { id: "register.confirm-password-field" }
- runFlow: ../common/_dismiss_save_password.yaml
- inputText: "Password1!"
- runFlow: ../common/_hide_keyboard.yaml
# iOS doesn't expose a `register.name-field.error` testID for the empty-
# name validation message. What it DOES expose is the create-account
# button's enabled state — `enabled: false` while name is empty proves
# the form blocks submission (the test's intent: "no request fires").
- assertVisible:
    id: "register.create-account-button"
    enabled: false
- assertNotVisible: { id: "register.loading-overlay" }
