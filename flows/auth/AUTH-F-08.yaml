appId: ${APP_ID}
name: AUTH-F-08
tags: [auth, p1]
---
# >>> dashboard-meta
# AUTH-F-08 — A recovery code that was already used once is rejected with "Invalid reset token" if reused
# Section: Authentication & Session
# Priority: P1
# Repro:
# 1. Complete a successful password reset using a code (see AUTH-F-10).
# 2. Open Recovery Code again and re-enter the same code, set a new password, tap Reset.
# 3. Verify "Invalid reset token" appears — codes are single-use.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- tapOn: { id: "login.forgot-password-link" }
- tapOn: { id: "forgot-password.email-field" }
- inputText: ${TEST_EMAIL}
- hideKeyboard
- tapOn: { id: "forgot-password.send-code-button" }
- assertVisible: { id: "recovery-code.title" }
- copyTextFrom: { id: "test.recovery-code.last-issued" }
- tapOn: { id: "recovery-code.cell.0" }
- pasteText
- tapOn: { id: "recovery-code.submit-button" }
- assertVisible: { id: "reset-password.title" }
- tapOn: { id: "reset-password.password-field" }
- inputText: "NewPass1!"
- tapOn: { id: "reset-password.confirm-password-field" }
- inputText: "NewPass1!"
- hideKeyboard
- tapOn: { id: "reset-password.submit-button" }
- assertVisible: { id: "login.title" }
# Now reuse the same code — it should be single-use and rejected.
- tapOn: { id: "login.forgot-password-link" }
- tapOn: { id: "forgot-password.email-field" }
- inputText: ${TEST_EMAIL}
- hideKeyboard
- tapOn: { id: "forgot-password.send-code-button" }
- assertVisible: { id: "recovery-code.title" }
- tapOn: { id: "recovery-code.cell.0" }
- pasteText
- tapOn: { id: "recovery-code.submit-button" }
- assertVisible: { id: "reset-password.title" }
- tapOn: { id: "reset-password.password-field" }
- inputText: "AnotherPass1!"
- tapOn: { id: "reset-password.confirm-password-field" }
- inputText: "AnotherPass1!"
- hideKeyboard
- tapOn: { id: "reset-password.submit-button" }
- assertVisible: { id: "reset-password.invalid-token-dialog.title" }
