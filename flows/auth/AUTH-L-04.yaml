appId: ${APP_ID}
name: AUTH-L-04
tags: [auth, p0]
---
# >>> dashboard-meta
# AUTH-L-04 — Logging in with a correct email but wrong password shows an "Invalid credentials" dialog with Retry
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. From Welcome, tap Login → "Sign in with password".
# 2. Enter a registered email and a wrong password.
# 3. Tap Login. Verify a brief loading overlay, then a dialog with "Invalid credentials" and a Retry button.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.email-field" }
- inputText: ${TEST_EMAIL}
- tapOn: { id: "login.password-field" }
- inputText: "wrong-password-xyz"
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "login.submit-button" }
- assertVisible: { id: "login.error-dialog.title" }
- assertVisible: { id: "login.error-dialog.retry-button" }
