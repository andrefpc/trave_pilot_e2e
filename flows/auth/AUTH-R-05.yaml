appId: ${APP_ID}
name: AUTH-R-05
tags: [auth, p0]
---
# >>> dashboard-meta
# AUTH-R-05 — A password without an uppercase letter keeps the "Uppercase" rule red and Create Account disabled
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. On Register, type "password1!" into Password and matching Confirm.
# 2. Verify the Uppercase rule stays red.
# 3. Verify Create Account is disabled.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
# Cold-start the app via the deeplink so MainActivity.onCreate (not
# onNewIntent) processes the URL. Same pattern as the SMK-09 fix.
- stopApp: ${APP_ID}
- openLink: travelpilot://register
- assertVisible: { id: "register.title" }
- tapOn: { id: "register.name-field" }
- inputText: "QA Tester"
- tapOn: { id: "register.email-field" }
- inputText: ${TEST_NEW_EMAIL}
- tapOn: { id: "register.password-field" }
- inputText: "password1!"
- tapOn: { id: "register.confirm-password-field" }
- inputText: "password1!"
- runFlow: ../common/_hide_keyboard.yaml
- assertVisible: { id: "register.rule.uppercase", text: "ic_unchecked" }
- assertVisible: { id: "register.create-account-button", enabled: false }
