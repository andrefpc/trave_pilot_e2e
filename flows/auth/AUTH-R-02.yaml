appId: ${APP_ID}
name: AUTH-R-02
tags: [auth, p0]
---
# >>> dashboard-meta
# AUTH-R-02 — Typing "bad@" in the email field on Register shows "Invalid email address" inline; nothing is sent
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. Open the Register screen.
# 2. Enter a name, type "bad@" in Email, fill a valid password.
# 3. Tap "Create Account" and verify "Invalid email address" shows below Email; no request fires.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
# Cold-start the app via the deeplink so MainActivity.onCreate (not
# onNewIntent) processes the URL. Same pattern as the SMK-09 fix.
- stopApp: ${APP_ID}
- openLink: travelpilot://register
- assertVisible: { id: "register.title" }
- tapOn: { id: "register.name-field" }
- inputText: "QA Tester"
- tapOn: { id: "register.email-field" }
- inputText: "bad@"
- tapOn: { id: "register.password-field" }
- inputText: "Password1!"
- tapOn: { id: "register.confirm-password-field" }
- inputText: "Password1!"
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "register.create-account-button" }
- assertVisible: { id: "register.email-field.error" }
- assertNotVisible: { id: "register.loading-overlay" }
