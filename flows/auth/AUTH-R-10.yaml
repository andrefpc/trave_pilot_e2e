appId: ${APP_ID}
name: AUTH-R-10
tags: [auth, p0]
---
# >>> dashboard-meta
# AUTH-R-10 — Registering with an email that already has an account shows an "Email already exists" dialog with Retry
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. On Register, fill name, valid password and an email that is already registered (e.g. qa-free@…).
# 2. Tap "Create Account".
# 3. Verify a loading overlay flashes, then a dialog "Email already exists" appears with Retry.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- openLink: travelpilot://register
- assertVisible: { id: "register.title" }
- tapOn: { id: "register.name-field" }
- inputText: "QA Tester"
- tapOn: { id: "register.email-field" }
- inputText: ${TEST_EMAIL}
- tapOn: { id: "register.password-field" }
- inputText: "Password1!"
- tapOn: { id: "register.confirm-password-field" }
- inputText: "Password1!"
- hideKeyboard
- tapOn: { id: "register.create-account-button" }
- assertVisible: { id: "register.email-exists-dialog.title" }
- assertVisible: { id: "register.email-exists-dialog.retry-button" }
