appId: ${APP_ID}
name: AUTH-W-03
tags: [auth, p1, android-only]
---
# >>> dashboard-meta
# AUTH-W-03 — Tapping "Have an account, Login" opens a bottom sheet with Google and password sign-in options
# Section: Authentication & Session
# Priority: P1
# Repro:
# 1. On Welcome, tap "Have an account, Login".
# 2. Verify a bottom sheet titled "Welcome back" slides up with two buttons: "Sign in with Google" and "Sign in with password".
# 3. Swipe down to dismiss — the sheet closes and Welcome remains.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- assertVisible: { id: "auth-sheet.title" }
- assertVisible: { id: "auth-sheet.signin-with-google" }
- assertVisible: { id: "auth-sheet.signin-with-password" }
- swipe:
    from: { id: "auth-sheet.title" }
    direction: DOWN
- assertNotVisible: { id: "auth-sheet.title" }
- assertVisible: { id: "welcome.title" }
