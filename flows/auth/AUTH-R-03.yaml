appId: ${APP_ID}
name: AUTH-R-03
tags: [auth, p1]
---
# >>> dashboard-meta
# AUTH-R-03 — On Register, six password rule check boxes turn green in real time as your password meets each rule
# Section: Authentication & Session
# Priority: P1
# Repro:
# 1. Open the Register screen and focus the password field.
# 2. Type characters one at a time and watch the rules below: 8+ chars, uppercase, lowercase, number, special, match.
# 3. Verify each rule's box flips from red to green the moment its condition is satisfied.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
# Cold-start the app via the deeplink so MainActivity.onCreate (not
# onNewIntent) processes the URL. Same pattern as the SMK-09 fix.
- stopApp: ${APP_ID}
- openLink: travelpilot://register
- assertVisible: { id: "register.title" }
# Each rule row has one testID `register.rule.<name>` containing the icon.
# State is communicated via the icon's accessibilityText: "ic_unchecked"
# (rule unmet) or "ic_checked" (rule met). iOS doesn't expose separate
# `*.met-marker` / `*.unmet-marker` accessibility ids — assert on the icon
# text directly.
- assertVisible: { id: "register.rule.length",    text: "ic_unchecked" }
- assertVisible: { id: "register.rule.uppercase", text: "ic_unchecked" }
- assertVisible: { id: "register.rule.lowercase", text: "ic_unchecked" }
- assertVisible: { id: "register.rule.number",    text: "ic_unchecked" }
- assertVisible: { id: "register.rule.special",   text: "ic_unchecked" }
- assertVisible: { id: "register.rule.match",     text: "ic_unchecked" }
- tapOn: { id: "register.password-field" }
- runFlow: ../common/_dismiss_save_password.yaml
# After typing in the password field, the soft keyboard hides the lower
# password rules on Android (Compose's auto-scroll anchors the focused
# TextField, not the rules below it). `scrollUntilVisible` is a no-op if
# the element is already in view (iOS), and scrolls within the form
# scroll-view to surface the rule before each `assertVisible` (Android).
- inputText: "P"
- scrollUntilVisible:
    element: { id: "register.rule.uppercase" }
    direction: DOWN
    timeout: 5000
- assertVisible: { id: "register.rule.uppercase", text: "ic_checked" }
- inputText: "a"
- scrollUntilVisible:
    element: { id: "register.rule.lowercase" }
    direction: DOWN
    timeout: 5000
- assertVisible: { id: "register.rule.lowercase", text: "ic_checked" }
- inputText: "ssword"
- scrollUntilVisible:
    element: { id: "register.rule.length" }
    direction: UP
    timeout: 5000
- assertVisible: { id: "register.rule.length",    text: "ic_checked" }
- inputText: "1"
- scrollUntilVisible:
    element: { id: "register.rule.number" }
    direction: DOWN
    timeout: 5000
- assertVisible: { id: "register.rule.number",    text: "ic_checked" }
- inputText: "!"
- scrollUntilVisible:
    element: { id: "register.rule.special" }
    direction: DOWN
    timeout: 5000
- assertVisible: { id: "register.rule.special",   text: "ic_checked" }
- tapOn: { id: "register.confirm-password-field" }
- runFlow: ../common/_dismiss_save_password.yaml
- inputText: "Password1!"
- scrollUntilVisible:
    element: { id: "register.rule.match" }
    direction: DOWN
    timeout: 5000
- assertVisible: { id: "register.rule.match",     text: "ic_checked" }
