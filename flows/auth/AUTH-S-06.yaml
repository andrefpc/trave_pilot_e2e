appId: ${APP_ID}
name: AUTH-S-06
tags: [auth, p0]
---
# >>> dashboard-meta
# AUTH-S-06 — Signing up with Google at the end of the trip wizard lands on Plan Generation for that draft (not Home)
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. Cold-launch the app and walk the wizard to Complete Onboarding.
# 2. Tap "Sign up with Google" and choose a Google account that has never registered.
# 3. Verify the app creates the account and opens Plan Generation for the draft you just built (not Home).
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
    arguments:
      googleAuthEmail: ${TEST_GOOGLE_NEW_EMAIL}
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- assertVisible: { id: "wizard.destination.title" }
- tapOn: { id: "wizard.destination.next-button" }
- tapOn: { id: "wizard.walking-style.next-button" }
- tapOn: { id: "wizard.companions.next-button" }
- tapOn: { id: "wizard.day-schedule.next-button" }
- tapOn: { id: "wizard.meal-time.next-button" }
- tapOn: { id: "wizard.budget.next-button" }
- tapOn: { id: "wizard.places-of-interest.next-button" }
- tapOn: { id: "wizard.restaurants.next-button" }
- tapOn: { id: "wizard.where-to-stay.next-button" }
- tapOn: { id: "wizard.travel-times.next-button" }
- assertVisible: { id: "wizard.complete-onboarding.title" }
- tapOn: { id: "wizard.complete-onboarding.google-button" }
- assertVisible: { id: "google-auth.picker" }
- runFlow:
    when:
      visible: { id: "test.google-auth.confirm-account" }
    commands:
      - tapOn: { id: "test.google-auth.confirm-account" }
- assertVisible: { id: "plan-generation.progress" }
- assertNotVisible: { id: "home.tab-bar" }
