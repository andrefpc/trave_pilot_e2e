appId: ${APP_ID}
name: AUTH-S-03
tags: [auth, p1]
---
# >>> dashboard-meta
# AUTH-S-03 — An expired Google ID token is rejected by the server and an "Invalid/expired token" dialog is shown
# Section: Authentication & Session
# Priority: P1
# Repro:
# 1. Use a development build with a way to inject an expired Google ID token (or revoke the token in the Google account before continuing).
# 2. Trigger Login → "Sign in with Google".
# 3. Verify an error dialog about an invalid or expired token appears; the user is not signed in.
# <<< dashboard-meta

# Dev-build hook `googleAuthTokenMode=expired` makes the next Google sign-in
# attempt mint an already-expired ID token before forwarding to the server.
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
    arguments:
      googleAuthTokenMode: "expired"
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-google" }
- assertVisible: { id: "google-auth.picker" }
- runFlow:
    when:
      visible: { id: "test.google-auth.confirm-account" }
    commands:
      - tapOn: { id: "test.google-auth.confirm-account" }
- assertVisible: { id: "google-auth.invalid-token-dialog.title" }
- assertNotVisible: { id: "home.tab-bar" }
