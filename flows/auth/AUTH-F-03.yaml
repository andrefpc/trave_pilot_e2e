appId: ${APP_ID}
name: AUTH-F-03
tags: [auth, p1, ios-only]
---
# >>> dashboard-meta
# AUTH-F-03 — On Forgot Password, "xxx" in the email field shows "Invalid email address" inline; no email is sent
# Section: Authentication & Session
# Priority: P1
# Repro:
# 1. From Login → "Recover Password".
# 2. Type "xxx" in the email field and tap "Send Recovery Code".
# 3. Verify "Invalid email address" appears under the field and no request goes out.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.forgot-password-link" }
- assertVisible: { id: "forgot-password.title" }
- tapOn: { id: "forgot-password.email-field" }
- inputText: "xxx"
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "forgot-password.send-code-button" }
- assertVisible: { id: "forgot-password.email-field.error" }
- assertNotVisible: { id: "recovery-code.title" }
- assertNotVisible: { id: "forgot-password.loading-overlay" }
