appId: ${APP_ID}
name: AUTH-L-10
tags: [auth, p1]
---
# >>> dashboard-meta
# AUTH-L-10 — Tapping the "Recover Password" link on Login opens the Forgot Password screen
# Section: Authentication & Session
# Priority: P1
# Repro:
# 1. From Welcome, tap Login → "Sign in with password".
# 2. Tap "Recover Password" (top-right above the Login button).
# 3. Verify the Forgot Password screen opens with an email field and a "Send Recovery Code" button.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.forgot-password-link" }
- assertVisible: { id: "forgot-password.title" }
- assertVisible: { id: "forgot-password.email-field" }
- assertVisible: { id: "forgot-password.send-code-button" }
