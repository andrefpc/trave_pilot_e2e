appId: ${APP_ID}
name: AUTH-L-01
tags: [auth, p0]
---
# >>> dashboard-meta
# AUTH-L-01 — Tapping Login with the email field empty shows "Invalid email address" under the field; nothing is sent
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. From Welcome, tap Login → "Sign in with password".
# 2. Leave Email empty, type any password.
# 3. Tap "Login".
# 4. Verify "Invalid email address" appears below Email; no network request fires (check Network Profiler).
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.password-field" }
- inputText: "Password1!"
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "login.submit-button" }
- runFlow: ../common/_dismiss_save_password.yaml
- assertVisible: { id: "login.email-field.error" }
- assertNotVisible: { id: "login.loading-overlay" }
