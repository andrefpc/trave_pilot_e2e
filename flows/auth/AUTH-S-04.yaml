appId: ${APP_ID}
name: AUTH-S-04
tags: [auth, p1]
---
# >>> dashboard-meta
# AUTH-S-04 — A tampered Google ID token is rejected by the server and an "Invalid token" dialog is shown
# Section: Authentication & Session
# Priority: P1
# Repro:
# 1. Use a dev tool (Frida / Charles) to modify the Google ID token in flight before it reaches the API.
# 2. Complete Login → "Sign in with Google".
# 3. Verify the API returns 401 and an "Invalid token" dialog appears.
# <<< dashboard-meta

# Dev-build hook `googleAuthTokenMode=tampered` flips one signature byte on
# the next Google ID token before it leaves the device, exercising the same
# server-side rejection path a real MITM tool would.
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
    arguments:
      googleAuthTokenMode: "tampered"
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-google" }
- assertVisible: { id: "google-auth.picker" }
- runFlow:
    when:
      visible: { id: "test.google-auth.confirm-account" }
    commands:
      - tapOn: { id: "test.google-auth.confirm-account" }
- assertVisible: { id: "google-auth.invalid-token-dialog.title" }
- assertNotVisible: { id: "home.tab-bar" }
