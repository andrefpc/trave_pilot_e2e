appId: ${APP_ID}
name: AUTH-R-07
tags: [auth, p0, ios-only]
---
# >>> dashboard-meta
# AUTH-R-07 — A password without a digit keeps the "Number" rule red and Create Account disabled
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. On Register, type "Password!" into Password and matching Confirm.
# 2. Verify the Number rule stays red and Create Account is disabled.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- openLink: travelpilot://register
- assertVisible: { id: "register.title" }
- tapOn: { id: "register.name-field" }
- inputText: "QA Tester"
- tapOn: { id: "register.email-field" }
- inputText: ${TEST_NEW_EMAIL}
- tapOn: { id: "register.password-field" }
- inputText: "Password!"
- tapOn: { id: "register.confirm-password-field" }
- inputText: "Password!"
- runFlow: ../common/_hide_keyboard.yaml
- assertVisible: { id: "register.rule.number.unmet-marker" }
- assertVisible: { id: "register.create-account-button.disabled-marker" }
