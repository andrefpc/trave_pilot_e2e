appId: ${APP_ID}
name: AUTH-S-02
tags: [auth, p0, android-only]
---
# >>> dashboard-meta
# AUTH-S-02 — Signing in with Google using the same email you registered with via password links them as one account
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. Register an account via email + password (call its email user@gmail.com).
# 2. Sign out, then from Welcome tap Login → "Sign in with Google" and pick the user@gmail.com Google account.
# 3. Verify the sign-in succeeds and Home opens — no "account already exists" error.
# <<< dashboard-meta

# Reset script ensures ${TEST_GOOGLE_EXISTING_EMAIL} already exists as a
# password-registered user, with the same email as the seeded Google account.
- runFlow: ../common/_reset_data.yaml
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
    arguments:
      googleAuthEmail: ${TEST_GOOGLE_EXISTING_EMAIL}
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-google" }
- assertVisible: { id: "google-auth.picker" }
- runFlow:
    when:
      visible: { id: "test.google-auth.confirm-account" }
    commands:
      - tapOn: { id: "test.google-auth.confirm-account" }
- assertVisible: { id: "home.tab-bar" }
- assertNotVisible: { id: "google-auth.account-conflict-dialog.title" }
