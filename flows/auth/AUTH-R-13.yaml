appId: ${APP_ID}
name: AUTH-R-13
tags: [auth, p2]
---
# >>> dashboard-meta
# AUTH-R-13 — A 255-character name is accepted on Register; longer names are rejected by the server
# Section: Authentication & Session
# Priority: P2
# Repro:
# 1. On Register, paste a 255-character name (repeat any letter), valid email, valid password.
# 2. Tap Create Account — registration succeeds.
# 3. Sign out and try again with a 256-character name; verify the server rejects it with an inline error.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
# Cold-start the app via the deeplink so MainActivity.onCreate (not
# onNewIntent) processes the URL. Same pattern as the SMK-09 fix.
- stopApp: ${APP_ID}
- openLink: travelpilot://register
- assertVisible: { id: "register.title" }
# 255 chars (boundary that should succeed).
- tapOn: { id: "register.name-field" }
- inputText: ${TEST_NAME_255}
- tapOn: { id: "register.email-field" }
- inputText: "e2e+r13-${TEST_RUN_ID}@travelpilotapp.com"
- tapOn: { id: "register.password-field" }
- inputText: "Password1!"
- tapOn: { id: "register.confirm-password-field" }
- inputText: "Password1!"
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "register.create-account-button" }
# home.tab.home assertion has a flaky Maestro detection race on iOS;
# home.screen-root is a more reliable "we're on Home" anchor.
- assertVisible: { id: "home.screen-root" }
# Skip the UI logout flow (Profile → Settings → Logout). Failure analysis
# (round 19 screenshot) showed the post-register Profile→Settings tap
# chain drifts to Feed unpredictably, leaving "Logout" never findable.
# The 256-char follow-up only needs a clean Register screen, which a
# fresh launchApp gives us deterministically.
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- stopApp: ${APP_ID}
- openLink: travelpilot://register
- tapOn: { id: "register.name-field" }
- inputText: ${TEST_NAME_256}
- tapOn: { id: "register.email-field" }
- inputText: ${TEST_NEW_EMAIL_2}
- tapOn: { id: "register.password-field" }
- inputText: "Password1!"
- tapOn: { id: "register.confirm-password-field" }
- inputText: "Password1!"
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "register.create-account-button" }
# Server rejects 256 chars with a 400; iOS shows a "Validation failed"
# alert. The alert is a SwiftUI .alert() with no testID — the only stable
# matchers are its accessibility text. (Verified via `maestro hierarchy`.)
- assertVisible: "Validation failed"
- tapOn: "Dismiss"
