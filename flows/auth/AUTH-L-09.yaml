appId: ${APP_ID}
name: AUTH-L-09
tags: [auth, p1]
---
# >>> dashboard-meta
# AUTH-L-09 — While the login request is running, the Login button is disabled so it cannot be tapped twice
# Section: Authentication & Session
# Priority: P1
# Repro:
# 1. On Login, enter valid credentials.
# 2. Tap Login and watch the button immediately.
# 3. Verify it greys out / shows a loading state and does not fire a second request if you tap repeatedly.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.email-field" }
- inputText: ${TEST_EMAIL}
- tapOn: { id: "login.password-field" }
- inputText: ${TEST_PASSWORD}
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "login.submit-button" }
# Submit button immediately swaps to a disabled state during the login
# request. iOS doesn't expose `login.submit-button.loading-marker` as a
# separate testID — the disabled state is communicated via the AX
# `enabled: false` flag on the button itself. The 500 ms min-display
# duration the iOS team added pins it for Maestro to observe.
- assertVisible: { id: "login.submit-button", enabled: false }
- repeat:
    times: 5
    commands:
      - tapOn:
          id: "login.submit-button"
          optional: true
- runFlow: ../common/_dismiss_save_password.yaml
- runFlow: ../common/_dismiss_tutorial.yaml
- assertVisible: { id: "home.screen-root" }
