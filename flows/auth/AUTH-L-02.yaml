appId: ${APP_ID}
name: AUTH-L-02
tags: [auth, p0]
---
# >>> dashboard-meta
# AUTH-L-02 — Tapping Login with "notanemail" in the email field shows "Invalid email address"; nothing is sent
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. From Welcome, tap Login → "Sign in with password".
# 2. Type "notanemail" in Email and a valid-looking password.
# 3. Tap "Login".
# 4. Verify "Invalid email address" appears below Email; no request fires.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.email-field" }
- inputText: "notanemail"
- tapOn: { id: "login.password-field" }
- inputText: "Password1!"
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "login.submit-button" }
- runFlow: ../common/_dismiss_save_password.yaml
- assertVisible: { id: "login.email-field.error" }
- assertNotVisible: { id: "login.loading-overlay" }
