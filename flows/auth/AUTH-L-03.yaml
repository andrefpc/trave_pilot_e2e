appId: ${APP_ID}
name: AUTH-L-03
tags: [auth, p0]
---
# >>> dashboard-meta
# AUTH-L-03 — Tapping Login with the password field empty shows "Password cannot be empty" under the field; nothing is sent
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. From Welcome, tap Login → "Sign in with password".
# 2. Type a valid email, leave Password empty.
# 3. Tap "Login".
# 4. Verify "Password cannot be empty" appears below Password; no request fires.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.email-field" }
- inputText: "qa-free@travelpilotapp.com"
- hideKeyboard
- tapOn: { id: "login.submit-button" }
- assertVisible: { id: "login.password-field.error" }
- assertNotVisible: { id: "login.loading-overlay" }
