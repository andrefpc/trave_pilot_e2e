appId: ${APP_ID}
name: AUTH-W-04
tags: [auth, p0, android-only]
---
# >>> dashboard-meta
# AUTH-W-04 — Tapping "Sign in with Google" on Welcome opens the Credential Manager picker; choosing an account lands on Home
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. On Welcome, tap "Have an account, Login" → "Sign in with Google".
# 2. Verify the Google account picker (Credential Manager) appears.
# 3. Choose a Google account.
# 4. Verify a loading overlay shows briefly, then Home opens.
# <<< dashboard-meta

# Maestro can't drive the system Credential Manager directly. We assert the
# in-app trigger fires the picker, then drive the dev-build hook
# `test.google-auth.confirm-account` to simulate a successful account pick.
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-google" }
- assertVisible: { id: "google-auth.picker" }
- runFlow:
    when:
      visible: { id: "test.google-auth.confirm-account" }
    commands:
      - tapOn: { id: "test.google-auth.confirm-account" }
- assertVisible: { id: "home.tab-bar" }
