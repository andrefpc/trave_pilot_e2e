appId: ${APP_ID}
name: AUTH-R-06
tags: [auth, p0, ios-only]
---
# >>> dashboard-meta
# AUTH-R-06 — A password without a lowercase letter keeps the "Lowercase" rule red and Create Account disabled
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. On Register, type "PASSWORD1!" into Password and matching Confirm.
# 2. Verify the Lowercase rule stays red and Create Account is disabled.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- openLink: travelpilot://register
- assertVisible: { id: "register.title" }
- tapOn: { id: "register.name-field" }
- inputText: "QA Tester"
- tapOn: { id: "register.email-field" }
- inputText: ${TEST_NEW_EMAIL}
- tapOn: { id: "register.password-field" }
- inputText: "PASSWORD1!"
- tapOn: { id: "register.confirm-password-field" }
- inputText: "PASSWORD1!"
- runFlow: ../common/_hide_keyboard.yaml
- assertVisible: { id: "register.rule.lowercase.unmet-marker" }
- assertVisible: { id: "register.create-account-button.disabled-marker" }
