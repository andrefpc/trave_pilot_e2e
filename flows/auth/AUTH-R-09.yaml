appId: ${APP_ID}
name: AUTH-R-09
tags: [auth, p0, ios-only]
---
# >>> dashboard-meta
# AUTH-R-09 — When password and confirmation differ, the "Passwords match" rule stays red and Create Account is disabled
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. On Register, type "Password1!" in Password and "Password2!" in Confirm.
# 2. Verify the "Passwords match" rule stays red.
# 3. Change Confirm so it matches; verify the rule turns green and Create Account becomes enabled.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- openLink: travelpilot://register
- assertVisible: { id: "register.title" }
- tapOn: { id: "register.name-field" }
- inputText: "QA Tester"
- tapOn: { id: "register.email-field" }
- inputText: ${TEST_NEW_EMAIL}
- tapOn: { id: "register.password-field" }
- inputText: "Password1!"
- tapOn: { id: "register.confirm-password-field" }
- inputText: "Password2!"
- runFlow: ../common/_hide_keyboard.yaml
- assertVisible: { id: "register.rule.match.unmet-marker" }
- assertVisible: { id: "register.create-account-button.disabled-marker" }
- tapOn: { id: "register.confirm-password-field" }
- eraseText
- inputText: "Password1!"
- runFlow: ../common/_hide_keyboard.yaml
- assertVisible: { id: "register.rule.match.met-marker" }
- assertVisible: { id: "register.create-account-button.enabled-marker" }
