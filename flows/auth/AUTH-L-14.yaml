appId: ${APP_ID}
name: AUTH-L-14
tags: [auth, p1]
---
# >>> dashboard-meta
# AUTH-L-14 — Tapping Login while the device is in airplane mode shows a "No internet connection" dialog with Retry
# Section: Authentication & Session
# Priority: P1
# Repro:
# 1. Toggle airplane mode on.
# 2. From Welcome, tap Login → "Sign in with password".
# 3. Enter valid credentials and tap Login.
# 4. Verify the "No internet connection" error dialog appears with a Retry button.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- toggleAirplaneMode
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.email-field" }
- inputText: ${TEST_EMAIL}
- tapOn: { id: "login.password-field" }
- inputText: ${TEST_PASSWORD}
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "login.submit-button" }
- assertVisible: { id: "login.no-internet-dialog.title" }
- assertVisible: { id: "login.no-internet-dialog.retry-button" }
- toggleAirplaneMode
