appId: ${APP_ID}
name: AUTH-R-11
tags: [auth, p0]
---
# >>> dashboard-meta
# AUTH-R-11 — Registering with no draft trip in progress lands on Home after success
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. Open Register from outside the wizard (for example via a deep link or by signing out and re-registering).
# 2. Fill a fresh name + email + valid password.
# 3. Tap "Create Account" and verify Home appears.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- openLink: travelpilot://register
- assertVisible: { id: "register.title" }
- tapOn: { id: "register.name-field" }
- inputText: ${TEST_NEW_NAME}
- tapOn: { id: "register.email-field" }
- inputText: ${TEST_NEW_EMAIL}
- tapOn: { id: "register.password-field" }
- inputText: ${TEST_NEW_PASSWORD}
- tapOn: { id: "register.confirm-password-field" }
- inputText: ${TEST_NEW_PASSWORD}
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "register.create-account-button" }
- assertVisible: { id: "home.tab-bar" }
- assertNotVisible: { id: "plan-generation.progress" }
