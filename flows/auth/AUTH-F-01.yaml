appId: ${APP_ID}
name: AUTH-F-01
tags: [auth, p0]
---
# >>> dashboard-meta
# AUTH-F-01 — On Forgot Password, submitting a registered email opens Recovery Code and emails the user a 5-digit code
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. From Login, tap "Recover Password".
# 2. Enter a registered email and tap "Send Recovery Code".
# 3. Verify a loading overlay flashes, then Recovery Code opens. Within 1–2 minutes the inbox receives a 5-digit code.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.forgot-password-link" }
- assertVisible: { id: "forgot-password.title" }
- tapOn: { id: "forgot-password.email-field" }
- inputText: ${TEST_EMAIL}
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "forgot-password.send-code-button" }
- assertVisible: { id: "recovery-code.title" }
- assertVisible: { id: "recovery-code.cell.0" }
