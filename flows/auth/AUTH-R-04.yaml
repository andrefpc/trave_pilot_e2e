appId: ${APP_ID}
name: AUTH-R-04
tags: [auth, p0]
---
# >>> dashboard-meta
# AUTH-R-04 — A password shorter than 8 characters keeps the "8 characters" rule red and the Create Account button disabled
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. On Register, type "Ab1!" (4 chars) into Password and matching Confirm.
# 2. Verify the "8 characters" rule remains red.
# 3. Verify "Create Account" is greyed out (or refuses to proceed when tapped).
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- openLink: travelpilot://register
- assertVisible: { id: "register.title" }
- tapOn: { id: "register.name-field" }
- inputText: "QA Tester"
- tapOn: { id: "register.email-field" }
- inputText: ${TEST_NEW_EMAIL}
- tapOn: { id: "register.password-field" }
- inputText: "Ab1!"
- tapOn: { id: "register.confirm-password-field" }
- inputText: "Ab1!"
- hideKeyboard
- assertVisible: { id: "register.rule.length.unmet-marker" }
- assertVisible: { id: "register.create-account-button.disabled-marker" }
