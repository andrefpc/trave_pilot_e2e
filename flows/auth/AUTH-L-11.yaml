appId: ${APP_ID}
name: AUTH-L-11
tags: [auth, p1]
---
# >>> dashboard-meta
# AUTH-L-11 — Tapping the back arrow on Login returns to Welcome without losing entered data
# Section: Authentication & Session
# Priority: P1
# Repro:
# 1. From Welcome, tap Login → "Sign in with password".
# 2. Type any email/password.
# 3. Tap the back arrow in the toolbar.
# 4. Verify Welcome is shown again. (Re-entering Login starts with an empty form.)
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.email-field" }
- inputText: "draft@example.com"
- tapOn: { id: "login.password-field" }
- inputText: "Password1!"
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "login.back-button" }
# iOS pops Save Password after typing into the password field; dismiss it
# before checking we're back on Welcome.
- runFlow: ../common/_dismiss_save_password.yaml
- assertVisible: { id: "welcome.title" }
# Re-entering Login should start fresh (no draft email retained). iOS
# doesn't expose `login.email-field.empty-marker` — assert the field's text
# is empty instead.
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- assertVisible:
    id: "login.email-field"
    text: ""
