appId: ${APP_ID}
name: AUTH-F-13
tags: [auth, p0, ios-only]
---
# >>> dashboard-meta
# AUTH-F-13 — Logging in with the old password after a reset shows the "Invalid credentials" error
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. Complete a password reset for an account.
# 2. From Login, enter the email and the old (pre-reset) password.
# 3. Verify a dialog "Invalid credentials" appears.
# <<< dashboard-meta

# Reset script seeds the user with the new password so the original
# `TEST_PASSWORD` is now stale.
- runFlow: ../common/_reset_data.yaml
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.email-field" }
- inputText: ${TEST_EMAIL}
- tapOn: { id: "login.password-field" }
- inputText: ${TEST_PASSWORD}
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "login.submit-button" }
- assertVisible: { id: "login.error-dialog.title" }
- assertVisible: { id: "login.error-dialog.retry-button" }
