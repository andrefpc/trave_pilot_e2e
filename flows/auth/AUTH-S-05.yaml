appId: ${APP_ID}
name: AUTH-S-05
tags: [auth, p2]
---
# >>> dashboard-meta
# AUTH-S-05 — When Google sign-in is not configured on the server, an explanatory error dialog explains why it's unavailable
# Section: Authentication & Session
# Priority: P2
# Repro:
# 1. On a backend environment where GOOGLE_OAUTH_CLIENT_ID is unset, attempt Login → "Sign in with Google".
# 2. Verify a clear error dialog explains Google sign-in is not configured (no generic crash).
# <<< dashboard-meta

# Dev-build hook `googleAuthBackendMode=unconfigured` forces the backend
# stub to return the same 503 the production code returns when
# GOOGLE_OAUTH_CLIENT_ID is missing.
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
    arguments:
      googleAuthBackendMode: "unconfigured"
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-google" }
- assertVisible: { id: "google-auth.picker" }
- runFlow:
    when:
      visible: { id: "test.google-auth.confirm-account" }
    commands:
      - tapOn: { id: "test.google-auth.confirm-account" }
- assertVisible: { id: "google-auth.unconfigured-dialog.title" }
- assertNotVisible: { id: "home.tab-bar" }
