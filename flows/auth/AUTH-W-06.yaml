appId: ${APP_ID}
name: AUTH-W-06
tags: [auth, p2]
---
# >>> dashboard-meta
# AUTH-W-06 — When Google sign-in fails (e.g. Play Services disabled) a "Google sign-in failed" dialog appears with Retry
# Section: Authentication & Session
# Priority: P2
# Repro:
# 1. On a test device, disable Google Play Services in Settings → Apps.
# 2. Cold-launch Travel Pilot, tap Login → "Sign in with Google".
# 3. Verify an error dialog "Google sign-in failed" appears with a Retry button. Tapping Retry re-attempts the flow.
# <<< dashboard-meta

# Maestro can't toggle Play Services. The dev build exposes a fault-injection
# hook (`test.fault-injection.google-fail`) that forces the next Google sign-in
# attempt to fail with the same dialog the production code path renders.
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
    arguments:
      faultInjection: "google-fail"
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-google" }
- assertVisible: { id: "google-auth.error-dialog.title" }
- assertVisible: { id: "google-auth.error-dialog.retry-button" }
- tapOn: { id: "google-auth.error-dialog.retry-button" }
- assertVisible: { id: "google-auth.picker" }
