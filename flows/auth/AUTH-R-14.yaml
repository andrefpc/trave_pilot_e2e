appId: ${APP_ID}
name: AUTH-R-14
# `ios-only`: Maestro Android does not support Unicode in `inputText`
# (https://github.com/mobile-dev-inc/maestro/issues/146). The exact-name
# verification still has full iOS coverage, and Android registration
# accepts the same payload at the API layer (covered by API unit tests).
tags: [auth, p2, ios-only]
---
# >>> dashboard-meta
# AUTH-R-14 — A name with accents, apostrophe and hyphen (e.g. "José O'Connor-Müller") is accepted on Register
# Section: Authentication & Session
# Priority: P2
# Repro:
# 1. On Register, enter "José O'Connor-Müller" as the name with valid email + password.
# 2. Tap Create Account — registration succeeds and the Profile shows the same name verbatim.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
# Cold-start the app via the deeplink so MainActivity.onCreate (not
# onNewIntent) processes the URL. Same pattern as the SMK-09 fix.
- stopApp: ${APP_ID}
- openLink: travelpilot://register
- assertVisible: { id: "register.title" }
- tapOn: { id: "register.name-field" }
- inputText: "José O'Connor-Müller"
- tapOn: { id: "register.email-field" }
- inputText: "e2e+r14-${TEST_RUN_ID}@travelpilotapp.com"
- tapOn: { id: "register.password-field" }
- inputText: "Password1!"
- tapOn: { id: "register.confirm-password-field" }
- inputText: "Password1!"
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "register.create-account-button" }
# home.tab.home assertion has a flaky Maestro detection race on iOS;
# home.screen-root is a more reliable "we're on Home" anchor.
- assertVisible: { id: "home.screen-root" }
# `tapOn: { id: "home.tab.profile" }` fails on iOS post-register: the
# element IS in the AX tree but Maestro's matcher can't find it (likely a
# WDA hittability quirk). Tap by the visible text "Profile" — that works
# reliably across registration's empty-state Home.
- tapOn: "Profile"
- assertVisible:
    id: "profile.user-name"
    text: "José O'Connor-Müller"
