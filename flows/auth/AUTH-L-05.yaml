appId: ${APP_ID}
name: AUTH-L-05
tags: [auth, p0]
---
# >>> dashboard-meta
# AUTH-L-05 — After 5 wrong-password attempts in a row, the next try shows an "Account locked for 15 minutes" dialog
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. From Welcome, tap Login → "Sign in with password" using qa-locked@travelpilotapp.com.
# 2. Enter the wrong password and tap Login. Repeat 4 more times (5 total wrong attempts).
# 3. On the 5th failure, verify an error dialog explains the account is locked for 15 minutes.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.email-field" }
- inputText: ${TEST_LOCKED_EMAIL}
- tapOn: { id: "login.password-field" }
- inputText: "wrong-password-xyz"
- runFlow: ../common/_hide_keyboard.yaml
# API contract (auth.service.ts): 5 wrong attempts increment counter,
# the 6th attempt is when the lockout check trips and account_locked is
# returned. So the test does 5 invalid_credentials roundtrips, then a
# 6th submit that triggers the lockout dialog.
- repeat:
    times: 5
    commands:
      - tapOn: { id: "login.submit-button" }
      - assertVisible: { id: "login.error-dialog.title" }
      - tapOn: { id: "login.error-dialog.retry-button" }
- tapOn: { id: "login.submit-button" }
- runFlow: ../common/_dismiss_save_password.yaml
- assertVisible: { id: "login.lockout-dialog.title" }
- assertVisible: { id: "login.lockout-dialog.retry-button" }
