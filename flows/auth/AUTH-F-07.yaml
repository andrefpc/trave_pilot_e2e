appId: ${APP_ID}
name: AUTH-F-07
tags: [auth, p1]
---
# >>> dashboard-meta
# AUTH-F-07 — A recovery code older than 15 minutes is rejected with "Invalid reset token" on the Reset step
# Section: Authentication & Session
# Priority: P1
# Repro:
# 1. Submit Forgot Password and wait 16+ minutes without opening the email.
# 2. Then enter the (now-expired) code, set a valid new password, tap Reset.
# 3. Verify the dialog "Invalid reset token" appears.
# <<< dashboard-meta

# The reset script seeds an expired recovery code for ${TEST_EMAIL} so we
# don't have to wait 15+ minutes in the e2e suite.
- runFlow: ../common/_reset_data.yaml
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- tapOn: { id: "login.forgot-password-link" }
- tapOn: { id: "forgot-password.email-field" }
- inputText: ${TEST_RESET_EMAIL}
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "forgot-password.send-code-button" }
- assertVisible: { id: "recovery-code.title" }
- tapOn: { id: "recovery-code.cell.0" }
- inputText: ${TEST_EXPIRED_RECOVERY_CODE}
- tapOn: { id: "recovery-code.submit-button" }
- assertVisible: { id: "reset-password.title" }
- tapOn: { id: "reset-password.password-field" }
- inputText: "NewPass1!"
- tapOn: { id: "reset-password.confirm-password-field" }
- inputText: "NewPass1!"
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "reset-password.submit-button" }
- assertVisible: { id: "reset-password.invalid-token-dialog.title" }
