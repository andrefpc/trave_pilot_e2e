appId: ${APP_ID}
name: AUTH-S-01
tags: [auth, p0, android-only]
---
# >>> dashboard-meta
# AUTH-S-01 — Signing in with a Google account that has never been registered creates the account and lands on Home
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. From Welcome, tap Login → "Sign in with Google".
# 2. In the Credential Manager picker, pick a Google account that is brand new to Travel Pilot.
# 3. Verify the app creates an account silently and Home opens (no Welcome flicker).
# <<< dashboard-meta

# Reset script ensures TEST_GOOGLE_NEW_EMAIL has no Travel Pilot account.
- runFlow: ../common/_reset_data.yaml
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
    arguments:
      googleAuthEmail: ${TEST_GOOGLE_NEW_EMAIL}
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-google" }
- assertVisible: { id: "google-auth.picker" }
- runFlow:
    when:
      visible: { id: "test.google-auth.confirm-account" }
    commands:
      - tapOn: { id: "test.google-auth.confirm-account" }
- assertVisible: { id: "home.tab-bar" }
- assertNotVisible: { id: "welcome.title" }
