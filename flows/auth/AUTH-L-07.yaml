appId: ${APP_ID}
name: AUTH-L-07
tags: [auth, p1]
---
# >>> dashboard-meta
# AUTH-L-07 — Tapping the eye icon on the Login password field toggles between hidden dots and the visible password
# Section: Authentication & Session
# Priority: P1
# Repro:
# 1. On Login, type a password — it shows as dots.
# 2. Tap the eye icon at the right of the Password field.
# 3. Verify the password text becomes readable.
# 4. Tap again and verify it returns to dots.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.password-field" }
- inputText: "Password1!"
- assertVisible: { id: "login.password-field.masked-marker" }
- tapOn: { id: "login.password-toggle" }
- assertVisible: { id: "login.password-field.visible-marker" }
- tapOn: { id: "login.password-toggle" }
- assertVisible: { id: "login.password-field.masked-marker" }
