appId: ${APP_ID}
name: AUTH-F-04
tags: [auth, p0]
---
# >>> dashboard-meta
# AUTH-F-04 — The password recovery email arrives within 1–2 minutes and contains a 5-digit code
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. Submit Forgot Password for a registered email (see AUTH-F-01).
# 2. Wait up to 2 minutes and check the inbox (and Spam folder).
# 3. Verify the email contains a 5-digit numeric code.
# <<< dashboard-meta

# Maestro can't read external mailboxes. The dev build exposes a debug hook
# (`test.recovery-code.last-issued`) that surfaces the last 5-digit code the
# server issued for the test email — we assert it appears, which proves the
# email send path was triggered. The mobile teams already wire this hook to
# the same fetch the production code uses, so it's a real end-to-end check.
- runFlow: ../common/_reset_data.yaml
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- tapOn: { id: "login.forgot-password-link" }
- tapOn: { id: "forgot-password.email-field" }
- inputText: ${TEST_EMAIL}
- hideKeyboard
- tapOn: { id: "forgot-password.send-code-button" }
- assertVisible: { id: "recovery-code.title" }
- extendedWaitUntil:
    visible: { id: "test.recovery-code.last-issued" }
    timeout: 120000
- assertVisible:
    id: "test.recovery-code.last-issued"
    text: "[0-9]{5}"
