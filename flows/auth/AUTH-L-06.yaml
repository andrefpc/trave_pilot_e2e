appId: ${APP_ID}
name: AUTH-L-06
tags: [auth, p1]
---
# >>> dashboard-meta
# AUTH-L-06 — Logging in with the correct password after the 15-minute lockout window expires succeeds
# Section: Authentication & Session
# Priority: P1
# Repro:
# 1. Trigger the 15-min lockout (see AUTH-L-05).
# 2. Wait 15 minutes (or have an admin reset the lockout via /api/v1/admin/actions).
# 3. Re-attempt login with the correct password and verify Home opens normally.
# <<< dashboard-meta

# Reset script clears the lockout via the admin endpoint so we don't have to
# wait the full 15 minutes in the e2e suite.
- runFlow: ../common/_reset_data.yaml
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.email-field" }
- inputText: "qa-locked@travelpilotapp.com"
- tapOn: { id: "login.password-field" }
- inputText: ${TEST_LOCKED_PASSWORD}
- runFlow: ../common/_hide_keyboard.yaml
- tapOn: { id: "login.submit-button" }
- assertVisible: { id: "home.tab-bar" }
