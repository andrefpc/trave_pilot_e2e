appId: ${APP_ID}
name: AUTH-F-11
tags: [auth, p0, manual-only]
---
# >>> dashboard-meta
# AUTH-F-11 — After a password reset, any other device that was logged in is forced to sign in again on its next request
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. Sign in on Device A and leave it on Home.
# 2. On Device B, complete the password reset flow for the same account.
# 3. On Device A, tap any tab to trigger an API call.
# 4. Verify Device A returns to Welcome and requires a fresh login.
# <<< dashboard-meta

# Maestro drives a single device. To exercise "another device", we use the
# debug hook that calls /api/v1/auth/reset-password directly with a seeded
# token, simulating the second device completing the reset while we stay
# logged in on this device.
- runFlow: ../common/_reset_data.yaml
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_EMAIL}
      TEST_PASSWORD: ${TEST_PASSWORD}
- assertVisible: { id: "home.tab.home" }
- runScript:
    file: ../../scripts/maestro-reset-password-other-device.js
- tapOn: { id: "home.tab.travel-plans" }
- assertVisible: { id: "welcome.title" }
- assertNotVisible: { id: "home.tab.home" }
