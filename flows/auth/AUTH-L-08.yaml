appId: ${APP_ID}
name: AUTH-L-08
tags: [auth, p0]
---
# >>> dashboard-meta
# AUTH-L-08 — Logging in with valid credentials shows a loading overlay, then opens Home with the user's plan if any
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. From Welcome, tap Login → "Sign in with password".
# 2. Enter a valid email and password and tap Login.
# 3. Verify a loading overlay appears briefly, then Home opens. If the user already has an active plan it is shown.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.email-field" }
- inputText: ${TEST_EMAIL}
- tapOn: { id: "login.password-field" }
- inputText: ${TEST_PASSWORD}
- hideKeyboard
- tapOn: { id: "login.submit-button" }
- assertVisible: { id: "home.tab-bar" }
