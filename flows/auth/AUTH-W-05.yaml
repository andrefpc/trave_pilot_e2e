appId: ${APP_ID}
name: AUTH-W-05
tags: [auth, p1]
---
# >>> dashboard-meta
# AUTH-W-05 — Dismissing the Google account picker on Welcome closes it with no crash and no error toast
# Section: Authentication & Session
# Priority: P1
# Repro:
# 1. On Welcome, tap "Sign in with Google".
# 2. When the Credential Manager picker appears, swipe it down or tap outside to cancel.
# 3. Verify the app stays on Welcome with the bottom sheet still visible (or closed) and no error dialog/toast appears.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-google" }
- assertVisible: { id: "google-auth.picker" }
- runFlow:
    when:
      visible: { id: "test.google-auth.cancel" }
    commands:
      - tapOn: { id: "test.google-auth.cancel" }
- assertVisible: { id: "welcome.title" }
- assertNotVisible: { id: "google-auth.error-dialog.title" }
- assertNotVisible: { id: "global.error-toast" }
