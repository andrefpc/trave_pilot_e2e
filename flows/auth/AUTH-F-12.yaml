appId: ${APP_ID}
name: AUTH-F-12
tags: [auth, p0]
---
# >>> dashboard-meta
# AUTH-F-12 — Logging in with the new password after a reset succeeds and lands on Home
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. Complete a password reset (AUTH-F-10).
# 2. From Login, enter the email and the new password.
# 3. Verify Home opens normally.
# <<< dashboard-meta

# Reset script seeds the user with the post-reset password (`TEST_NEW_PASSWORD`)
# so we don't depend on AUTH-F-10 having run earlier in the suite.
- runFlow: ../common/_reset_data.yaml
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.email-field" }
- inputText: ${TEST_EMAIL}
- tapOn: { id: "login.password-field" }
- inputText: ${TEST_NEW_PASSWORD}
- hideKeyboard
- tapOn: { id: "login.submit-button" }
- assertVisible: { id: "home.tab-bar" }
