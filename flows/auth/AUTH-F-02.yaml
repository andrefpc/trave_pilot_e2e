appId: ${APP_ID}
name: AUTH-F-02
tags: [auth, p0]
---
# >>> dashboard-meta
# AUTH-F-02 — On Forgot Password, submitting an unknown email also opens Recovery Code (no error — prevents account enumeration)
# Section: Authentication & Session
# Priority: P0
# Repro:
# 1. From Login → "Recover Password".
# 2. Enter a clearly-unregistered email such as nobody@example.com and tap "Send Recovery Code".
# 3. Verify the same Recovery Code screen opens — no "user not found" error appears.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.forgot-password-link" }
- assertVisible: { id: "forgot-password.title" }
- tapOn: { id: "forgot-password.email-field" }
- inputText: "nobody@example.com"
- hideKeyboard
- tapOn: { id: "forgot-password.send-code-button" }
- assertVisible: { id: "recovery-code.title" }
- assertNotVisible: { id: "forgot-password.user-not-found-dialog.title" }
