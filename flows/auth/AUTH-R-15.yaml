appId: ${APP_ID}
name: AUTH-R-15
tags: [auth, p1]
---
# >>> dashboard-meta
# AUTH-R-15 — Tapping the "Terms of Service" link on Register opens the terms page in a browser/Custom Tab
# Section: Authentication & Session
# Priority: P1
# Repro:
# 1. On Register, scroll to the small print near the Create Account button.
# 2. Tap the "Terms of Service" link.
# 3. Verify Chrome Custom Tabs (or the system browser) opens the live terms page.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- openLink: travelpilot://register
- assertVisible: { id: "register.title" }
- scrollUntilVisible:
    element: { id: "register.terms-link" }
    direction: DOWN
- tapOn: { id: "register.terms-link" }
# A Custom Tab opens above the app — the in-app Register screen is no longer
# the foreground composition. Verify by asserting the URL bar artifact the
# Custom Tab exposes (test hook) or that the in-app title is no longer visible.
- assertNotVisible: { id: "register.title" }
- assertVisible: { id: "external-browser.url-bar" }
