appId: ${APP_ID}
name: AUTH-L-13
tags: [auth, p1]
---
# >>> dashboard-meta
# AUTH-L-13 — Right after a premium user logs in, the Profile screen shows the Premium badge
# Section: Authentication & Session
# Priority: P1
# Repro:
# 1. From Welcome, sign in with a known premium account (e.g. qa-premium@…).
# 2. As soon as Home loads, tap Profile.
# 3. Verify a "You are Premium" badge is visible (no spinner / no "Unlock Premium" card).
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- assertVisible: { id: "profile.title" }
- assertVisible: { id: "profile.premium-badge" }
- assertNotVisible: { id: "profile.unlock-premium-card" }
- assertNotVisible: { id: "profile.premium-spinner" }
