appId: ${APP_ID}
name: SET-09
tags: [settings, p2]
---
# >>> dashboard-meta
# SET-09 — Tapping Clear Cache wipes Coil image cache; reopening images forces a network reload
# Section: Settings & Preferences
# Priority: P2
# Repro:
# 1. On Settings, tap Clear Cache.
# 2. Verify a confirmation snackbar appears.
# 3. Open Itinerary — image requests fire to load images that were previously cached.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.home" }
- tapOn: { id: "home.day-card.0" }
- assertVisible: { id: "itinerary-day.title" }
- pressKey: "back"
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.settings-link" }
- scrollUntilVisible:
    element: { id: "settings.clear-cache-row" }
    direction: DOWN
- tapOn: { id: "settings.clear-cache-row" }
- assertVisible: { id: "settings.clear-cache.success-snackbar" }
- pressKey: "back"
- tapOn: { id: "home.tab.home" }
- tapOn: { id: "home.day-card.0" }
- assertVisible: { id: "itinerary-day.image-cache.miss-marker" }
