appId: ${APP_ID}
name: SET-08
tags: [settings, p1]
---
# >>> dashboard-meta
# SET-08 — Per-type notification toggles disable specific categories (trip reminders, bookings, etc.) via PUT /notifications/preferences
# Section: Settings & Preferences
# Priority: P1
# Repro:
# 1. On Settings → Notifications, toggle off Trip Reminders only.
# 2. Schedule a stop reminder.
# 3. Verify no notification appears.
# 4. Re-enable Trip Reminders — schedule again — verify the notification fires.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.settings-link" }
- tapOn: { id: "settings.notifications-row" }
- assertVisible: { id: "settings.notifications.title" }
- tapOn: { id: "settings.notifications.trip-reminders-toggle" }
- assertVisible: { id: "settings.notifications.trip-reminders-toggle.off-marker" }
- scrollUntilVisible:
    element: { id: "settings.notifications.debug.schedule-test-reminder-button" }
    direction: DOWN
- tapOn: { id: "settings.notifications.debug.schedule-test-reminder-button" }
- waitForAnimationToEnd:
    timeout: 8000
- assertVisible: { id: "settings.notifications.debug.last-delivered.empty-marker" }
- scrollUntilVisible:
    element: { id: "settings.notifications.trip-reminders-toggle" }
    direction: UP
- tapOn: { id: "settings.notifications.trip-reminders-toggle" }
- assertVisible: { id: "settings.notifications.trip-reminders-toggle.on-marker" }
- scrollUntilVisible:
    element: { id: "settings.notifications.debug.schedule-test-reminder-button" }
    direction: DOWN
- tapOn: { id: "settings.notifications.debug.schedule-test-reminder-button" }
- waitForAnimationToEnd:
    timeout: 8000
- assertVisible: { id: "settings.notifications.debug.last-delivered.trip-reminder-marker" }
