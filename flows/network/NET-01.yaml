appId: ${APP_ID}
name: NET-01
tags: [network, p0]
---
# >>> dashboard-meta
# NET-01 — Cold-launching offline shows cached data if available and offers a Retry; no crash
# Section: Network, Offline & Error Handling
# Priority: P0
# Repro:
# 1. Toggle airplane mode on, force-stop the app.
# 2. Cold-launch the app.
# 3. Verify cached screens render (if available) or the app shows an offline message with a Retry CTA — not a crash.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.home" }
- assertVisible: { id: "home.plan-header" }
- toggleAirplaneMode
- launchApp:
    stopApp: true
- assertVisible: { id: "home.no-internet-banner" }
- assertVisible: { id: "home.plan-header" }
- assertVisible: { id: "home.no-internet-banner.retry-button" }
- toggleAirplaneMode
