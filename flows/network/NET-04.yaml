appId: ${APP_ID}
name: NET-04
tags: [network, p0]
---
# >>> dashboard-meta
# NET-04 — A 401 response triggers a token refresh; the original request is retried automatically with the new token
# Section: Network, Offline & Error Handling
# Priority: P0
# Repro:
# 1. Sign in normally.
# 2. Use mitmproxy to inject a 401 on the next protected request.
# 3. Verify the TokenAuthenticator fires POST /auth/refresh and the original request is retried successfully.
# <<< dashboard-meta

# Maestro can't inject 401s. We use the in-app debug action that asks the
# backend to expire the access token and re-issue, then verify the next
# request still resolves to a populated screen (the silent refresh worked).
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.settings-link" }
- scrollUntilVisible:
    element: { id: "settings.debug-section" }
    direction: DOWN
- tapOn: { id: "settings.debug.expire-access-token-button" }
- assertVisible: { id: "settings.debug.token-expired-toast" }
- tapOn: { id: "home.tab.home" }
- waitForAnimationToEnd:
    timeout: 8000
- assertVisible: { id: "home.plan-header" }
- assertNotVisible: { id: "welcome.title" }
