appId: ${APP_ID}
name: NET-10
tags: [network, p1]
---
# >>> dashboard-meta
# NET-10 — A 503 service-unavailable error shows the same Retry dialog; recovery on retry succeeds
# Section: Network, Offline & Error Handling
# Priority: P1
# Repro:
# 1. Inject 503 via mitmproxy on a request.
# 2. Trigger the request and tap Retry after letting the proxy pass through.
# 3. Verify the request succeeds.
# <<< dashboard-meta

# Use the debug action that forces the next request to return 503; the
# in-app dialog matches the 5xx error template and Retry recovers normally.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.settings-link" }
- scrollUntilVisible:
    element: { id: "settings.debug.force-next-503-button" }
    direction: DOWN
- tapOn: { id: "settings.debug.force-next-503-button" }
- tapOn: { id: "home.tab.home" }
- assertVisible: { id: "network.error-dialog.title" }
- assertVisible: { id: "network.error-dialog.retry-button" }
- tapOn: { id: "network.error-dialog.retry-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertNotVisible: { id: "network.error-dialog.title" }
- assertVisible: { id: "home.plan-header" }
