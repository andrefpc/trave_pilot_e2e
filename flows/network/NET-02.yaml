appId: ${APP_ID}
name: NET-02
tags: [network, p0]
---
# >>> dashboard-meta
# NET-02 — Toggling airplane mode mid-screen shows an error with Retry; reconnecting + Retry resumes
# Section: Network, Offline & Error Handling
# Priority: P0
# Repro:
# 1. Open Home or Itinerary normally.
# 2. Toggle airplane mode on, then tap any control that triggers a request.
# 3. Verify an error/skeleton with a Retry button appears.
# 4. Disable airplane and tap Retry — verify data loads.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.home" }
- assertVisible: { id: "home.plan-header" }
- toggleAirplaneMode
- tapOn: { id: "home.refresh-button" }
- assertVisible: { id: "home.no-internet-banner" }
- assertVisible: { id: "home.no-internet-banner.retry-button" }
- toggleAirplaneMode
- tapOn: { id: "home.no-internet-banner.retry-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertNotVisible: { id: "home.no-internet-banner" }
- assertVisible: { id: "home.plan-header" }
