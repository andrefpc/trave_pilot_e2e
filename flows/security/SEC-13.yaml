appId: ${APP_ID}
name: SEC-13
tags: [security, p0]
---
# >>> dashboard-meta
# SEC-13 — An account is locked for 15 minutes after 5 failed login attempts (i18nKey "auth.account_locked")
# Section: Security & Auth Hardening
# Priority: P0
# Repro:
# 1. From Login, attempt the wrong password for one account 5 times in a row.
# 2. On the 5th failure, verify the dialog explains the account is locked for 15 minutes.
# 3. Verify the response carries i18nKey "auth.account_locked" (Network Profiler).
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.have-account-login" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.email-field" }
- inputText: ${TEST_FREE_EMAIL}
- tapOn: { id: "login.password-field" }
- inputText: "WrongPwd!9"
- hideKeyboard
- repeat:
    times: 5
    commands:
      - tapOn: { id: "login.submit-button" }
      - waitForAnimationToEnd:
          timeout: 5000
      - runFlow:
          when:
            visible:
              id: "login.error-dialog.retry-button"
          commands:
            - tapOn: { id: "login.error-dialog.retry-button" }
- assertVisible: { id: "login.lockout-dialog.title" }
- assertVisible: { id: "login.lockout-dialog.retry-button" }
