appId: ${APP_ID}
name: SEC-04
tags: [security, p0]
---
# >>> dashboard-meta
# SEC-04 — A 6th simultaneous device login revokes the oldest device's refresh token (max 5 enforced)
# Section: Security & Auth Hardening
# Priority: P0
# Repro:
# 1. Sign in on Devices 1-5 with the same account.
# 2. Sign in on Device 6.
# 3. On Device 1, trigger any request.
# 4. Verify Device 1's refresh token is rejected (server revoked it) and the app forces re-login.
# <<< dashboard-meta

# Maestro can't drive 6 devices. The Settings → Notifications devices list
# enforces the 5-device cap server-side and exposes a "Sign in on a 6th
# device" debug action that simulates the kick. We assert the Sessions
# screen rejects the local session and routes back to Welcome.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.settings-link" }
- scrollUntilVisible:
    element: { id: "settings.debug.simulate-6th-device-login-button" }
    direction: DOWN
- tapOn: { id: "settings.debug.simulate-6th-device-login-button" }
- tapOn: { id: "home.tab.home" }
- waitForAnimationToEnd:
    timeout: 8000
- assertVisible: { id: "security.session-expired-dialog.title" }
- tapOn: { id: "security.session-expired-dialog.ok-button" }
- assertVisible: { id: "welcome.title" }
