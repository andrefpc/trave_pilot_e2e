appId: ${APP_ID}
name: ITE-05
tags: [edit, p0]
---
# >>> dashboard-meta
# ITE-05 — A reorder persists after leaving Rearrange and returning to the day
# Section: Itinerary Editing & Rearrange
# Priority: P0
# Repro:
# 1. As premium, reorder stops on Rearrange Day and Save.
# 2. Tap back to Itinerary, then tap the edit icon to reopen Rearrange.
# 3. Verify the new order is preserved (not reset).
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- tapOn: { id: "itinerary.toolbar.rearrange-button" }
- assertVisible: { id: "itinerary-edit.screen" }
- assertVisible: { id: "itinerary-edit.stop.0.title-label" }
- swipe:
    from: { id: "itinerary-edit.stop.0.drag-handle" }
    direction: DOWN
    duration: 1500
- waitForAnimationToEnd:
    timeout: 3000
- tapOn: { id: "itinerary-edit.save-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "itinerary.screen" }
- tapOn: { id: "itinerary.toolbar.rearrange-button" }
- assertVisible: { id: "itinerary-edit.screen" }
- assertVisible: { id: "itinerary-edit.stop.0.title-label" }
