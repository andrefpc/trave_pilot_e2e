appId: ${APP_ID}
name: PH-02
tags: [photos, p0]
---
# >>> dashboard-meta
# PH-02 — Tapping the + on Gallery opens the Android multi-select photo picker
# Section: Photos & Gallery
# Priority: P0
# Repro:
# 1. Open Gallery and tap the + button.
# 2. Verify the system multi-select photo picker (or document picker) opens.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.gallery-link" }
- assertVisible: { id: "photos.gallery" }
- tapOn: { id: "photos.upload-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "photos.system-picker" }
