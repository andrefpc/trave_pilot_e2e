appId: ${APP_ID}
name: ITE-07
tags: [edit, p1, ios-only]
---
# >>> dashboard-meta
# ITE-07 — Adding a custom stop with a manually typed title saves a stop with no place link
# Section: Itinerary Editing & Rearrange
# Priority: P1
# Repro:
# 1. On Rearrange Day → "+ Add Stop", switch to the custom-title option (if available).
# 2. Type a title like "Picnic in the park" and confirm.
# 3. Verify the stop appears with that title and no Google place attached.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- tapOn: { id: "itinerary.toolbar.rearrange-button" }
- tapOn: { id: "itinerary-edit.add-stop-button" }
- assertVisible: { id: "place-search.sheet" }
- tapOn: { id: "place-search.custom-stop-toggle" }
- assertVisible: { id: "place-search.custom-title-field" }
- tapOn: { id: "place-search.custom-title-field" }
- inputText: "Picnic in the park"
- tapOn: { id: "place-search.custom-stop-confirm" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "itinerary-edit.stop.last" }
- assertVisible: { id: "itinerary-edit.stop.last.custom-badge" }
