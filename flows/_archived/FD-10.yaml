appId: ${APP_ID}
name: FD-10
tags: [feed, p1]
---
# >>> dashboard-meta
# FD-10 — Adding a Feed place into an occupied slot triggers a Force-Replace confirmation
# Section: Feed & Recommendations
# Priority: P1
# Repro:
# 1. On Feed, tap "Add to Itinerary" on a Place.
# 2. Pick a slot that already has a stop.
# 3. Verify a "Replace current stop?" confirmation sheet appears with Confirm/Cancel.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.feed" }
- assertVisible: { id: "feed.section.places.card.0" }
- tapOn: { id: "feed.section.places.card.0.add-to-itinerary-button" }
- assertVisible: { id: "feed.free-time-sheet.title" }
- tapOn: { id: "feed.free-time-sheet.slot.occupied" }
- assertVisible: { id: "feed.replace-confirmation-sheet.title" }
- assertVisible: { id: "feed.replace-confirmation-sheet.confirm-button" }
- assertVisible: { id: "feed.replace-confirmation-sheet.cancel-button" }
- tapOn: { id: "feed.replace-confirmation-sheet.cancel-button" }
