appId: ${APP_ID}
name: PH-12
tags: [photos, p1]
---
# >>> dashboard-meta
# PH-12 — Losing network during a photo upload shows a Retry snackbar; reconnecting and retrying succeeds
# Section: Photos & Gallery
# Priority: P1
# Repro:
# 1. On Gallery, start uploading photos.
# 2. Toggle airplane mode mid-upload.
# 3. Verify an error snackbar with Retry appears.
# 4. Disable airplane → tap Retry → upload completes.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.gallery-link" }
- tapOn: { id: "photos.upload-button" }
- waitForAnimationToEnd:
    timeout: 5000
- tapOn: { id: "photos.system-picker.image.0" }
- tapOn: { id: "photos.system-picker.confirm-button" }
- tapOn: { id: "photos.upload-sheet.send-button" }
- assertVisible: { id: "photos.upload.progress" }
- toggleAirplaneMode
- assertVisible: { id: "photos.upload.error-snackbar" }
- assertVisible: { id: "photos.upload.error-snackbar.retry-button" }
- toggleAirplaneMode
- tapOn: { id: "photos.upload.error-snackbar.retry-button" }
- waitForAnimationToEnd:
    timeout: 15000
- assertVisible: { id: "photos.upload.success-snackbar" }
