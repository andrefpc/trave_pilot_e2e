appId: ${APP_ID}
name: NET-13
tags: [network, p2]
---
# >>> dashboard-meta
# NET-13 — A DNS failure shows the same network-error UX as airplane mode
# Section: Network, Offline & Error Handling
# Priority: P2
# Repro:
# 1. Configure mitmproxy or the device DNS to fail name lookups for the API host.
# 2. Trigger any request.
# 3. Verify the same "No internet connection" dialog with Retry appears as for airplane mode.
# <<< dashboard-meta

# Maestro can't manipulate DNS. The closest equivalent is airplane mode,
# which the network layer treats identically — same banner id, same retry id.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.home" }
- assertVisible: { id: "home.plan-header" }
- toggleAirplaneMode
- tapOn: { id: "home.refresh-button" }
- assertVisible: { id: "home.no-internet-banner" }
- assertVisible: { id: "home.no-internet-banner.retry-button" }
- toggleAirplaneMode
