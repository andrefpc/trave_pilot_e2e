appId: ${APP_ID}
name: WZ-D-09
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-D-09 — A destination arrival date earlier than the trip departure shows a validation error
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. From Welcome → Create Plan → Destination, set trip Departure to Jan 15.
# 2. Add a destination and tap its arrival date field.
# 3. Try to pick Jan 10 — verify it is rejected (greyed out or inline error).
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- assertVisible: { id: "wizard.destination.title" }
- tapOn: { id: "wizard.destination.departure-field" }
- tapOn: { id: "wizard.destination.date-picker.ok-button" }
- scrollUntilVisible:
    element: { id: "wizard.destination.add-destination-button" }
    direction: DOWN
- tapOn: { id: "wizard.destination.add-destination-button" }
- assertVisible: { id: "wizard.destination.card.1.arrival-field" }
- tapOn: { id: "wizard.destination.card.1.arrival-field" }
- assertVisible: { id: "wizard.destination.date-picker" }
- assertVisible: { id: "wizard.destination.date-picker.day.past" }
- tapOn: { id: "wizard.destination.date-picker.day.past" }
- assertVisible: { id: "wizard.destination.date-picker" }
- tapOn: { id: "wizard.destination.date-picker.cancel-button" }
