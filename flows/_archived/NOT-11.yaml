appId: ${APP_ID}
name: NOT-11
tags: [notifications, p1]
---
# >>> dashboard-meta
# NOT-11 — Tapping "Mark all as read" calls POST /mark-all-read; all unread notifications become read
# Section: Notifications & Reminders
# Priority: P1
# Repro:
# 1. On the Notifications screen with multiple unread items, tap "Mark all as read".
# 2. Verify a POST /mark-all-read fires; all notifications now render as read.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.notifications" }
- assertVisible: { id: "notifications.list" }
- assertVisible: { id: "notifications.notification.0.unread-indicator" }
- tapOn: { id: "notifications.mark-all-read" }
- waitForAnimationToEnd:
    timeout: 3000
- assertNotVisible: { id: "notifications.notification.0.unread-indicator" }
- assertNotVisible: { id: "notifications.unread-badge" }
