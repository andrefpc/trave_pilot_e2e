appId: ${APP_ID}
name: WZ-D-07
tags: [wizard, p0]
---
# >>> dashboard-meta
# WZ-D-07 — Tapping "+ Add Destination" appends a second city card editable independently of the first
# Section: Plan Creation Wizard
# Priority: P0
# Repro:
# 1. From Welcome → Create Plan → Destination, fill Origin + dates.
# 2. Tap "+ Add Destination".
# 3. Verify a second destination card appears with its own city, arrival/departure date, and transport selector.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- assertVisible: { id: "wizard.destination.title" }
- tapOn: { id: "wizard.destination.origin-field" }
- inputText: "Paris"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn: { id: "wizard.destination.origin-suggestion.0" }
- tapOn: { id: "wizard.destination.departure-field" }
- tapOn: { id: "wizard.destination.date-picker.ok-button" }
- tapOn: { id: "wizard.destination.return-field" }
- tapOn: { id: "wizard.destination.date-picker.ok-button" }
- assertVisible: { id: "wizard.destination.card.0" }
- scrollUntilVisible:
    element: { id: "wizard.destination.add-destination-button" }
    direction: DOWN
- tapOn: { id: "wizard.destination.add-destination-button" }
- assertVisible: { id: "wizard.destination.card.1" }
- assertVisible: { id: "wizard.destination.card.1.city-field" }
- assertVisible: { id: "wizard.destination.card.1.arrival-field" }
- assertVisible: { id: "wizard.destination.card.1.departure-field" }
- assertVisible: { id: "wizard.destination.card.1.transport.flight" }
