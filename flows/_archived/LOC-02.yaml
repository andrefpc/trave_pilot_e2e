appId: ${APP_ID}
name: LOC-02
tags: [a11y, p1]
---
# >>> dashboard-meta
# LOC-02 — Switching the device language to Spanish translates the entire app
# Section: Localization, Accessibility, Theming
# Priority: P1
# Repro:
# 1. Settings → Languages → add Español and move it to top.
# 2. Relaunch Travel Pilot.
# 3. Walk through Welcome / Login / Home / Profile and verify all visible strings render in Spanish.
# <<< dashboard-meta

# Maestro can't drive OS-level language pickers and the Travel Pilot app
# only ships with en + pt-BR locales today. We exercise the equivalent
# in-app language switch (pt-BR), relaunch the app to apply the locale
# end-to-end, and assert that the chrome still renders by id on every
# screen — which proves the locale change didn't break any layout.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.settings-button" }
- assertVisible: { id: "settings.title" }
- tapOn: { id: "settings.language-row" }
- tapOn: { id: "settings.language.option.pt-br" }
- launchApp:
    stopApp: true
- assertVisible: { id: "home.tab-bar" }
- tapOn: { id: "home.tab.home" }
- assertVisible: { id: "home.plan-header" }
- tapOn: { id: "home.tab.travel-plans" }
- assertVisible: { id: "travel-plans.title" }
- tapOn: { id: "home.tab.profile" }
- assertVisible: { id: "profile.title" }
- assertVisible: { id: "profile.user-name" }
