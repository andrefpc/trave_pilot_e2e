appId: ${APP_ID}
name: PLANS-14
tags: [plans, p2, ios-only]
---
# >>> dashboard-meta
# PLANS-14 — On Travel Plans, the status filter (if present) restricts the list to draft / active / completed / archived
# Section: Travel Plans List & Plan Management
# Priority: P2
# Repro:
# 1. On Travel Plans, tap the filter icon.
# 2. Pick "Draft".
# 3. Verify only draft plans are shown.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- assertVisible: { id: "plans.filter-button" }
- tapOn: { id: "plans.filter-button" }
- assertVisible: { id: "plans.filter-sheet" }
- tapOn: { id: "plans.filter-sheet.option.draft" }
- tapOn: { id: "plans.filter-sheet.apply-button" }
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: { id: "plans.filter-chip.draft" }
- assertVisible: { id: "plans.plan-card.0.draft-badge" }
