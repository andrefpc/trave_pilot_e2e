appId: ${APP_ID}
name: WZ-CO-06
tags: [wizard, p1, ios-only]
---
# >>> dashboard-meta
# WZ-CO-06 — Tapping Back on Complete Onboarding returns to Travel Times with the draft intact
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. On Complete Onboarding, tap the back arrow.
# 2. Verify Travel Times reopens with all previously selected time preferences still chosen.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ./_walk_to_travel_times.yaml
- assertVisible: { id: "wizard.travel-times.title" }
- tapOn: { id: "wizard.travel-times.leg.0.option.morning" }
- tapOn: { id: "wizard.travel-times.next-button" }
- assertVisible: { id: "wizard.complete-onboarding.title" }
- assertVisible: { id: "wizard.travel-times.title" }
- assertVisible: { id: "wizard.travel-times.leg.0.option.morning" }
