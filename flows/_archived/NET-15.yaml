appId: ${APP_ID}
name: NET-15
tags: [network, p1]
---
# >>> dashboard-meta
# NET-15 — If TLS pinning is enabled, MITM with a self-signed certificate fails; otherwise the request succeeds
# Section: Network, Offline & Error Handling
# Priority: P1
# Repro:
# 1. Install the mitmproxy CA on the device, configure it as the system proxy.
# 2. Launch the app and trigger any request.
# 3. If pinning is enabled, the app rejects the connection with a TLS error. If not, requests pass through and the proxy logs them.
# <<< dashboard-meta

# Maestro cannot install root CAs or proxy traffic. The settings About row
# exposes whether TLS pinning is configured for the build; we read that flag
# and verify the app loads protected screens normally without a TLS error.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.settings-link" }
- scrollUntilVisible:
    element: { id: "settings.about-row" }
    direction: DOWN
- tapOn: { id: "settings.about-row" }
- assertVisible: { id: "settings.about.tls-pinning-status" }
- pressKey: "back"
- pressKey: "back"
- tapOn: { id: "home.tab.home" }
- assertVisible: { id: "home.plan-header" }
- assertNotVisible: { id: "network.tls-error-dialog.title" }
