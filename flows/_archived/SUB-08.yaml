appId: ${APP_ID}
name: SUB-08
tags: [premium, p0, ios-only]
---
# >>> dashboard-meta
# SUB-08 — Restore Purchases on a fresh install verifies past receipts and restores premium
# Section: Subscription / Premium / Play Billing
# Priority: P0
# Repro:
# 1. Buy premium on Device A.
# 2. Fresh-install the app on Device B with the same Google account, sign in.
# 3. Tap Restore Purchases (Profile or auto on init).
# 4. Verify Play Billing's queryPurchases returns the receipt, POST /subscriptions re-verifies, and Profile shows "You are Premium".
# <<< dashboard-meta

# Maestro can't span two physical devices. We simulate "Device B fresh
# install" by wiping state, then signing in as the seeded premium user
# (whose Play receipt is already on file) and triggering Restore Purchases.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.restore-purchases-button" }
- waitForAnimationToEnd:
    timeout: 10000
- assertVisible: { id: "subscription.restore-success-snackbar" }
- assertVisible: { id: "profile.premium-badge" }
- assertNotVisible: { id: "profile.upgrade-to-premium-button" }
