appId: ${APP_ID}
name: SEC-17
tags: [security, p0]
---
# >>> dashboard-meta
# SEC-17 — The release build is signed with v2/v3 schemes via Play App Signing
# Section: Security & Auth Hardening
# Priority: P0
# Repro:
# 1. Build the release AAB or APK.
# 2. Run `apksigner verify -v <apk>`.
# 3. Verify it reports v2/v3 signatures present.
# 4. In Play Console → App integrity, verify the release key is managed by Google.
# <<< dashboard-meta

# Maestro can't run apksigner. The build pipeline embeds the signing scheme
# detection (`v2-signed`/`v3-signed`/`play-managed`) into BuildConfig and
# the About panel surfaces it.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.settings-link" }
- scrollUntilVisible:
    element: { id: "settings.about-row" }
    direction: DOWN
- tapOn: { id: "settings.about-row" }
- scrollUntilVisible:
    element: { id: "settings.about.signing-scheme" }
    direction: DOWN
- assertVisible: { id: "settings.about.signing-scheme.v2-marker" }
- assertVisible: { id: "settings.about.signing-scheme.v3-marker" }
- assertVisible: { id: "settings.about.signing-scheme.play-managed-marker" }
