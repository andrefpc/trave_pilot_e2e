appId: ${APP_ID}
name: SET-04
tags: [settings, p2]
---
# >>> dashboard-meta
# SET-04 — Default budget chosen on Settings is saved to the server preferences
# Section: Settings & Preferences
# Priority: P2
# Repro:
# 1. On Settings → Default Budget, pick a value.
# 2. Verify a PUT /users/me/preferences fires and Budget pre-fills accordingly on new plans.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.settings-link" }
- scrollUntilVisible:
    element: { id: "settings.default-budget-row" }
    direction: DOWN
- tapOn: { id: "settings.default-budget-row" }
- tapOn: { id: "settings.default-budget.option.medium" }
- assertVisible: { id: "settings.default-budget.medium-marker" }
- pressKey: "back"
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "travel-plans.add-button" }
- assertVisible: { id: "wizard.destination.title" }
- scrollUntilVisible:
    element: { id: "wizard.budget.title" }
    direction: DOWN
- assertVisible: { id: "wizard.budget.card.accommodation.medium.selected-marker" }
- assertVisible: { id: "wizard.budget.card.food.medium.selected-marker" }
