appId: ${APP_ID}
name: PRF-11
tags: [perf, p1]
---
# >>> dashboard-meta
# PRF-11 — PlanGenerationService stops within 30 s of generation completing
# Section: Performance & Stability
# Priority: P1
# Repro:
# 1. Trigger plan generation (foreground notification appears).
# 2. Wait for it to finish on screen.
# 3. Run `adb logcat | grep PlanGenerationService` and verify stopForeground/stopSelf is called within 30 s of completion.
# <<< dashboard-meta

# Maestro can't tail logcat for stopForeground/stopSelf. The closest
# viable proxy is to drive a real plan generation (via Duplicate),
# wait for the completion CTA to appear, and assert the progress UI
# tears down — if the foreground service hangs past completion the
# progress label would still be visible.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- assertVisible: { id: "plans.plan-card.0" }
- longPressOn: { id: "plans.plan-card.0" }
- tapOn: { id: "plans.context-menu.duplicate" }
- assertVisible: { id: "plan-generation.progress" }
- waitForAnimationToEnd:
    timeout: 60000
- assertVisible: { id: "plan-generation.lets-go-button" }
- tapOn: { id: "plan-generation.lets-go-button" }
- waitForAnimationToEnd:
    timeout: 30000
- assertVisible: { id: "home.tab-bar" }
- assertNotVisible: { id: "plan-generation.progress" }
- assertNotVisible: { id: "plan-generation.percent-label" }
