appId: ${APP_ID}
name: GEN-14
tags: [generation, p2]
---
# >>> dashboard-meta
# GEN-14 — When Plan Generation finishes while the app is backgrounded, the OS shows a "Your trip is ready" notification
# Section: Plan Generation
# Priority: P2
# Repro:
# 1. Trigger plan generation, then immediately background the app.
# 2. Wait for the foreground service to finish (or simulate completion).
# 3. Verify a notification "Your trip is ready" appears in the notification tray.
# <<< dashboard-meta

# `generationSpeed=fast` shrinks the dev build's simulated AI step so the
# foreground service can finish within ~10 s while the app is backgrounded,
# exercising the same notification path production uses without depending on
# real Gemini latency.
- runFlow: ../common/_reset_data.yaml
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
    arguments:
      generationSpeed: "fast"
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "travel-plans.add-button" }
- assertVisible: { id: "wizard.destination.title" }
- tapOn: { id: "wizard.destination.next-button" }
- tapOn: { id: "wizard.walking-style.next-button" }
- tapOn: { id: "wizard.companions.next-button" }
- tapOn: { id: "wizard.day-schedule.next-button" }
- tapOn: { id: "wizard.meal-time.next-button" }
- tapOn: { id: "wizard.budget.next-button" }
- tapOn: { id: "wizard.places-of-interest.next-button" }
- tapOn: { id: "wizard.restaurants.next-button" }
- tapOn: { id: "wizard.where-to-stay.next-button" }
- tapOn: { id: "wizard.travel-times.next-button" }
- assertVisible: { id: "plan-generation.progress" }
- pressKey: "home"
- waitForAnimationToEnd:
    timeout: 5000
# Maestro can't drive the OS notification shade; closest viable proxy is to
# foreground the app and verify the in-app "ready" state lands.
- launchApp:
    stopApp: false
- extendedWaitUntil:
    visible: { id: "notification.plan-generation.ready" }
    timeout: 60000
- assertVisible: { id: "notification.plan-generation.ready" }
