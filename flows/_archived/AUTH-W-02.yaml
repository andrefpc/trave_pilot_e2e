appId: ${APP_ID}
name: AUTH-W-02
tags: [auth, p1]
---
# >>> dashboard-meta
# AUTH-W-02 — Tapping "Create Plan" on Welcome opens the trip wizard at the Destination step
# Section: Authentication & Session
# Priority: P1
# Repro:
# 1. Cold-launch the app — Welcome appears.
# 2. Tap "Create Plan".
# 3. Verify the Destination screen appears with the origin field, departure/return date pickers and a "+ Add Destination" control.
# <<< dashboard-meta

- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- assertVisible: { id: "wizard.destination.title" }
- assertVisible: { id: "wizard.destination.origin-field" }
- assertVisible: { id: "wizard.destination.departure-field" }
- assertVisible: { id: "wizard.destination.return-field" }
- assertVisible: { id: "wizard.destination.add-destination-button" }
