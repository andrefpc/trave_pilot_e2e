appId: ${APP_ID}
name: SEC-18
tags: [security, p1]
---
# >>> dashboard-meta
# SEC-18 — If certificate pinning is enabled, MITM with a self-signed cert fails; pinning rejects the connection
# Section: Security & Auth Hardening
# Priority: P1
# Repro:
# 1. Install mitmproxy CA on the device and set the system proxy.
# 2. Launch the app and trigger any HTTPS call.
# 3. If pinning is configured, the app rejects with an SSL handshake error. Otherwise document that pinning is not yet implemented.
# <<< dashboard-meta

# Maestro can't install a MITM CA. The dev/QA build exposes a "simulate
# pinning failure" debug action that triggers the same SSLPeerUnverified
# handler as a real MITM attempt would, so we can assert the user-facing
# error appears (and that the About panel reports pinning status).
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.settings-link" }
- scrollUntilVisible:
    element: { id: "settings.about-row" }
    direction: DOWN
- tapOn: { id: "settings.about-row" }
- scrollUntilVisible:
    element: { id: "settings.about.cert-pinning-status" }
    direction: DOWN
- assertVisible: { id: "settings.about.cert-pinning-status" }
- tapOn: { id: "settings.about.debug.simulate-pinning-failure-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "security.cert-pinning-failure-dialog.title" }
- assertVisible: { id: "security.cert-pinning-failure-dialog.ok-button" }
- tapOn: { id: "security.cert-pinning-failure-dialog.ok-button" }
