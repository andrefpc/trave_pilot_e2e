appId: ${APP_ID}
name: GEN-03
tags: [generation, p2]
---
# >>> dashboard-meta
# GEN-03 — On Plan Generation, tapping a quick link card (Flights, Hotels, Activities) opens the partner site in a browser
# Section: Plan Generation
# Priority: P2
# Repro:
# 1. On Plan Generation, scroll to the quick-links section.
# 2. Tap "Browse Flights".
# 3. Verify a browser/Custom Tab opens to a Google Flights URL pre-filled with destination and dates.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "travel-plans.add-button" }
- assertVisible: { id: "wizard.destination.title" }
- tapOn: { id: "wizard.destination.next-button" }
- tapOn: { id: "wizard.walking-style.next-button" }
- tapOn: { id: "wizard.companions.next-button" }
- tapOn: { id: "wizard.day-schedule.next-button" }
- tapOn: { id: "wizard.meal-time.next-button" }
- tapOn: { id: "wizard.budget.next-button" }
- tapOn: { id: "wizard.places-of-interest.next-button" }
- tapOn: { id: "wizard.restaurants.next-button" }
- tapOn: { id: "wizard.where-to-stay.next-button" }
- tapOn: { id: "wizard.travel-times.next-button" }
- assertVisible: { id: "plan-generation.progress" }
- scrollUntilVisible:
    element: { id: "plan-generation.quick-link.flights" }
    direction: DOWN
- tapOn: { id: "plan-generation.quick-link.flights" }
- assertVisible: { id: "external-browser.url-bar" }
