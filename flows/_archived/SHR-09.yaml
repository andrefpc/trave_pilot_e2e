appId: ${APP_ID}
name: SHR-09
tags: [sharing, p0]
---
# >>> dashboard-meta
# SHR-09 — Tapping a share link while signed out opens Share Invite, prompts login, then resumes Share Invite
# Section: Plan Sharing & Deep Links
# Priority: P0
# Repro:
# 1. Sign out, then tap a https://www.travelpilotapp.com/share/<token> link.
# 2. On Share Invite, tap Login → sign in.
# 3. Verify the app returns to Share Invite (not Home) with the same token.
# <<< dashboard-meta

# Cold-launch with state wiped (signed-out), then deep link straight in.
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- openLink: "https://www.travelpilotapp.com/share/${TEST_SHARE_TOKEN}"
- assertVisible: { id: "share-invite.title" }
- tapOn: { id: "share-invite.login-button" }
- assertVisible: { id: "auth-sheet.title" }
- tapOn: { id: "auth-sheet.signin-with-password" }
- assertVisible: { id: "login.title" }
- tapOn: { id: "login.email-field" }
- inputText: ${TEST_EMAIL}
- tapOn: { id: "login.password-field" }
- inputText: ${TEST_PASSWORD}
- hideKeyboard
- tapOn: { id: "login.submit-button" }
- assertVisible: { id: "share-invite.title" }
- assertVisible: { id: "share-invite.plan-preview" }
- assertNotVisible: { id: "home.tab-bar" }
