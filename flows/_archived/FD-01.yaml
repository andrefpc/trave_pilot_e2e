appId: ${APP_ID}
name: FD-01
tags: [feed, p1]
---
# >>> dashboard-meta
# FD-01 — Feed loads with four sections: Places, Restaurants, Hotels, General recommendations
# Section: Feed & Recommendations
# Priority: P1
# Repro:
# 1. Sign in and tap the Feed tab.
# 2. Scroll the screen.
# 3. Verify four sections labelled Places, Restaurants, Hotels, and Recommendations (or General) are each populated with cards.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.feed" }
- assertVisible: { id: "feed.list" }
- assertVisible: { id: "feed.section.places" }
- assertVisible: { id: "feed.section.places.card.0" }
- scrollUntilVisible:
    element: { id: "feed.section.restaurants" }
    direction: DOWN
- assertVisible: { id: "feed.section.restaurants.card.0" }
- scrollUntilVisible:
    element: { id: "feed.section.hotels" }
    direction: DOWN
- assertVisible: { id: "feed.section.hotels.card.0" }
- scrollUntilVisible:
    element: { id: "feed.section.recommendations" }
    direction: DOWN
- assertVisible: { id: "feed.section.recommendations.card.0" }
