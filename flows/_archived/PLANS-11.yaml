appId: ${APP_ID}
name: PLANS-11
tags: [plans, p1, ios-only]
---
# >>> dashboard-meta
# PLANS-11 — Denying Calendar permission shows an error snackbar and does not crash
# Section: Travel Plans List & Plan Management
# Priority: P1
# Repro:
# 1. Long-press a plan → Export to Calendar.
# 2. Tap Deny on the permission dialog.
# 3. Verify a snackbar like "Calendar permission required" appears and the app stays on Travel Plans.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- assertVisible: { id: "plans.plan-card.0" }
- longPressOn: { id: "plans.plan-card.0" }
- tapOn:
    id: "com.android.permissioncontroller:id/permission_deny_button"
- assertVisible: { id: "plans.list" }
