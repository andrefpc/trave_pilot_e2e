appId: ${APP_ID}
name: ITE-03
tags: [edit, p0]
---
# >>> dashboard-meta
# ITE-03 — Long-pressing a stop's drag handle and dragging reorders the stop visually; the new order is applied on release
# Section: Itinerary Editing & Rearrange
# Priority: P0
# Repro:
# 1. As premium, open Rearrange Day.
# 2. Long-press a stop card by its drag handle and drag it up or down.
# 3. Release — verify the stop snaps into its new position.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- tapOn: { id: "itinerary.toolbar.rearrange-button" }
- assertVisible: { id: "itinerary-edit.screen" }
- assertVisible: { id: "itinerary-edit.stop.0" }
- assertVisible: { id: "itinerary-edit.stop.1" }
- swipe:
    from: { id: "itinerary-edit.stop.0.drag-handle" }
    direction: DOWN
    duration: 1500
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: { id: "itinerary-edit.stop.0" }
- assertVisible: { id: "itinerary-edit.unsaved-indicator" }
