appId: ${APP_ID}
name: PRF-07
tags: [perf, p0]
---
# >>> dashboard-meta
# PRF-07 — Active use for 30 minutes produces no ANR (Application Not Responding)
# Section: Performance & Stability
# Priority: P0
# Repro:
# 1. Run `adb logcat | grep -E "ANR|not responding" > /tmp/anr.log &`.
# 2. Use the app actively for 30 minutes — navigate Home, Itinerary, Plans, Profile, scroll, refresh.
# 3. Verify /tmp/anr.log is empty at the end.
# <<< dashboard-meta

# Maestro can't tail logcat for ANR markers and a 30-minute soak isn't
# practical in CI. The closest viable proxy is to drive a tight rotation
# of the main tabs and Itinerary repeatedly — if any path triggers an
# ANR, Maestro's next assertion times out and the flow fails.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- repeat:
    times: 6
    commands:
      - tapOn: { id: "home.tab.home" }
      - assertVisible: { id: "home.plan-header" }
      - tapOn: { id: "home.day-card.0" }
      - assertVisible: { id: "itinerary-day.title" }
      - pressKey: "back"
      - tapOn: { id: "home.tab.travel-plans" }
      - assertVisible: { id: "travel-plans.title" }
      - tapOn: { id: "home.tab.profile" }
      - assertVisible: { id: "profile.title" }
- assertVisible: { id: "home.tab-bar" }
