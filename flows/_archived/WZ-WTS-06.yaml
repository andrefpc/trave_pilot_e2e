# Archived 2026-05-06 — references obsolete `where-to-stay.city-section.*` ids; the screen was
# redesigned around `recommended-place-card` / `other-place-card` / `city-chip`.
appId: ${APP_ID}
name: WZ-WTS-06
tags: [wizard, p1, ios-only, archived]
---
# >>> dashboard-meta
# WZ-WTS-06 — Tapping Next on Where to Stay without picking a hotel for each city shows "must select hotel for each city"
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. With 2 destination cities, on Where to Stay select a hotel only for the first city.
# 2. Tap Next — verify an error like "Please select a place to stay near {city}" appears for the unselected city.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- runFlow: ./_walk_to_wts.yaml
- assertVisible: { id: "wizard.where-to-stay.title" }
- tapOn: { id: "wizard.where-to-stay.city-section.0.hotel-card.0" }
- scrollUntilVisible:
    element: { id: "wizard.where-to-stay.next-button" }
    direction: DOWN
- tapOn: { id: "wizard.where-to-stay.next-button" }
- assertVisible: { id: "wizard.where-to-stay.city-section.1.error" }
- assertVisible: { id: "wizard.where-to-stay.title" }
