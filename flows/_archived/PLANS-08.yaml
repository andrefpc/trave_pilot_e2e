appId: ${APP_ID}
name: PLANS-08
tags: [plans, p0, ios-only]
---
# >>> dashboard-meta
# PLANS-08 — Free user with one plan tapping Duplicate hits 403 → Premium paywall
# Section: Travel Plans List & Plan Management
# Priority: P0
# Repro:
# 1. Sign in as a free user with exactly one plan.
# 2. Long-press the plan and tap Duplicate.
# 3. Verify the request returns 403 and the Premium bottom sheet appears.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- assertVisible: { id: "plans.plan-card.0" }
- longPressOn: { id: "plans.plan-card.0" }
- assertVisible: { id: "premium.bottom-sheet" }
- assertVisible: { id: "premium.bottom-sheet.title" }
- assertVisible: { id: "premium.bottom-sheet.cta" }
