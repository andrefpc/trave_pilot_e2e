appId: ${APP_ID}
name: ITE-12
tags: [edit, p0, ios-only]
---
# >>> dashboard-meta
# ITE-12 — Tapping "Find a good Restaurant" on a meal stop opens search; picking one swaps the meal
# Section: Itinerary Editing & Rearrange
# Priority: P0
# Repro:
# 1. Open a day on Itinerary, tap a meal stop (Lunch / Dinner / Breakfast).
# 2. In Place Detail, tap "Find a good Restaurant".
# 3. Search and select a restaurant — verify a POST replace-meal fires and the meal slot now shows the new restaurant.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- assertVisible: { id: "itinerary.screen" }
- tapOn: { id: "itinerary-day.meal-stop.lunch" }
- assertVisible: { id: "place-detail.sheet" }
- tapOn: { id: "place-detail.find-restaurant-button" }
- assertVisible: { id: "place-search.sheet" }
- tapOn: { id: "place-search.input" }
- inputText: "trattoria"
- waitForAnimationToEnd:
    timeout: 3000
- tapOn: { id: "place-search.result.0" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "itinerary-edit.snackbar.replaced" }
- assertVisible: { id: "itinerary-day.meal-stop.lunch" }
