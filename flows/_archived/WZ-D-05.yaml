appId: ${APP_ID}
name: WZ-D-05
tags: [wizard, p1]
---
# >>> dashboard-meta
# WZ-D-05 — On Departure date picker, dates earlier than today are disabled and cannot be selected
# Section: Plan Creation Wizard
# Priority: P1
# Repro:
# 1. From Welcome → Create Plan → Destination → tap Departure.
# 2. In the picker, try to tap yesterday or any past date.
# 3. Verify those days are greyed out and tapping them does nothing.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- assertVisible: { id: "welcome.title" }
- tapOn: { id: "welcome.create-plan-button" }
- assertVisible: { id: "wizard.destination.title" }
- tapOn: { id: "wizard.destination.departure-field" }
- assertVisible: { id: "wizard.destination.date-picker" }
- assertVisible: { id: "wizard.destination.date-picker.day.past" }
- tapOn: { id: "wizard.destination.date-picker.day.past" }
- assertVisible: { id: "wizard.destination.date-picker" }
- tapOn: { id: "wizard.destination.date-picker.cancel-button" }
- assertNotVisible: { id: "wizard.destination.date-picker" }
