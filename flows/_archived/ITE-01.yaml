appId: ${APP_ID}
name: ITE-01
tags: [edit, p0]
---
# >>> dashboard-meta
# ITE-01 — A free user tapping the Rearrange icon opens the Premium bottom sheet, not Rearrange
# Section: Itinerary Editing & Rearrange
# Priority: P0
# Repro:
# 1. Sign in as a free user, open any plan day.
# 2. Tap the dashboard-edit icon in the toolbar.
# 3. Verify the Premium bottom sheet slides up; the Rearrange screen does not open.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- assertVisible: { id: "itinerary.screen" }
- tapOn: { id: "itinerary.toolbar.rearrange-button" }
- assertVisible: { id: "premium.bottom-sheet" }
- assertVisible: { id: "premium.bottom-sheet.cta" }
- assertNotVisible: { id: "itinerary-edit.screen" }
