appId: ${APP_ID}
name: PRF-06
tags: [perf, p1]
---
# >>> dashboard-meta
# PRF-06 — Rotating the device 20 times on Itinerary does not leak memory (heap stable)
# Section: Performance & Stability
# Priority: P1
# Repro:
# 1. Open Itinerary on a day with many stops.
# 2. Rotate the device (or send rotation events) 20 times in a row, forcing GC after each.
# 3. Verify the heap returns to roughly the same level after each rotation; no leaked Activities (use LeakCanary).
# <<< dashboard-meta

# Maestro can't drive device rotation or read LeakCanary output. The
# closest viable proxy is to background/foreground the app many times
# (each transition triggers similar lifecycle/teardown paths to a
# rotation) and assert Itinerary still renders its key stops — a leaked
# Activity would either crash on OOM or fail to re-bind its state.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.home" }
- tapOn: { id: "home.day-card.0" }
- assertVisible: { id: "itinerary-day.title" }
- assertVisible: { id: "itinerary-day.stop.0" }
- repeat:
    times: 10
    commands:
      - pressKey: "home"
      - launchApp:
          stopApp: false
      - assertVisible: { id: "itinerary-day.title" }
- assertVisible: { id: "itinerary-day.stop.0" }
- assertVisible: { id: "itinerary-day.wakeup-stop" }
