appId: ${APP_ID}
name: SHR-18
tags: [sharing, p1]
---
# >>> dashboard-meta
# SHR-18 — Backgrounding the app mid-share-flow keeps the pending token; reopening returns to Share Invite
# Section: Plan Sharing & Deep Links
# Priority: P1
# Repro:
# 1. Tap a share link → Share Invite appears.
# 2. Press Home to background the app.
# 3. Reopen the app — verify Share Invite is restored with the same token.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_EMAIL}
      TEST_PASSWORD: ${TEST_PASSWORD}
- openLink: "https://www.travelpilotapp.com/share/${TEST_SHARE_TOKEN}"
- assertVisible: { id: "share-invite.title" }
- assertVisible: { id: "share-invite.plan-preview" }
- pressKey: "home"
- launchApp:
    stopApp: false
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "share-invite.title" }
- assertVisible: { id: "share-invite.plan-preview" }
