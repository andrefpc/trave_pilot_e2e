appId: ${APP_ID}
name: ITE-17
tags: [edit, p2]
---
# >>> dashboard-meta
# ITE-17 — When replacing a stop, a preview appears with Confirm/Cancel before the change is committed
# Section: Itinerary Editing & Rearrange
# Priority: P2
# Repro:
# 1. As premium, on Edit Stop tap "Replace with another Stop" and pick a new place.
# 2. Verify a preview sheet shows the new place's photo, name, hours and Confirm/Cancel buttons.
# 3. Tap Cancel — original stop is unchanged.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- tapOn: { id: "itinerary.toolbar.rearrange-button" }
- assertVisible: { id: "itinerary-edit.stop.0.title-label" }
- tapOn: { id: "itinerary-edit.stop.0.edit-button" }
- tapOn: { id: "itinerary-edit.edit-stop-sheet.replace-button" }
- assertVisible: { id: "place-search.sheet" }
- tapOn: { id: "place-search.input" }
- inputText: "museum"
- waitForAnimationToEnd:
    timeout: 3000
- tapOn: { id: "place-search.result.0" }
- assertVisible: { id: "itinerary-edit.replace-preview-sheet" }
- assertVisible: { id: "itinerary-edit.replace-preview-sheet.photo" }
- assertVisible: { id: "itinerary-edit.replace-preview-sheet.name" }
- assertVisible: { id: "itinerary-edit.replace-preview-sheet.hours" }
- assertVisible: { id: "itinerary-edit.replace-preview-sheet.confirm-button" }
- tapOn: { id: "itinerary-edit.replace-preview-sheet.cancel-button" }
- assertNotVisible: { id: "itinerary-edit.replace-preview-sheet" }
- assertVisible: { id: "itinerary-edit.stop.0.title-label" }
