appId: ${APP_ID}
name: NOT-08
tags: [notifications, p1]
---
# >>> dashboard-meta
# NOT-08 — A test FCM push from the backend appears as a notification on the device
# Section: Notifications & Reminders
# Priority: P1
# Repro:
# 1. Sign in to register the device (NOT-07).
# 2. From the backend / Firebase console, send a test push targeting this device's token.
# 3. Verify a notification with the test title and body appears in the tray.
# <<< dashboard-meta

# Maestro can't peek at the system tray. We use the in-app "Send test push"
# debug action and verify the resulting in-app notification entry appears.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.settings-link" }
- tapOn: { id: "settings.notifications-row" }
- tapOn: { id: "settings.notifications.send-test-push-button" }
- assertVisible: { id: "settings.notifications.test-push-sent-toast" }
- tapOn: { id: "home.tab.notifications" }
- assertVisible: { id: "notifications.list" }
- assertVisible: { id: "notifications.notification.test-push.0" }
