appId: ${APP_ID}
name: FD-05
tags: [feed, p0]
---
# >>> dashboard-meta
# FD-05 — Tapping "Add to Itinerary" on a Place card → choosing a free-time slot adds it to the day
# Section: Feed & Recommendations
# Priority: P0
# Repro:
# 1. On Feed, on a Place card tap "Add to Itinerary".
# 2. In the Free Time selection sheet, pick a slot.
# 3. Verify the place replaces that free-time slot and a snackbar appears.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.feed" }
- assertVisible: { id: "feed.section.places.card.0" }
- tapOn: { id: "feed.section.places.card.0.add-to-itinerary-button" }
- assertVisible: { id: "feed.free-time-sheet.title" }
- tapOn: { id: "feed.free-time-sheet.slot.0" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "feed.add-to-itinerary.success-snackbar" }
