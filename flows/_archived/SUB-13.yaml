appId: ${APP_ID}
name: SUB-13
tags: [premium, p1]
---
# >>> dashboard-meta
# SUB-13 — In dark mode, the Premium sheet buttons and prices remain readable with adequate contrast
# Section: Subscription / Premium / Play Billing
# Priority: P1
# Repro:
# 1. Enable system dark theme.
# 2. Open the Premium bottom sheet.
# 3. Verify all text, prices, and buttons are visible against the dark background.
# <<< dashboard-meta

# Maestro can't drive the system Quick Settings shade directly. Instead,
# flip the in-app Theme override (same theme.dark-marker hooks) before
# opening the Premium sheet.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.settings-button" }
- tapOn: { id: "settings.theme-row" }
- tapOn: { id: "settings.theme.option.dark" }
- pressKey: "back"
- assertVisible: { id: "profile.theme.dark-marker" }
- tapOn: { id: "profile.unlock-premium-button" }
- assertVisible: { id: "premium.bottom-sheet.title" }
- assertVisible: { id: "premium.bottom-sheet.theme.dark-marker" }
- assertVisible: { id: "subscription.plan.monthly" }
- assertVisible: { id: "subscription.plan.monthly.price-label" }
- assertVisible: { id: "subscription.plan.annual" }
- assertVisible: { id: "subscription.plan.annual.price-label" }
- assertVisible: { id: "subscription.purchase-button" }
