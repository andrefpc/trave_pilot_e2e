appId: ${APP_ID}
name: SEC-03
tags: [security, p0]
---
# >>> dashboard-meta
# SEC-03 — Backup rules exclude credentials from device backups (allowBackup / dataExtractionRules configured)
# Section: Security & Auth Hardening
# Priority: P0
# Repro:
# 1. Inspect AndroidManifest.xml: android:allowBackup, android:dataExtractionRules.
# 2. Open data_extraction_rules.xml and backup_rules.xml.
# 3. Verify the auth_tokens DataStore is explicitly excluded from cloud and device-to-device backups.
# <<< dashboard-meta

# Maestro can't read manifest XML. The About screen surfaces a derived
# "backup-credentials-excluded" flag from the build's data_extraction_rules,
# so we assert that flag is true.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.settings-link" }
- scrollUntilVisible:
    element: { id: "settings.about-row" }
    direction: DOWN
- tapOn: { id: "settings.about-row" }
- assertVisible: { id: "settings.about.backup-credentials-excluded" }
- assertVisible:
    id: "settings.about.backup-credentials-excluded"
    text: "true"
