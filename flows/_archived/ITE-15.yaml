appId: ${APP_ID}
name: ITE-15
tags: [edit, p1]
---
# >>> dashboard-meta
# ITE-15 — If premium expires while editing, the next save returns 403 → paywall opens but local edits are not lost
# Section: Itinerary Editing & Rearrange
# Priority: P1
# Repro:
# 1. As premium, open Rearrange Day or Edit Stop and make changes.
# 2. Force-expire premium (admin action) before tapping Save.
# 3. Tap Save — verify 403, the Premium bottom sheet opens, and the unsaved local changes remain on screen.
# <<< dashboard-meta

# Uses the test-only "Force Expire Premium" devtools toggle to flip the cached
# subscription state to expired without touching billing.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- tapOn: { id: "itinerary.toolbar.rearrange-button" }
- assertVisible: { id: "itinerary-edit.screen" }
- swipe:
    from: { id: "itinerary-edit.stop.0.drag-handle" }
    direction: DOWN
    duration: 1500
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: { id: "itinerary-edit.unsaved-indicator" }
- tapOn: { id: "itinerary-edit.save-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "premium.bottom-sheet" }
- tapOn: { id: "premium.bottom-sheet.close-button" }
- assertVisible: { id: "itinerary-edit.screen" }
- assertVisible: { id: "itinerary-edit.unsaved-indicator" }
