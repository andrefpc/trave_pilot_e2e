appId: ${APP_ID}
name: SUB-10
tags: [premium, p0]
---
# >>> dashboard-meta
# SUB-10 — When the subscription expires, premium-only features show the Premium bottom sheet again
# Section: Subscription / Premium / Play Billing
# Priority: P0
# Repro:
# 1. As a premium user past the expiry date (or with sandbox expiry forced).
# 2. After GET /subscriptions/me returns premium=false, attempt a premium feature.
# 3. Verify the action is blocked with the Premium bottom sheet.
# <<< dashboard-meta

# Drives sandbox expiry via the devtools "Force Expire Premium" toggle and
# then attempts the Rearrange premium feature to assert the gate.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: { id: "profile.upgrade-to-premium-button" }
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- tapOn: { id: "itinerary.toolbar.rearrange-button" }
- assertVisible: { id: "premium.bottom-sheet" }
- assertVisible: { id: "premium.bottom-sheet.cta" }
