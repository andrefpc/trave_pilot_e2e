appId: ${APP_ID}
name: SEC-10
tags: [security, p0]
---
# >>> dashboard-meta
# SEC-10 — Only the entry-point Activity and the share-receive intents are exported; everything else is internal
# Section: Security & Auth Hardening
# Priority: P0
# Repro:
# 1. Open AndroidManifest.xml.
# 2. Verify android:exported="true" only on MainActivity and on activities/components that receive ACTION_VIEW for share links and ACTION_SEND/SEND_MULTIPLE for ticket sharing.
# 3. Verify all other components have android:exported="false".
# <<< dashboard-meta

# Maestro can't read AndroidManifest.xml. Settings → About surfaces a
# build-time-derived "exported-components" snapshot. We assert it lists
# only the documented public components.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.settings-link" }
- scrollUntilVisible:
    element: { id: "settings.about-row" }
    direction: DOWN
- tapOn: { id: "settings.about-row" }
- scrollUntilVisible:
    element: { id: "settings.about.exported-components" }
    direction: DOWN
- assertVisible: { id: "settings.about.exported-components.MainActivity" }
- assertVisible: { id: "settings.about.exported-components.ShareReceiverActivity" }
- assertVisible: { id: "settings.about.exported-components.unexpected.empty-marker" }
