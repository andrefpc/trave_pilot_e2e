appId: ${APP_ID}
name: SUB-07
tags: [premium, p1, ios-only]
---
# >>> dashboard-meta
# SUB-07 — Subscribing while already premium returns 409 and shows "Already subscribed"
# Section: Subscription / Premium / Play Billing
# Priority: P1
# Repro:
# 1. As a premium user, open the Premium sheet and try to subscribe again.
# 2. Verify the server returns 409 and the UI shows "Already subscribed" rather than charging again.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.manage-subscription-button" }
- tapOn: { id: "subscription.subscribe-again-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "subscription.already-subscribed-dialog.title" }
- tapOn: { id: "subscription.already-subscribed-dialog.dismiss-button" }
