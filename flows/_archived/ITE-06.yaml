appId: ${APP_ID}
name: ITE-06
tags: [edit, p0]
---
# >>> dashboard-meta
# ITE-06 — On Rearrange, tapping "Add Stop" opens the search sheet; selecting a place adds it to the day
# Section: Itinerary Editing & Rearrange
# Priority: P0
# Repro:
# 1. As premium, on Rearrange Day tap the "+ Add Stop" button.
# 2. In the search sheet, type a place name and pick a result.
# 3. Verify a POST /itinerary/:day_id/items fires and the new stop appears in the list.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- tapOn: { id: "itinerary.toolbar.rearrange-button" }
- assertVisible: { id: "itinerary-edit.screen" }
- tapOn: { id: "itinerary-edit.add-stop-button" }
- assertVisible: { id: "place-search.sheet" }
- tapOn: { id: "place-search.input" }
- inputText: "museum"
- waitForAnimationToEnd:
    timeout: 3000
- tapOn: { id: "place-search.result.0" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "itinerary-edit.snackbar.added" }
- assertVisible: { id: "itinerary-edit.stop.last" }
