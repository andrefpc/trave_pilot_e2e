appId: ${APP_ID}
name: THM-01
tags: [a11y, p1]
---
# >>> dashboard-meta
# THM-01 — Light mode renders every screen with light backgrounds and dark, readable text
# Section: Localization, Accessibility, Theming
# Priority: P1
# Repro:
# 1. Disable system dark theme (`adb shell cmd uimode night no`).
# 2. Walk Welcome, Home, Itinerary, Feed, Profile.
# 3. Verify backgrounds are light and text is dark; no swapped colours or unreadable elements.
# <<< dashboard-meta

# Maestro can't drive `adb shell cmd uimode`. We use the in-app Theme
# override (Light) and rely on the per-screen `theme.light-marker` ids
# that the mobile teams render only when the resolved theme is light.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.settings-button" }
- tapOn: { id: "settings.theme-row" }
- tapOn: { id: "settings.theme.option.light" }
- launchApp:
    stopApp: true
- assertVisible: { id: "home.tab-bar" }
- tapOn: { id: "home.tab.home" }
- assertVisible: { id: "home.theme.light-marker" }
- tapOn: { id: "home.day-card.0" }
- assertVisible: { id: "itinerary-day.theme.light-marker" }
- pressKey: "back"
- tapOn: { id: "home.tab.travel-plans" }
- assertVisible: { id: "travel-plans.theme.light-marker" }
- tapOn: { id: "home.tab.profile" }
- assertVisible: { id: "profile.theme.light-marker" }
- tapOn: { id: "profile.settings-button" }
- assertVisible: { id: "settings.theme.light-marker" }
