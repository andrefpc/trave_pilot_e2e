appId: ${APP_ID}
name: PH-11
tags: [photos, p1]
---
# >>> dashboard-meta
# PH-11 — On Android 13+, the photo picker opens directly with no permission prompt
# Section: Photos & Gallery
# Priority: P1
# Repro:
# 1. On Android 13+, open Gallery → tap +.
# 2. Verify the new system Photo Picker opens immediately, no permission dialog.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.gallery-link" }
- tapOn: { id: "photos.upload-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "photos.system-picker" }
- assertNotVisible: { id: "photos.permission-dialog" }
