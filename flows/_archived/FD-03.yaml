appId: ${APP_ID}
name: FD-03
tags: [feed, p2]
---
# >>> dashboard-meta
# FD-03 — When ad loading fails, the Feed section is empty / skipped without crashing
# Section: Feed & Recommendations
# Priority: P2
# Repro:
# 1. With ad loading disabled or blocked, open Feed.
# 2. Verify cards still render; the "Ad" rows are absent or empty; no crash.
# <<< dashboard-meta

# Simulate ad-blocking by toggling airplane mode for the AdMob fetch.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- toggleAirplaneMode
- tapOn: { id: "home.tab.feed" }
- toggleAirplaneMode
- waitForAnimationToEnd:
    timeout: 8000
- assertVisible: { id: "feed.list" }
- assertVisible: { id: "feed.recommendation-card.0" }
- assertNotVisible: { id: "feed.ad-card.0" }
