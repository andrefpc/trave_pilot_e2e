appId: ${APP_ID}
name: PRF-13
tags: [perf, p2]
---
# >>> dashboard-meta
# PRF-13 — Hilt DI graph builds in <200 ms during cold start; no DI-related delay
# Section: Performance & Stability
# Priority: P2
# Repro:
# 1. Capture an Android Studio CPU trace during cold start.
# 2. Search for Hilt_MainActivity / DaggerApplicationComponent frames.
# 3. Verify total DI construction is under ~200 ms.
# <<< dashboard-meta

# Maestro can't capture CPU traces. The closest viable proxy is a cold
# launch where we assert the home tab bar appears — if Hilt graph
# construction blocked the main thread for too long, the app would
# Stuck on splash beyond Maestro's default visibility timeout.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- launchApp:
    stopApp: true
- assertVisible: { id: "splash.compass-logo" }
- assertVisible: { id: "home.tab-bar" }
- assertVisible: { id: "home.plan-header" }
