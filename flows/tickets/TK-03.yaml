appId: ${APP_ID}
name: TK-03
tags: [tickets, p0]
---
# >>> dashboard-meta
# TK-03 — Picking a PDF and tapping "Upload ticket" sends POST /tickets and the ticket appears in the list
# Section: Tickets
# Priority: P0
# Repro:
# 1. On Tickets, tap + → pick a PDF.
# 2. In the "Did you buy the ticket?" sheet, tap "Upload ticket".
# 3. Verify a POST /tickets request fires with the file and a success snackbar appears.
# 4. The new ticket card is now visible in the list.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.tickets" }
- tapOn: { id: "tickets.add-button" }
- waitForAnimationToEnd:
    timeout: 5000
- tapOn: { id: "tickets.document-picker.file.pdf" }
- assertVisible: { id: "tickets.upload-sheet.title" }
- tapOn: { id: "tickets.upload-sheet.upload-button" }
- assertVisible: { id: "tickets.upload.progress" }
- waitForAnimationToEnd:
    timeout: 15000
- assertVisible: { id: "tickets.upload.success-snackbar" }
- assertVisible: { id: "tickets.ticket-card.0" }
