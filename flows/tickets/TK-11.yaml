appId: ${APP_ID}
name: TK-11
tags: [tickets, p1]
---
# >>> dashboard-meta
# TK-11 — FileProvider authority and exposed paths in the manifest are scoped to app cache and files only
# Section: Tickets
# Priority: P1
# Repro:
# 1. Open AndroidManifest.xml.
# 2. Verify the FileProvider authority is "${applicationId}.fileprovider" and grantUriPermissions is true.
# 3. Open res/xml/file_paths.xml and verify only files-path / cache-path entries (no root path).
# <<< dashboard-meta

# Static-analysis case — Maestro cannot read the APK manifest directly. We
# exercise the FileProvider end-to-end by sharing a ticket: if the authority
# and file_paths were misconfigured the share intent would crash (no content
# URI grant) instead of opening the system chooser.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.tickets" }
- tapOn: { id: "tickets.ticket-card.0" }
- assertVisible: { id: "tickets.viewer" }
- tapOn: { id: "tickets.viewer.share-button" }
- waitForAnimationToEnd:
    timeout: 5000
