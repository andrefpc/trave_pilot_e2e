appId: ${APP_ID}
name: TK-09
tags: [tickets, p1]
---
# >>> dashboard-meta
# TK-09 — Sharing 3 images via SEND_MULTIPLE shows them all in the upload sheet; saving uploads each
# Section: Tickets
# Priority: P1
# Repro:
# 1. In Photos, pick 3 images and Share → Travel Pilot (multi-select).
# 2. Verify all 3 images are listed in the upload sheet.
# 3. Tap Save to trip — verify 3 tickets appear in the Tickets list.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- openLink: ${SHARE_INTENT_MULTI_URL}
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "tickets.upload-sheet.title" }
- tapOn: { id: "tickets.upload-sheet.save-button" }
- waitForAnimationToEnd:
    timeout: 20000
- tapOn: { id: "home.tab.tickets" }
- assertVisible: { id: "tickets.ticket-card.0" }
- assertVisible: { id: "tickets.ticket-card.1" }
- assertVisible: { id: "tickets.ticket-card.2" }
