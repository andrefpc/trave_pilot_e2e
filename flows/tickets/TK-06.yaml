appId: ${APP_ID}
name: TK-06
tags: [tickets, p1]
---
# >>> dashboard-meta
# TK-06 — Tapping Share on a ticket invokes the system share chooser via FileProvider
# Section: Tickets
# Priority: P1
# Repro:
# 1. Open a ticket full-screen and tap Share.
# 2. Verify the system share sheet appears with the ticket file attached via FileProvider.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.tickets" }
- tapOn: { id: "tickets.ticket-card.0" }
- assertVisible: { id: "tickets.viewer" }
- tapOn: { id: "tickets.viewer.share-button" }
- waitForAnimationToEnd:
    timeout: 5000
