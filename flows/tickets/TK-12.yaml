appId: ${APP_ID}
name: TK-12
tags: [tickets, p2]
---
# >>> dashboard-meta
# TK-12 — A user with no tickets sees an empty state with an "Add Ticket" button
# Section: Tickets
# Priority: P2
# Repro:
# 1. Sign in as a user with no tickets uploaded.
# 2. Open Tickets.
# 3. Verify "No places requiring tickets" with an "Add Ticket" button is shown.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      # The platform free-user has a seeded plan whose attractions
      # are tagged `requires_ticket=true`, so the tickets tab shows
      # those place cards instead of the empty state. Use the
      # un-seeded `e2e+freeuser@` so the empty state genuinely
      # renders.
      TEST_EMAIL: "e2e+freeuser@travelpilotapp.com"
      TEST_PASSWORD: "E2eFreeUser!1"
- tapOn: { id: "home.tab.tickets" }
- assertVisible: { id: "tickets.empty-state" }
- assertVisible: { id: "tickets.empty-state.title" }
- assertVisible: { id: "tickets.empty-state.add-button" }
