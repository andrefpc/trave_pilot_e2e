appId: ${APP_ID}
name: TK-08
tags: [tickets, p0]
---
# >>> dashboard-meta
# TK-08 — Sharing an image from another app to Travel Pilot opens the upload sheet ready to save
# Section: Tickets
# Priority: P0
# Repro:
# 1. Open the system Photos app, pick an image, tap Share → Travel Pilot.
# 2. Verify Travel Pilot opens with the upload sheet showing the image preview.
# 3. Tapping "Save to trip" creates the ticket.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- openLink: ${SHARE_INTENT_IMAGE_URL}
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "tickets.upload-sheet.title" }
- tapOn: { id: "tickets.upload-sheet.save-button" }
- waitForAnimationToEnd:
    timeout: 15000
- assertVisible: { id: "tickets.ticket-card.0" }
