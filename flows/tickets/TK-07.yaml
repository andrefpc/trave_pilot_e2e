appId: ${APP_ID}
name: TK-07
tags: [tickets, p0]
---
# >>> dashboard-meta
# TK-07 — Tapping Delete on a ticket → Confirm sends DELETE /tickets/:id and removes the ticket
# Section: Tickets
# Priority: P0
# Repro:
# 1. Open a ticket full-screen and tap Delete.
# 2. Confirm in the dialog.
# 3. Verify a DELETE /tickets/:id fires; the ticket disappears and a "Ticket deleted" snackbar appears.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.tickets" }
- tapOn: { id: "tickets.ticket-card.0" }
- assertVisible: { id: "tickets.viewer" }
- tapOn: { id: "tickets.viewer.delete-button" }
- assertVisible: { id: "tickets.delete-dialog.title" }
- tapOn: { id: "tickets.delete-dialog.confirm-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "tickets.delete.success-snackbar" }
- assertVisible: { id: "tickets.tab-content" }
