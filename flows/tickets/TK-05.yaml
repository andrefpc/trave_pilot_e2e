appId: ${APP_ID}
name: TK-05
tags: [tickets, p0, needs-implementation]
---
# >>> dashboard-meta
# TK-05 — Tapping a ticket card opens the full-screen viewer with PDF/image rendering and toolbar
# Section: Tickets
# Priority: P0
# Repro:
# 1. On Tickets, tap any ticket card.
# 2. Verify the full-screen Ticket Viewer opens; PDF tickets show pages, images zoom/pan.
# 3. Verify a toolbar with Share and Delete actions is visible.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.tickets" }
- assertVisible: { id: "tickets.ticket-card.0" }
- tapOn: { id: "tickets.ticket-card.0" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "tickets.viewer" }
- assertVisible: { id: "tickets.viewer.content" }
- assertVisible: { id: "tickets.viewer.toolbar" }
- assertVisible: { id: "tickets.viewer.share-button" }
- assertVisible: { id: "tickets.viewer.delete-button" }
