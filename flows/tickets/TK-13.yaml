appId: ${APP_ID}
name: TK-13
tags: [tickets, p1, needs-implementation]
---
# >>> dashboard-meta
# TK-13 — Uploading a >10 MB PDF either uploads (with a warning) or shows a clear "File too large" error
# Section: Tickets
# Priority: P1
# Repro:
# 1. Prepare a >10 MB PDF.
# 2. On Tickets, tap + → pick it → Save to trip.
# 3. Verify either upload completes (possibly slowly) or an error like "File size exceeds 10MB limit" appears.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.tickets" }
- tapOn: { id: "tickets.add-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "tickets.upload-sheet.title" }
- tapOn: { id: "tickets.upload-sheet.upload-button" }
- waitForAnimationToEnd:
    timeout: 30000
# Needs implementation: validating the >10 MB PDF path requires a real
# large file picked through the system OpenDocument picker, which Maestro
# cannot drive. Either either ticket-card.0 (upload succeeded) or
# tickets.upload-sheet.error (size limit hit) should appear — wire up
# once a file-picker shim or test-only upload endpoint exists.
