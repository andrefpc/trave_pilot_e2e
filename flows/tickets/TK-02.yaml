appId: ${APP_ID}
name: TK-02
tags: [tickets, p0]
---
# >>> dashboard-meta
# TK-02 — The + button on Tickets opens the system Open Document file picker
# Section: Tickets
# Priority: P0
# Repro:
# 1. Open Tickets.
# 2. Tap +.
# 3. Verify the OpenDocument picker opens, allowing PDFs and images.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.tickets" }
- assertVisible: { id: "tickets.tab-content" }
- tapOn: { id: "tickets.add-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "tickets.document-picker" }
