appId: ${APP_ID}
name: TK-14
tags: [tickets, p1]
---
# >>> dashboard-meta
# TK-14 — Losing network mid ticket upload shows an error snackbar with Retry; Retry succeeds when reconnected
# Section: Tickets
# Priority: P1
# Repro:
# 1. On Tickets, start uploading a ticket.
# 2. Toggle airplane mode mid-upload.
# 3. Verify an error snackbar appears with Retry.
# 4. Toggle airplane off and tap Retry — upload completes; ticket appears.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.tickets" }
- tapOn: { id: "tickets.add-button" }
- waitForAnimationToEnd:
    timeout: 5000
- tapOn: { id: "tickets.upload-sheet.upload-button" }
- toggleAirplaneMode
- toggleAirplaneMode
- waitForAnimationToEnd:
    timeout: 15000
- assertVisible: { id: "tickets.ticket-card.0" }
