appId: ${APP_ID}
name: MAP-02
tags: [map, p1]
---
# >>> dashboard-meta
# MAP-02 — Pinching on the Travel Map smoothly zooms in and out
# Section: Travel Map
# Priority: P1
# Repro:
# 1. On Travel Map, place two fingers on the map.
# 2. Pinch outward to zoom in, then pinch inward to zoom out.
# 3. Verify smooth zoom with no jank.
# <<< dashboard-meta

# Maestro doesn't expose a real pinch gesture cross-platform, so the map
# also exposes explicit Zoom In / Zoom Out controls (driven by the same
# ViewModel as pinch). We assert the zoom-level marker advances and rolls
# back as expected.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-map" }
- assertVisible: { id: "map.world-view" }
- assertVisible: { id: "map.zoom-level.world-marker" }
- tapOn: { id: "map.zoom-in-button" }
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: { id: "map.zoom-level.continent-marker" }
- tapOn: { id: "map.zoom-in-button" }
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: { id: "map.zoom-level.country-marker" }
- tapOn: { id: "map.zoom-out-button" }
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: { id: "map.zoom-level.continent-marker" }
- tapOn: { id: "map.zoom-out-button" }
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: { id: "map.zoom-level.world-marker" }
