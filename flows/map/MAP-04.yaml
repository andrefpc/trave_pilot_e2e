appId: ${APP_ID}
name: MAP-04
tags: [map, p1]
---
# >>> dashboard-meta
# MAP-04 — Tapping a country/city marker opens a detail sheet with information
# Section: Travel Map
# Priority: P1
# Repro:
# 1. On Travel Map, tap a marker for a visited or planned city.
# 2. Verify a Country Detail sheet appears with city/country info.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-map" }
- assertVisible: { id: "map.world-view" }
- assertVisible: { id: "map.country-pin.LX" }
- tapOn: { id: "map.country-pin.LX" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "map.country-detail-sheet.title" }
- assertVisible: { id: "map.country-detail-sheet.country-name" }
- assertVisible: { id: "map.country-detail-sheet.cities-list" }
- assertVisible: { id: "map.country-detail-sheet.cities-list.0" }
- tapOn: { id: "map.country-detail-sheet.close-button" }
- assertNotVisible: { id: "map.country-detail-sheet.title" }
- assertVisible: { id: "map.world-view" }
