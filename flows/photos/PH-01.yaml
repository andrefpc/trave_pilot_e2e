appId: ${APP_ID}
name: PH-01
tags: [photos, p1, ios-only]
---
# >>> dashboard-meta
# PH-01 — Tapping Gallery shows a grid of milestone photos grouped per city
# Section: Photos & Gallery
# Priority: P1
# Repro:
# 1. Add at least one milestone photo.
# 2. From Home or Profile, open Gallery.
# 3. Verify a grid of photos is shown with section headers per city.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.gallery-link" }
- assertVisible: { id: "photos.gallery" }
- assertVisible: { id: "photos.image.0" }
