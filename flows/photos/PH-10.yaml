appId: ${APP_ID}
name: PH-10
tags: [photos, p1]
---
# >>> dashboard-meta
# PH-10 — On Android 8–12 (< 13), the photo picker prompts for READ_EXTERNAL_STORAGE the first time
# Section: Photos & Gallery
# Priority: P1
# Repro:
# 1. On a device running Android 8–12 with permission not yet granted, open Gallery → tap +.
# 2. Verify the system permission dialog asks for storage / photos access.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.gallery-link" }
- tapOn: { id: "photos.upload-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "photos.permission-dialog" }
- assertVisible: { id: "photos.permission-dialog.allow-button" }
