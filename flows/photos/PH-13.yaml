appId: ${APP_ID}
name: PH-13
tags: [photos, p2]
---
# >>> dashboard-meta
# PH-13 — Selecting an unsupported file format (e.g. SVG) is filtered or rejected with an error
# Section: Photos & Gallery
# Priority: P2
# Repro:
# 1. On Gallery, tap + → pick an SVG file (from a file manager).
# 2. Verify either the file is greyed out / not selectable, or a "Only JPG, PNG, WEBP, GIF" error appears after pick.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.gallery-link" }
- tapOn: { id: "photos.upload-button" }
- waitForAnimationToEnd:
    timeout: 5000
- tapOn: { id: "photos.system-picker.image.svg" }
- tapOn: { id: "photos.system-picker.confirm-button" }
- assertVisible: { id: "photos.upload.unsupported-format-error" }
