appId: ${APP_ID}
name: PH-07
tags: [photos, p1]
---
# >>> dashboard-meta
# PH-07 — Tapping a photo opens a full-screen pager; swiping left/right moves between photos
# Section: Photos & Gallery
# Priority: P1
# Repro:
# 1. On Gallery, tap any photo.
# 2. Swipe left and right inside the viewer.
# 3. Verify previous/next photos are shown smoothly.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.gallery-link" }
- tapOn: { id: "photos.image.0" }
- assertVisible: { id: "photos.viewer" }
- assertVisible: { id: "photos.viewer.page.0" }
- swipe:
    direction: LEFT
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: { id: "photos.viewer.page.1" }
- swipe:
    direction: RIGHT
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: { id: "photos.viewer.page.0" }
