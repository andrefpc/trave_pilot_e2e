appId: ${APP_ID}
name: PH-09
tags: [photos, p2]
---
# >>> dashboard-meta
# PH-09 — A user with no photos on Gallery sees an empty illustration and an "Add Photo" CTA
# Section: Photos & Gallery
# Priority: P2
# Repro:
# 1. Sign in as a user with no milestone photos.
# 2. Open Gallery.
# 3. Verify the empty state with title (e.g. "No photos yet") and a primary "Add Photo" button is shown.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      # The platform free-user has a plan seeded for WZ-X-05 / ITV-10
      # which populates `cities`, so `isEmpty` stays false and the
      # gallery shows the upload-button id instead of the
      # empty-state.add-button id. Use the un-seeded `e2e+freeuser@`
      # so the gallery genuinely renders the empty state.
      TEST_EMAIL: "e2e+freeuser@travelpilotapp.com"
      TEST_PASSWORD: "E2eFreeUser!1"
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.gallery-link" }
- assertVisible: { id: "photos.empty-state" }
- assertVisible: { id: "photos.empty-state.title" }
- assertVisible: { id: "photos.empty-state.add-button" }
