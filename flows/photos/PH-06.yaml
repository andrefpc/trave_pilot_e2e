appId: ${APP_ID}
name: PH-06
tags: [photos, p0]
---
# >>> dashboard-meta
# PH-06 — Long-press → Delete on a Gallery photo confirms then deletes via DELETE /milestones/:id
# Section: Photos & Gallery
# Priority: P0
# Repro:
# 1. Long-press a photo and tap Delete.
# 2. Confirm in the dialog.
# 3. Verify a DELETE /milestones/:id fires and the photo is removed from the grid.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.gallery-link" }
- assertVisible: { id: "photos.image.0" }
- longPressOn: { id: "photos.image.0" }
- assertVisible: { id: "photos.context-menu" }
- tapOn: { id: "photos.context-menu.delete" }
- assertVisible: { id: "photos.delete-dialog.title" }
- tapOn: { id: "photos.delete-dialog.confirm-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "photos.delete.success-snackbar" }
