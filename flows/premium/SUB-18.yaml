appId: ${APP_ID}
name: SUB-18
tags: [premium, p1]
---
# >>> dashboard-meta
# SUB-18 — Premium bottom sheet shows only Monthly and Annual; the legacy Five-Day Pass is not present
# Section: Subscription / Premium / Play Billing
# Priority: P1
# Repro:
# 1. Open the Premium bottom sheet.
# 2. Verify exactly two plan cards (Monthly + Annual). No "5-Day Pass" appears.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.unlock-premium-button" }
- assertVisible: { id: "premium.bottom-sheet.title" }
- assertVisible: { id: "subscription.plan.monthly" }
- assertVisible: { id: "subscription.plan.annual" }
- assertNotVisible: { id: "subscription.plan.five-day-pass" }
