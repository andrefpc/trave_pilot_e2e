appId: ${APP_ID}
name: SUB-14
tags: [premium, p0, ios-only]
---
# >>> dashboard-meta
# SUB-14 — If the network drops mid-purchase but Play already charged, Restore Purchases recovers premium
# Section: Subscription / Premium / Play Billing
# Priority: P0
# Repro:
# 1. Start a Play Billing purchase, complete the charge.
# 2. Lose network before the app sends POST /subscriptions.
# 3. Reconnect, tap Restore Purchases.
# 4. Verify the receipt is re-verified and premium is granted.
# <<< dashboard-meta

# Drives the "charged but unverified" state via the devtools
# "Simulate Pending Receipt" toggle, which leaves a queryable Play purchase
# without a server-side subscription. Restore Purchases reconciles it.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.unlock-premium-button" }
- assertVisible: { id: "premium.bottom-sheet.title" }
- tapOn: { id: "subscription.devtools.simulate-pending-receipt" }
- tapOn: { id: "premium.bottom-sheet.close-button" }
- assertVisible: { id: "profile.unlock-premium-button" }
- tapOn: { id: "profile.restore-purchases-button" }
- waitForAnimationToEnd:
    timeout: 10000
- assertVisible: { id: "subscription.restore-success-snackbar" }
- assertVisible: { id: "profile.premium-badge" }
