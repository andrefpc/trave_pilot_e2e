appId: ${APP_ID}
name: SUB-11
tags: [premium, p1]
---
# >>> dashboard-meta
# SUB-11 — A Google Play renewal webhook updates the server, then GET /subscriptions/me returns the new expiry
# Section: Subscription / Premium / Play Billing
# Priority: P1
# Repro:
# 1. In Play Console sandbox, force a renewal of an active subscription.
# 2. After the webhook fires (a few seconds), call GET /subscriptions/me from the app.
# 3. Verify the new expiry date is returned.
# <<< dashboard-meta

# Drives the sandbox renewal webhook via the devtools "Simulate Renewal"
# action; the resulting expiry date is surfaced on Profile/Manage.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "subscription.devtools.simulate-renewal" }
- waitForAnimationToEnd:
    timeout: 8000
- tapOn: { id: "profile.manage-subscription-button" }
- assertVisible: { id: "subscription.manage.expiry-label" }
- assertVisible: { id: "subscription.manage.renewed-snackbar" }
