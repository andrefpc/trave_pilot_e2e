appId: ${APP_ID}
name: SUB-02
tags: [premium, p0]
---
# >>> dashboard-meta
# SUB-02 — On the Premium sheet the Annual plan is highlighted by default with a "Best value" badge
# Section: Subscription / Premium / Play Billing
# Priority: P0
# Repro:
# 1. Open the Premium bottom sheet.
# 2. Verify the Annual card has the highlighted border and a "Best value" tag; Monthly is shown but not highlighted.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.unlock-premium-button" }
- assertVisible: { id: "premium.bottom-sheet.title" }
- assertVisible: { id: "subscription.plan.annual" }
- assertVisible: { id: "subscription.plan.annual.highlight" }
- assertVisible: { id: "subscription.plan.annual.best-value-badge" }
- assertVisible: { id: "subscription.plan.monthly" }
- assertNotVisible: { id: "subscription.plan.monthly.highlight" }
