appId: ${APP_ID}
name: SUB-09
tags: [premium, p0]
---
# >>> dashboard-meta
# SUB-09 — Cancel Subscription deep-links to Google Play subscription management
# Section: Subscription / Premium / Play Billing
# Priority: P0
# Repro:
# 1. As a premium user, on Profile tap "Cancel Subscription".
# 2. Verify the Play Store opens at the subscription-management page where the user can cancel.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.profile" }
- tapOn: { id: "profile.manage-subscription-button" }
- tapOn: { id: "subscription.cancel-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "external-browser.url-bar" }
