appId: ${APP_ID}
name: SHR-04
tags: [sharing, p1]
---
# >>> dashboard-meta
# SHR-04 — Choosing "Read only" and sharing produces a link tagged read_only on the server
# Section: Plan Sharing & Deep Links
# Priority: P1
# Repro:
# 1. As premium, open Share Plan, pick "Read only" → Share.
# 2. Inspect the POST /share-link response.
# 3. Verify the returned permission is read_only.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- tapOn: { id: "share.invite-button" }
- assertVisible: { id: "share.sheet" }
- tapOn: { id: "share.permission.read-only" }
- tapOn: { id: "share.create-link-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "share.link-url-label" }
- assertVisible: { id: "share.permission-badge.read-only" }
