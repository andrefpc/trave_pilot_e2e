appId: ${APP_ID}
name: SHR-11
tags: [sharing, p1]
---
# >>> dashboard-meta
# SHR-11 — Tapping Add Travel Plan with an invalid/expired token shows "This share link is invalid or expired"
# Section: Plan Sharing & Deep Links
# Priority: P1
# Repro:
# 1. Open Share Invite via a clearly invalid token (e.g. travelpilot://share/garbage).
# 2. Tap "Add Travel Plan".
# 3. Verify an error dialog "This share link is invalid or expired" appears.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_EMAIL}
      TEST_PASSWORD: ${TEST_PASSWORD}
- openLink: "travelpilot://share/garbage"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "share.invalid-link-screen.title" }
- assertVisible: { id: "share.invalid-link-screen.message" }
- assertVisible: { id: "share.invalid-link-screen.go-home-button" }
