appId: ${APP_ID}
name: SHR-02
tags: [sharing, p0]
---
# >>> dashboard-meta
# SHR-02 — A premium user tapping Share opens a sheet with "Can edit" and "Read only" options and a Share button
# Section: Plan Sharing & Deep Links
# Priority: P0
# Repro:
# 1. Sign in as a premium user with a plan.
# 2. Tap Share.
# 3. Verify the Share Plan sheet shows two radio options ("Can edit", "Read only") and a primary "Share" button.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- assertVisible: { id: "itinerary.screen" }
- tapOn: { id: "share.invite-button" }
- assertVisible: { id: "share.sheet" }
- assertVisible: { id: "share.permission.can-edit" }
- assertVisible: { id: "share.permission.read-only" }
- assertVisible: { id: "share.create-link-button" }
