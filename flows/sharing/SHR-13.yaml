appId: ${APP_ID}
name: SHR-13
tags: [sharing, p2]
---
# >>> dashboard-meta
# SHR-13 — Opening your own plan's share link is handled gracefully (no duplicate join, no crash)
# Section: Plan Sharing & Deep Links
# Priority: P2
# Repro:
# 1. As the plan owner, open a share link for your own plan.
# 2. Verify Share Invite appears or the app navigates to the existing plan with no error.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- openLink: "https://www.travelpilotapp.com/share/${TEST_OWNER_SHARE_TOKEN}"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "share-invite.owner-banner" }
- assertVisible: { id: "share-invite.open-plan-button" }
- tapOn: { id: "share-invite.open-plan-button" }
- assertVisible: { id: "itinerary.screen" }
