appId: ${APP_ID}
name: SHR-12
tags: [sharing, p1]
---
# >>> dashboard-meta
# SHR-12 — Joining a plan you have already joined shows "You have already joined this plan" instead of duplicating
# Section: Plan Sharing & Deep Links
# Priority: P1
# Repro:
# 1. Join a shared plan (SHR-10).
# 2. Tap the same share link again and tap Add Travel Plan.
# 3. Verify "You have already joined this plan" is shown; no duplicate is created.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_EMAIL}
      TEST_PASSWORD: ${TEST_PASSWORD}
- openLink: "https://www.travelpilotapp.com/share/${TEST_SHARE_TOKEN}"
- assertVisible: { id: "share-invite.title" }
- tapOn: { id: "share-invite.add-plan-button" }
- waitForAnimationToEnd:
    timeout: 8000
- assertVisible: { id: "share-invite.join-success-snackbar" }
- openLink: "https://www.travelpilotapp.com/share/${TEST_SHARE_TOKEN}"
- assertVisible: { id: "share-invite.title" }
- tapOn: { id: "share-invite.add-plan-button" }
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "share-invite.already-joined-dialog.title" }
- assertVisible: { id: "share-invite.already-joined-dialog.dismiss-button" }
