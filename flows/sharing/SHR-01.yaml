appId: ${APP_ID}
name: SHR-01
tags: [sharing, p0]
---
# >>> dashboard-meta
# SHR-01 — A free user tapping Share on a plan sees the Premium bottom sheet (share dialog does not open)
# Section: Plan Sharing & Deep Links
# Priority: P0
# Repro:
# 1. Sign in as a free user with an active plan.
# 2. Open the plan's Share action.
# 3. Verify the Premium bottom sheet appears (because creating a share link is premium-gated).
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- tapOn: { id: "home.tab.travel-plans" }
- tapOn: { id: "plans.plan-card.0" }
- assertVisible: { id: "itinerary.screen" }
- tapOn: { id: "share.invite-button" }
- assertVisible: { id: "premium.bottom-sheet" }
- assertVisible: { id: "premium.bottom-sheet.cta" }
- assertNotVisible: { id: "share.sheet" }
