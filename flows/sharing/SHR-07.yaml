appId: ${APP_ID}
name: SHR-07
tags: [sharing, p0]
---
# >>> dashboard-meta
# SHR-07 — Tapping a https://www.travelpilotapp.com/share/<token> link from another app opens Share Invite
# Section: Plan Sharing & Deep Links
# Priority: P0
# Repro:
# 1. Send yourself an SMS or email containing https://www.travelpilotapp.com/share/<a-real-token>.
# 2. From the SMS/email app, tap the link.
# 3. Verify the Travel Pilot app opens directly to Share Invite with the plan preview and an "Add Travel Plan" button.
# <<< dashboard-meta

# Maestro can't tap into SMS/email reliably; openLink simulates the same
# Android intent path the system uses when a user taps a recognised URL.
- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- openLink: "https://www.travelpilotapp.com/share/${TEST_SHARE_TOKEN}"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "share-invite.title" }
- assertVisible: { id: "share-invite.plan-preview" }
- assertVisible: { id: "share-invite.add-plan-button" }
