appId: ${APP_ID}
name: SHR-08
tags: [sharing, p0]
---
# >>> dashboard-meta
# SHR-08 — Tapping a travelpilot://share/<token> custom-scheme link opens the Share Invite screen
# Section: Plan Sharing & Deep Links
# Priority: P0
# Repro:
# 1. Send yourself a message containing travelpilot://share/<a-real-token>.
# 2. Tap the link from the messaging app.
# 3. Verify Travel Pilot opens to Share Invite with the plan preview.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- openLink: "travelpilot://share/${TEST_SHARE_TOKEN}"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: { id: "share-invite.title" }
- assertVisible: { id: "share-invite.plan-preview" }
- assertVisible: { id: "share-invite.add-plan-button" }
