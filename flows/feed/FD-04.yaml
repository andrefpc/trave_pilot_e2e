appId: ${APP_ID}
name: FD-04
tags: [feed, p1]
---
# >>> dashboard-meta
# FD-04 — Pulling down on Feed re-fetches all four sections
# Section: Feed & Recommendations
# Priority: P1
# Repro:
# 1. On Feed, scroll to the top.
# 2. Drag down to trigger pull-to-refresh.
# 3. Verify all four sections show a loading state, then re-render with fresh data.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_PREMIUM_EMAIL}
      TEST_PASSWORD: ${TEST_PREMIUM_PASSWORD}
- tapOn: { id: "home.tab.feed" }
- assertVisible: { id: "feed.list" }
- swipe:
    from: { id: "feed.list" }
    direction: DOWN
- assertVisible: { id: "feed.refresh-indicator" }
- waitForAnimationToEnd:
    timeout: 10000
- assertNotVisible: { id: "feed.refresh-indicator" }
- assertVisible: { id: "feed.section.places.card.0" }
