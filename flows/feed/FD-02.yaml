appId: ${APP_ID}
name: FD-02
tags: [feed, p1]
---
# >>> dashboard-meta
# FD-02 — For free users, AdMob native ads render among Feed cards labelled "Ad"
# Section: Feed & Recommendations
# Priority: P1
# Repro:
# 1. Sign in as a free user, open Feed.
# 2. Scroll through the cards.
# 3. Verify ad cards appear with an "Ad" badge and they do not break layout.
# <<< dashboard-meta

- runFlow: ../common/_reset_data.yaml
- runFlow: ../common/_open_app.yaml
- runFlow:
    file: ../common/_login.yaml
    env:
      TEST_EMAIL: ${TEST_FREE_EMAIL}
      TEST_PASSWORD: ${TEST_FREE_PASSWORD}
- tapOn: { id: "home.tab.feed" }
- assertVisible: { id: "feed.list" }
- scrollUntilVisible:
    element: { id: "feed.ad-card.0" }
    direction: DOWN
- assertVisible: { id: "feed.ad-card.0.badge" }
- assertVisible: { id: "feed.recommendation-card.0" }
