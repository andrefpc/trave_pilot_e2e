name: sync-test-cases

on:
  repository_dispatch:
    types: [test-case-changed]
  schedule:
    # 06:00 UTC daily — belt-and-suspenders sweep in case a dispatch is missed.
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: sync-test-cases
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Mint admin JWT
        env:
          E2E_BOT_EMAIL: ${{ secrets.E2E_BOT_EMAIL }}
          E2E_BOT_PASSWORD: ${{ secrets.E2E_BOT_PASSWORD }}
        run: |
          token=$(curl -fsS -X POST "${API_BASE_URL:-https://api.travelpilotapp.com}/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"$E2E_BOT_EMAIL\",\"password\":\"$E2E_BOT_PASSWORD\"}" \
            | jq -r '.access_token')
          echo "::add-mask::$token"
          echo "ADMIN_TOKEN=$token" >> $GITHUB_ENV
          echo "API_BASE_URL=${API_BASE_URL:-https://api.travelpilotapp.com}" >> $GITHUB_ENV
        env:
          API_BASE_URL: https://api.travelpilotapp.com

      - name: Sync test cases → flow stubs
        run: npm run sync

      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/sync-test-cases
          base: main
          title: 'chore: sync test case stubs from dashboard'
          commit-message: 'chore: sync test case stubs from dashboard'
          body: |
            Auto-generated by the `sync-test-cases` workflow.

            Trigger: ${{ github.event_name }}
            Payload code: ${{ github.event.client_payload.code || 'N/A' }}
            Action: ${{ github.event.client_payload.action || 'N/A' }}

            Review the diff:
            - **Created** stubs need interaction steps before they can be removed from the `needs-implementation` tag.
            - **Header-only** updates (between `# >>> dashboard-meta` markers) reflect dashboard edits to title/section/repro.
            - **Moves** to `flows/_archived/` happen when a case is archived in the dashboard.
          labels: |
            needs-implementation
            automated
          delete-branch: true
